function buildSYS(studioTipps) {
  let base = `Du bist TrainerHub, ein AI-Copilot für Fitnesstrainer. Erstelle aus der Anamnese ein Trainer-Briefing.
REGELN: Deutsch. Max 300 Wörter. 30-Sekunden-Scan. Du sprichst den Trainer an. "Die Person" oder Vorname. Keine Aufgaben fürs Mitglied außerhalb des Studios. Sicherheit first. Keine Erfindungen. Evidenzbasiert.
STUDIO-DATEN FITNESS PARK:
- Intensivbetreuung + Sensopro: €2/Woche (Koordination, Rumpfstabilität, Challenger-Tracking, Trainertermine alle 3 Monate)
- Betreuungsstufen: Basic (2x/Jahr) → Intensive (€2/Wo) → Personal (ab €89,90/h)
- Personal Training Mitglieder: €89,90/h | 10er: €899 | 20er: €1.618,20
- Kurse: Rückenkurs, Pilates, Yoga, BodyPump, Cycling, Functional Training, Zumba, BBP, Jumping, Power Plate
- Spezialgeräte: EGYM, Milon Q, Flexx-Zirkel (Beweglichkeit), Sensopro (Koordination), Kinesis, Power Plate
- Diagnostik: InBody, Cardioscan, Back-Check, Zell Check, Mobee Fit
- Produkte: Inkospor, Jungbrunnen Superfoods, Getränke-Flat, Shake des Monats
- Wellness: Sauna (inkl.), Medyjet, brainLight, Solarium
- Abnehmen: myshape Programm
ERNÄHRUNG: Eiweiß ~1,6g/kg/Tag optimal (Morton et al. 2018, n=1863). Whey/Kollagen stärkste Evidenz (Drummond et al. 2026, n=4755). Jede Empfehlung mit Kurzreferenz.`;
  if (studioTipps && studioTipps.trim()) {
    base += `\nSTUDIO-SPEZIFISCHE TRAININGSTIPPS (von der Studioleitung hinterlegt — berücksichtige diese bei den Trainingsimpulsen und Verkaufsankern):\n${studioTipps}`;
  }
  base += `\nEXAKTE AUSGABESTRUKTUR:
### PERSON AUF EINEN BLICK
- 4-5 Stichpunkte, je max 8 Wörter
### TRAININGSIMPULSE
- 3-5 kurze Denkanstöße, Format: **Impuls** — Begründung
### ACHTUNG
- NICHT: [Was] — WEIL: [Begründung aus Anamnese]
### VERKAUFSANKER
- 2-4 studio-interne Zusatzverkäufe mit Preis und Formulierungsvorschlag in Anführungszeichen
### ERNÄHRUNGSIMPULSE
- 1-2 evidenzbasierte Hinweise mit (Autor, Jahr). Abschluss: Ernährungsberatung empfehlen.
### OFFENE PUNKTE
- Fehlende relevante Infos`;
  return base;
}

function loadLS(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
function saveLS(key, data) { try { localStorage.setItem(key, JSON.stringify(data)); return true; } catch { return false; } }

async function callAPI(anamnese, letzter, studioTipps) {
  let msg = "ANAMNESE:\n" + anamnese;
  if (letzter && letzter.trim()) msg += "\n\nLETZTER TERMIN:\n" + letzter;
  try {
    const r = await fetch("/.netlify/functions/api", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, system: buildSYS(studioTipps), messages: [{ role: "user", content: msg }] }),
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); const m = typeof e.error === "string" ? e.error : (e.error?.message || JSON.stringify(e)); throw new Error(m); }
    const d = await r.json();
    return { ok: true, text: d.content.filter(b => b.type === "text").map(b => b.text).join("\n") };
  } catch (e) { return { ok: false, text: e.message }; }
}

async function parseScreenshot(base64) {
  try {
    const r = await fetch("/.netlify/functions/api", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6", max_tokens: 1000,
        system: "Du analysierst Kassenbelege/Screenshots. Extrahiere alle Produkte mit Namen und Preisen. Antworte NUR mit einem JSON-Array, kein anderer Text. Format: [{\"name\":\"Produktname\",\"preis\":12.90}]. Wenn du nichts erkennst, antworte mit [].",
        messages: [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
          { type: "text", text: "Extrahiere alle Produkte und Preise aus diesem Kassenbeleg." }
        ]}]
      }),
    });
    if (!r.ok) throw new Error("API Fehler");
    const d = await r.json();
    const txt = d.content.filter(b => b.type === "text").map(b => b.text).join("");
    const clean = txt.replace(/`{3}json|`{3}/g, "").trim();
    return JSON.parse(clean);
  } catch (e) { return []; }
}

function Briefing({ text }) {
  if (!text) return null;
  const parts = text.split(/(?=^### )/gm).filter(p => p.trim().startsWith("### "));
  const colors = { "ACHTUNG": ["bg-red-50", "border-red-300", "text-red-700"], "OFFENE PUNKTE": ["bg-amber-50", "border-amber-300", "text-amber-700"] };
  return (<div className="space-y-3">{parts.map((p, i) => {
    const nl = p.indexOf("\n"); if (nl === -1) return null;
    const title = p.slice(4, nl).trim(), body = p.slice(nl + 1).trim();
    const c = colors[title] || ["bg-white", "border-gray-200", "text-emerald-700"];
    return (<div key={i} className={`p-4 rounded-lg border ${c[0]} ${c[1]}`}><div className={`font-bold text-xs uppercase tracking-wider mb-2 ${c[2]}`}>{title}</div><div className="text-sm text-gray-800 leading-relaxed">{body.split("\n").map((line, j) => {
      if (!line.trim()) return null;
      if (line.startsWith("- ")) { const ct = line.slice(2), sg = ct.split(/\*\*(.*?)\*\*/g); return (<div key={j} className="flex gap-2 mb-1.5"><span className="text-emerald-500 mt-0.5 flex-shrink-0">▸</span><span>{sg.map((s, k) => k % 2 === 1 ? <strong key={k}>{s}</strong> : <span key={k}>{s}</span>)}</span></div>); }
      return <p key={j} className="mb-1">{line}</p>;
    })}</div></div>);
  })}</div>);
}

function Login({ users, company, onLogin }) {
  const [step, setStep] = useState(1);
  const [pw, setPw] = useState("");
  const [studio, setStudio] = useState("");
  const [uid, setUid] = useState("");
  const [pin, setPin] = useState("");
  const [err, setErr] = useState("");
  const goStep1 = () => { if (pw !== company.password) { setErr("Falsches Passwort"); setPw(""); return; } setErr(""); setStep(2); };
  const goStep2 = (s) => { setStudio(s); setErr(""); setStep(3); };
  const goStep3 = () => { const u = users.find(x => x.id === uid); if (!u) { setErr("Bitte Mitarbeiter auswählen"); return; } if (u.pin !== pin) { setErr("Falsche PIN"); setPin(""); return; } onLogin({ name: u.name, studio: u.studio, rolle: u.rolle, id: u.id }); };
  const studioUsers = users.filter(u => u.studio === studio);
  const studiosWithUsers = STUDIOS.filter(s => users.some(u => u.studio === s));
  return (
    <div className="min-h-screen bg-gray-900 flex items-center justify-center p-4"><div className="w-full max-w-sm">
      <div className="text-center mb-8">
        <div className="text-3xl font-black text-white tracking-tight">TRAINER<span className="text-emerald-400">HUB</span></div>
        {step === 1 && <div className="text-xs text-gray-500 mt-1 tracking-widest uppercase">Unternehmens-Login</div>}
        {step === 2 && <div className="text-xs text-emerald-400 mt-1 tracking-widest uppercase">{company.name}</div>}
        {step === 3 && <div className="text-xs text-emerald-400 mt-1 tracking-widest uppercase">{company.name} · {studio}</div>}
      </div>
      {step === 1 && (<div className="bg-gray-800 rounded-xl p-6 space-y-4">
        <div><label className="text-xs text-gray-400 uppercase tracking-wider">Unternehmens-Passwort</label>
          <input type="password" value={pw} onChange={e => { setPw(e.target.value); setErr(""); }} placeholder="Passwort eingeben" className="w-full mt-1 px-3 py-2.5 bg-gray-700 text-white rounded-lg border border-gray-600 focus:border-emerald-500 focus:outline-none text-sm" onKeyDown={e => e.key === "Enter" && goStep1()} /></div>
        {err && <div className="text-xs text-red-400 text-center">{err}</div>}
        <button onClick={goStep1} disabled={!pw} className="w-full py-2.5 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-600 disabled:text-gray-400 text-white font-bold rounded-lg text-sm transition-colors">Anmelden</button>
      </div>)}
      {step === 2 && (<div className="bg-gray-800 rounded-xl p-6 space-y-3">
        <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Studio auswählen</div>
        {studiosWithUsers.map(s => (<button key={s} onClick={() => goStep2(s)} className="w-full py-3 px-4 bg-gray-700 hover:bg-gray-600 text-white rounded-lg text-sm font-medium transition-colors text-left">{s}</button>))}
        <button onClick={() => { setStep(1); setPw(""); setErr(""); }} className="w-full text-xs text-gray-500 hover:text-white mt-2">← Zurück</button>
      </div>)}
      {step === 3 && (<div className="bg-gray-800 rounded-xl p-6 space-y-4">
        <div><label className="text-xs text-gray-400 uppercase tracking-wider">Mitarbeiter</label>
          <select value={uid} onChange={e => { setUid(e.target.value); setErr(""); }} className="w-full mt-1 px-3 py-2.5 bg-gray-700 text-white rounded-lg border border-gray-600 focus:border-emerald-500 focus:outline-none text-sm">
            <option value="">Bitte wählen</option>
            {studioUsers.map(u => (<option key={u.id} value={u.id}>{u.name}{u.rolle === "leitung" ? " (Leitung)" : ""}</option>))}
          </select></div>
        <div><label className="text-xs text-gray-400 uppercase tracking-wider">PIN</label>
          <input type="password" maxLength="6" value={pin} onChange={e => { setPin(e.target.value.replace(/\D/g, "")); setErr(""); }} placeholder="••••" className="w-full mt-1 px-3 py-2.5 bg-gray-700 text-white rounded-lg border border-gray-600 focus:border-emerald-500 focus:outline-none text-sm tracking-widest text-center text-lg" onKeyDown={e => e.key === "Enter" && goStep3()} /></div>
        {err && <div className="text-xs text-red-400 text-center">{err}</div>}
        <button onClick={goStep3} disabled={!uid || !pin} className="w-full py-2.5 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-600 disabled:text-gray-400 text-white font-bold rounded-lg text-sm transition-colors">Einloggen</button>
        <button onClick={() => { setStep(2); setUid(""); setPin(""); setErr(""); }} className="w-full text-xs text-gray-500 hover:text-white">← Studio wechseln</button>
      </div>)}
    </div></div>
  );
}

function Nav({ view, setView, trainer, onLogout }) {

  return (<div className="bg-gray-900 text-white px-4 py-3"><div className="max-w-4xl mx-auto flex items-center justify-between flex-wrap gap-2">
    <div className="flex items-center gap-4"><div className="font-black text-lg tracking-tight">TRAINER<span className="text-emerald-400">HUB</span></div><div className="flex gap-1">{tabs.map(t => (<button key={t.id} onClick={() => setView(t.id)} className={`px-3 py-1.5 rounded-md text-xs font-medium transition-colors ${view === t.id ? "bg-emerald-600 text-white" : "text-gray-400 hover:text-white hover:bg-gray-800"}`}>{t.l}</button>))}</div></div>
    <div className="flex items-center gap-3"><span className="text-xs text-gray-500">{trainer.name} · {trainer.studio} · <span className={isL ? "text-amber-400" : "text-gray-500"}>{isL ? "Leitung" : "Trainer"}</span></span><button onClick={onLogout} className="text-xs text-gray-500 hover:text-white">Logout</button></div>
  </div></div>);
}

function BriefingView({ studioTipps }) {
  const [ana, setAna] = useState(""); const [lt, setLt] = useState(""); const [result, setResult] = useState(null); const [loading, setLoading] = useState(false); const [err, setErr] = useState(null); const [showLt, setShowLt] = useState(false);
  const go = async () => { if (!ana.trim()) return; setLoading(true); setErr(null); setResult(null); const r = await callAPI(ana, lt, studioTipps); r.ok ? setResult(r.text) : setErr(r.text); setLoading(false); };
  const reset = () => { setAna(""); setLt(""); setResult(null); setErr(null); setShowLt(false); };
  if (result) return (<div className="max-w-3xl mx-auto p-4"><div className="flex items-center justify-between mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Trainer-Briefing</div><button onClick={reset} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">Neues Briefing</button></div><Briefing text={result} /></div>);
  return (<div className="max-w-3xl mx-auto p-4 space-y-4">
    <div><div className="flex items-center justify-between mb-2"><label className="text-sm font-bold text-gray-700">Anamnese einfügen</label><span className="text-xs text-gray-400">Copy & Paste</span></div><textarea value={ana} onChange={e => setAna(e.target.value)} placeholder="Anamnese-Daten hier einfügen..." rows="10" className="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none resize-none bg-white" /></div>
    {!showLt ? <button onClick={() => setShowLt(true)} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">+ Letzten Termin hinzufügen</button> : <div><label className="text-sm font-bold text-gray-700 mb-2 block">Letzter Termin (optional)</label><textarea value={lt} onChange={e => setLt(e.target.value)} placeholder="Notizen vom letzten Termin..." rows="4" className="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none resize-none bg-white" /></div>}
    {err && <div className="p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{err}</div>}
    <button onClick={go} disabled={!ana.trim() || loading} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-300 text-white font-bold rounded-lg text-sm transition-colors">{loading ? "Briefing wird generiert..." : "Briefing generieren"}</button>
  </div>);
}

function ErfolgeView({ trainer, produkte }) {
  const [name, setName] = useState(""); const [tart, setTart] = useState(""); const [sel, setSel] = useState([]); const [saved, setSaved] = useState(false);
  const [kassenItems, setKassenItems] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const fileRef = useRef(null);
  const aktive = produkte.filter(p => p.aktiv);
  const grouped = KATEGORIEN.map(k => ({ k, items: aktive.filter(p => p.kategorie === k) })).filter(g => g.items.length > 0);
  const toggle = id => setSel(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);
  const toggleKassen = idx => { const n = [...kassenItems]; n[idx].selected = !n[idx].selected; setKassenItems(n); };

  const handleUpload = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    setUploading(true);
    const reader = new FileReader();
    reader.onload = async () => {
      const b64 = reader.result.split(",")[1];
      const items = await parseScreenshot(b64);
      setKassenItems(items.map(it => ({ ...it, selected: true })));
      setUploading(false);
    };
    reader.readAsDataURL(file);
  };

  const save = () => {
    if (!name.trim() || !tart) return;
    const vkProd = sel.map(id => { const p = produkte.find(x => x.id === id); return { id, name: p?.name || id, preis: p?.preis || 0 }; });
    const vkKasse = kassenItems.filter(it => it.selected).map(it => ({ id: "kasse_" + Date.now() + Math.random(), name: it.name, preis: it.preis || 0 }));
    const vk = [...vkProd, ...vkKasse];
    const erfolge = loadLS("th_erfolge", []);
    erfolge.push({ id: "e" + Date.now(), mitglied: name.trim(), terminart: tart, verkauft: vk, trainer: trainer.name, studio: trainer.studio, datum: new Date().toISOString() });
    saveLS("th_erfolge", erfolge);
    setSaved(true); setTimeout(() => { setName(""); setTart(""); setSel([]); setKassenItems([]); setSaved(false); }, 1500);
  };

  const erfolge = loadLS("th_erfolge", []).filter(x => x.studio === trainer.studio && x.trainer === trainer.name);
  const delErfolg = (id) => { const all = loadLS("th_erfolge", []).filter(x => x.id !== id); saveLS("th_erfolge", all); setShowHistory(h => !h); setTimeout(() => setShowHistory(true), 50); };

  return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4">
      <div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Erfolge erfassen</div>
      <button onClick={() => setShowHistory(!showHistory)} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">{showHistory ? "← Zurück" : "Historie anzeigen"}</button>
    </div>

    {showHistory ? (
      <div className="space-y-2">
        {erfolge.length === 0 && <div className="text-center py-8 text-gray-400 text-sm">Noch keine Erfolge.</div>}
        {erfolge.sort((a,b) => new Date(b.datum) - new Date(a.datum)).map(e => (
          <div key={e.id || e.datum} className="bg-white border border-gray-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-1">
              <div className="text-sm font-medium text-gray-800">{e.mitglied} · <span className="text-gray-500">{TERMINARTEN.find(t => t.id === e.terminart)?.label || e.terminart}</span></div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-400">{new Date(e.datum).toLocaleDateString("de-DE")}</span>
                <button onClick={() => delErfolg(e.id)} className="text-xs text-red-400 hover:text-red-600">✕</button>
              </div>
            </div>
            {e.verkauft?.length > 0 && <div className="text-xs text-gray-500">{e.verkauft.map(v => v.name || v).join(", ")}</div>}
          </div>
        ))}
      </div>
    ) : (
      <div>
        {saved && <div className="mb-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-700 font-medium">✓ Gespeichert</div>}
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <div><label className="text-xs text-gray-500 uppercase tracking-wider">Mitglied</label><input value={name} onChange={e => setName(e.target.value)} placeholder="Name" className="w-full mt-1 px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
            <div><label className="text-xs text-gray-500 uppercase tracking-wider">Terminart</label><select value={tart} onChange={e => setTart(e.target.value)} className="w-full mt-1 px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white"><option value="">Bitte wählen</option>{TERMINARTEN.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}</select></div>
          </div>
          <div><label className="text-xs text-gray-500 uppercase tracking-wider mb-3 block">Verkauft / Gebucht</label>
            {grouped.map(g => (<div key={g.k} className="mb-3"><div className="text-xs font-bold text-gray-400 mb-1.5">{g.k}</div><div className="grid grid-cols-2 gap-2">{g.items.map(p => (
              <button key={p.id} onClick={() => toggle(p.id)} className={`text-left px-3 py-2 rounded-lg text-xs font-medium transition-all border ${sel.includes(p.id) ? "bg-emerald-50 border-emerald-300 text-emerald-800" : "bg-white border-gray-200 text-gray-600 hover:border-gray-300"}`}>
                <span className="mr-2">{sel.includes(p.id) ? "✓" : "○"}</span>{p.name}
              </button>))}</div></div>))}
          </div>

          <div className="border border-dashed border-gray-300 rounded-lg p-4">
            <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Kassenbeleg scannen</div>
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleUpload} className="hidden" />
            <button onClick={() => fileRef.current?.click()} disabled={uploading} className="w-full py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs font-medium rounded-lg transition-colors">
              {uploading ? "Wird analysiert..." : "📸 Screenshot / Foto hochladen"}
            </button>
            {kassenItems.length > 0 && (
              <div className="mt-3 space-y-1">
                <div className="text-xs text-gray-500 mb-1">Erkannte Produkte:</div>
                {kassenItems.map((it, idx) => (
                  <button key={idx} onClick={() => toggleKassen(idx)} className={`w-full text-left px-3 py-2 rounded-lg text-xs font-medium transition-all border ${it.selected ? "bg-emerald-50 border-emerald-300 text-emerald-800" : "bg-white border-gray-200 text-gray-600"}`}>
                    <span className="mr-2">{it.selected ? "✓" : "○"}</span>{it.name} — {it.preis?.toFixed(2)}€
                  </button>
                ))}
              </div>
            )}
          </div>

          <button onClick={save} disabled={!name.trim() || !tart} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-300 text-white font-bold rounded-lg text-sm transition-colors">Erfolg speichern</button>
        </div>
      </div>
    )}
  </div>);
}

function StudioTippsView({ tipps, setTipps }) {
  const [val, setVal] = useState(tipps);
  const [saved, setSaved] = useState(false);
  const save = () => { setTipps(val); saveLS("th_studiotipps", val); setSaved(true); setTimeout(() => setSaved(false), 1500); };
  return (<div className="max-w-3xl mx-auto p-4">
    <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Studio-spezifische Trainingstipps</div>
    <p className="text-sm text-gray-600 mb-4">Diese Tipps fließen automatisch in jedes Briefing ein. Nutze sie für aktuelle Aktionen, Geräte-Empfehlungen oder saisonale Schwerpunkte.</p>
    {saved && <div className="mb-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-700 font-medium">✓ Gespeichert</div>}
    <textarea value={val} onChange={e => setVal(e.target.value)} rows="8" placeholder="z.B. Aktuell Figuroffensive: Bei Abnehmzielen immer myshape empfehlen. Neues eGym Update: Bio-Feedback Modus besonders für Rücken-Mitglieder empfehlen." className="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none resize-none bg-white" />
    <button onClick={save} className="mt-3 w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-lg text-sm transition-colors">Tipps speichern</button>
  </div>);
}

function TeamView({ users, setUsers }) {
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ name: "", studio: STUDIOS[3], rolle: "trainer", pin: "0000" });
  const startAdd = () => { setForm({ name: "", studio: STUDIOS[3], rolle: "trainer", pin: "0000" }); setEdit("new"); };
  const startEdit = u => { setForm({ ...u }); setEdit(u.id); };
  const save = () => { if (!form.name.trim() || !form.pin) return; let nu; if (edit === "new") { nu = [...users, { ...form, id: "u" + Date.now() }]; } else { nu = users.map(u => u.id === edit ? { ...u, ...form } : u); } setUsers(nu); saveLS("th_users", nu); setEdit(null); };
  const del = id => { const nu = users.filter(u => u.id !== id); setUsers(nu); saveLS("th_users", nu); };
  const grouped = STUDIOS.map(s => ({ s, items: users.filter(u => u.studio === s) })).filter(g => g.items.length > 0);
  return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Team verwalten</div><button onClick={startAdd} className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold rounded-lg">+ Trainer</button></div>
    {edit && (<div className="mb-4 p-4 bg-white border border-emerald-300 rounded-lg space-y-3">
      <div className="text-xs font-bold text-emerald-700 uppercase">{edit === "new" ? "Neuer Trainer" : "Bearbeiten"}</div>
      <div className="grid grid-cols-2 gap-3">
        <div><label className="text-xs text-gray-500">Name</label><input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
        <div><label className="text-xs text-gray-500">Studio</label><select value={form.studio} onChange={e => setForm({ ...form, studio: e.target.value })} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white">{STUDIOS.map(s => <option key={s}>{s}</option>)}</select></div>
        <div><label className="text-xs text-gray-500">Rolle</label><select value={form.rolle} onChange={e => setForm({ ...form, rolle: e.target.value })} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white"><option value="trainer">Trainer</option><option value="leitung">Leitung</option></select></div>
        <div><label className="text-xs text-gray-500">PIN</label><input value={form.pin} onChange={e => setForm({ ...form, pin: e.target.value.replace(/\D/g, "").slice(0, 6) })} maxLength="6" className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none tracking-widest text-center" /></div>
      </div>
      <div className="flex gap-2"><button onClick={save} className="px-4 py-2 bg-emerald-600 text-white text-xs font-bold rounded-lg">Speichern</button><button onClick={() => setEdit(null)} className="px-4 py-2 bg-gray-200 text-gray-700 text-xs font-bold rounded-lg">Abbrechen</button></div>
    </div>)}
    {grouped.map(g => (<div key={g.s} className="mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">{g.s}</div><div className="space-y-1">{g.items.map(u => (
      <div key={u.id} className="flex items-center justify-between px-3 py-2.5 rounded-lg border bg-white border-gray-200 text-sm">
        <div className="flex items-center gap-3"><div className={`w-2 h-2 rounded-full ${u.rolle === "leitung" ? "bg-amber-400" : "bg-emerald-400"}`} /><span className="text-gray-800 font-medium">{u.name}</span><span className="text-xs text-gray-400">{u.rolle === "leitung" ? "Leitung" : "Trainer"}</span><span className="text-xs text-gray-300">PIN: {u.pin}</span></div>
        <div className="flex gap-1"><button onClick={() => startEdit(u)} className="text-xs text-gray-400 hover:text-emerald-600 px-2">✎</button><button onClick={() => del(u.id)} className="text-xs text-gray-400 hover:text-red-600 px-2">✕</button></div>
      </div>))}</div></div>))}
  </div>);
}

function ProdukteView({ produkte, setProdukte }) {
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ name: "", preis: 0, einheit: "€", kategorie: KATEGORIEN[0], aktiv: true });
  const startAdd = () => { setForm({ name: "", preis: 0, einheit: "€", kategorie: KATEGORIEN[0], aktiv: true }); setEdit("new"); };
  const startEdit = p => { setForm({ ...p }); setEdit(p.id); };
  const doSave = (np) => { setProdukte(np); saveLS("th_produkte", np); };
  const save = () => { if (!form.name.trim()) return; let np; if (edit === "new") { np = [...produkte, { ...form, id: "p" + Date.now() }]; } else { np = produkte.map(p => p.id === edit ? { ...p, ...form } : p); } doSave(np); setEdit(null); };
  const del = id => doSave(produkte.filter(p => p.id !== id));
  const toggleAktiv = id => doSave(produkte.map(p => p.id === id ? { ...p, aktiv: !p.aktiv } : p));
  const grouped = KATEGORIEN.map(k => ({ k, items: produkte.filter(p => p.kategorie === k) })).filter(g => g.items.length > 0);
  return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Produkte konfigurieren</div><button onClick={startAdd} className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold rounded-lg">+ Produkt</button></div>
    {edit && (<div className="mb-4 p-4 bg-white border border-emerald-300 rounded-lg space-y-3">
      <div className="text-xs font-bold text-emerald-700 uppercase">{edit === "new" ? "Neues Produkt" : "Bearbeiten"}</div>
      <div className="grid grid-cols-2 gap-3">
        <div><label className="text-xs text-gray-500">Name</label><input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
        <div><label className="text-xs text-gray-500">Kategorie</label><select value={form.kategorie} onChange={e => setForm({ ...form, kategorie: e.target.value })} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white">{KATEGORIEN.map(k => <option key={k}>{k}</option>)}</select></div>
        <div><label className="text-xs text-gray-500">Preis</label><input type="number" step="0.01" value={form.preis} onChange={e => setForm({ ...form, preis: parseFloat(e.target.value) || 0 })} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
        <div><label className="text-xs text-gray-500">Einheit</label><select value={form.einheit} onChange={e => setForm({ ...form, einheit: e.target.value })} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white"><option value="€">€ (einmalig)</option><option value="€/Monat">€/Monat</option><option value="€/Woche">€/Woche</option></select></div>
      </div>
      <div className="flex gap-2"><button onClick={save} className="px-4 py-2 bg-emerald-600 text-white text-xs font-bold rounded-lg">Speichern</button><button onClick={() => setEdit(null)} className="px-4 py-2 bg-gray-200 text-gray-700 text-xs font-bold rounded-lg">Abbrechen</button></div>
    </div>)}
    {grouped.map(g => (<div key={g.k} className="mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">{g.k}</div><div className="space-y-1">{g.items.map(p => (
      <div key={p.id} className={`flex items-center justify-between px-3 py-2 rounded-lg border text-sm ${p.aktiv ? "bg-white border-gray-200" : "bg-gray-50 border-gray-100 opacity-50"}`}>
        <div className="flex items-center gap-3"><button onClick={() => toggleAktiv(p.id)} className={`w-5 h-5 rounded border flex items-center justify-center text-xs ${p.aktiv ? "bg-emerald-500 border-emerald-500 text-white" : "border-gray-300"}`}>{p.aktiv ? "✓" : ""}</button><span className={p.aktiv ? "text-gray-800" : "text-gray-400"}>{p.name}</span>{p.preis > 0 && <span className="text-xs text-gray-400">{p.preis}{p.einheit?.includes("Monat") ? "€/Mo" : p.einheit?.includes("Woche") ? "€/Wo" : "€"}</span>}</div>
        <div className="flex gap-1"><button onClick={() => startEdit(p)} className="text-xs text-gray-400 hover:text-emerald-600 px-2">✎</button><button onClick={() => del(p.id)} className="text-xs text-gray-400 hover:text-red-600 px-2">✕</button></div>
      </div>))}</div></div>))}
  </div>);
}

function DashboardView({ trainer }) {
  const isL = trainer.rolle === "leitung";
  const [von, setVon] = useState("");
  const [bis, setBis] = useState("");
  const allData = loadLS("th_erfolge", []).filter(x => isL ? x.studio === trainer.studio : x.studio === trainer.studio && x.trainer === trainer.name);
  const data = allData.filter(e => {
    const d = new Date(e.datum);
    if (von && d < new Date(von)) return false;
    if (bis) { const b = new Date(bis); b.setHours(23,59,59); if (d > b) return false; }
    return true;
  });

  const pc = {};
  data.forEach(e => (e.verkauft || []).forEach(v => { const id = v.id || v; const nm = v.name || v; pc[id] = pc[id] || { name: nm, count: 0, umsatz: 0 }; pc[id].count++; pc[id].umsatz += (v.preis || 0); }));
  const totalV = Object.values(pc).reduce((a, b) => a + b.count, 0);
  const totalU = Object.values(pc).reduce((a, b) => a + b.umsatz, 0);
  const sp = Object.entries(pc).map(([id, d]) => ({ id, ...d })).sort((a, b) => b.count - a.count);
  const mx = Math.max(...sp.map(s => s.count), 1);
  const tc = {};
  if (isL) data.forEach(e => { tc[e.trainer] = tc[e.trainer] || { c: 0, v: 0, u: 0 }; tc[e.trainer].c++; (e.verkauft || []).forEach(v => { tc[e.trainer].v++; tc[e.trainer].u += (v.preis || 0); }); });
  const ac = {};
  data.forEach(e => { const l = TERMINARTEN.find(t => t.id === e.terminart)?.label || e.terminart; ac[l] = (ac[l] || 0) + 1; });

  return (<div className="max-w-4xl mx-auto p-4">
    <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Dashboard · {isL ? trainer.studio : trainer.name}</div>
    <div className="flex items-center gap-3 mb-4">
      <div className="flex items-center gap-2"><label className="text-xs text-gray-500">Von</label><input type="date" value={von} onChange={e => setVon(e.target.value)} className="px-2 py-1.5 border border-gray-300 rounded-lg text-xs focus:border-emerald-500 focus:outline-none" /></div>
      <div className="flex items-center gap-2"><label className="text-xs text-gray-500">Bis</label><input type="date" value={bis} onChange={e => setBis(e.target.value)} className="px-2 py-1.5 border border-gray-300 rounded-lg text-xs focus:border-emerald-500 focus:outline-none" /></div>
      {(von || bis) && <button onClick={() => { setVon(""); setBis(""); }} className="text-xs text-red-400 hover:text-red-600">✕ Reset</button>}
    </div>

    {!data.length ? <div className="text-center py-12 text-gray-400 text-sm">Keine Erfolge im gewählten Zeitraum.</div> : (<div>
      <div className={`grid ${isL ? "grid-cols-4" : "grid-cols-3"} gap-3 mb-4`}>
        {[{ v: data.length, l: "Termine" }, { v: totalV, l: "Verkäufe", c: "text-emerald-600" },
          { v: data.length ? (totalU / data.length).toFixed(0) + "€" : "0€", l: "Ø Umsatz/Termin" },
          ...(isL ? [{ v: totalU.toFixed(0) + "€", l: "Gesamtumsatz", c: "text-emerald-600" }] : [])
        ].map((k, i) => (
          <div key={i} className="bg-white border border-gray-200 rounded-lg p-4 text-center"><div className={`text-2xl font-black ${k.c || "text-gray-900"}`}>{k.v}</div><div className="text-xs text-gray-500 mt-1">{k.l}</div></div>))}
      </div>
      <div className="bg-white border border-gray-200 rounded-lg p-4 mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Produkt-Ranking</div><div className="space-y-2">{sp.map(p => (<div key={p.id} className="flex items-center gap-3">
        <div className="w-44 text-xs text-gray-600 truncate flex-shrink-0">{p.name}</div>
        <div className="flex-1 h-5 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-emerald-500 rounded-full" style={{ width: Math.max((p.count / mx) * 100, 0) + "%", minWidth: p.count > 0 ? "8px" : "0" }} /></div>
        <div className="text-xs font-bold text-gray-700 w-6 text-right">{p.count}×</div>
      </div>))}</div></div>
      {isL && Object.keys(tc).length > 0 && (<div className="bg-white border border-gray-200 rounded-lg p-4 mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Trainer-Performance</div><div className="space-y-2">{Object.entries(tc).sort(([,a],[,b]) => b.u - a.u).map(([n, d]) => (<div key={n} className="flex items-center justify-between text-sm border-b border-gray-100 pb-2 last:border-0"><span className="text-gray-700 font-medium">{n}</span><div className="flex gap-4 text-xs"><span className="text-gray-500">{d.c} Termine</span><span className="text-gray-700 font-bold">{d.v} Verkäufe</span><span className="text-emerald-600 font-bold">{d.u.toFixed(0)}€</span><span className="text-gray-400">Ø {d.c ? (d.u / d.c).toFixed(0) : 0}€/Termin</span></div></div>))}</div></div>)}
      <div className="bg-white border border-gray-200 rounded-lg p-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Terminarten</div><div className="flex gap-6">{Object.entries(ac).map(([l, c]) => (<div key={l} className="text-center"><div className="text-lg font-black text-gray-900">{c}</div><div className="text-xs text-gray-500">{l}</div></div>))}</div></div>
    </div>)}
  </div>);
}

function App() {
  const [view, setView] = useState("login");
  const [trainer, setTrainer] = useState(null);
  const [produkte, setProdukte] = useState(() => loadLS("th_produkte", null) || DEFAULT_PRODUKTE);
  const [users, setUsers] = useState(() => loadLS("th_users", null) || DEFAULT_USERS);
  const [studioTipps, setStudioTipps] = useState(() => loadLS("th_studiotipps", "") || "");
  const company = loadLS("th_company", null) || DEFAULT_COMPANY;

  if (view === "login" || !trainer) return <Login users={users} company={company} onLogin={t => { setTrainer(t); setView("briefing"); }} />;
  return (<div className="min-h-screen bg-gray-50">
    <Nav view={view} setView={setView} trainer={trainer} onLogout={() => { setTrainer(null); setView("login"); }} />
    <div className="py-4">
      {view === "briefing" && <BriefingView studioTipps={studioTipps} />}
      {view === "erfolge" && <ErfolgeView trainer={trainer} produkte={produkte} />}
      {view === "dashboard" && <DashboardView trainer={trainer} />}
      {view === "team" && trainer.rolle === "leitung" && <TeamView users={users} setUsers={setUsers} />}
      {view === "produkte" && trainer.rolle === "leitung" && <ProdukteView produkte={produkte} setProdukte={setProdukte} />}
      {view === "tipps" && trainer.rolle === "leitung" && <StudioTippsView tipps={studioTipps} setTipps={setStudioTipps} />}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
