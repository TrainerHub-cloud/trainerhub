    setEditId(k.id); setEditName(k.name); setErr("");
  };

  const saveEdit = async function() {
    setErr("");
    var name = editName.trim();
    if (!name) { setErr("Name darf nicht leer sein"); return; }
    var alt = kategorien.find(function(k) { return k.id === editId; });
    if (!alt) return;
    if (name === alt.name) { setEditId(null); return; }
    if (kategorien.find(function(k) { return k.id !== editId && k.name.toLowerCase() === name.toLowerCase(); })) {
      setErr("Diese Kategorie gibt es bereits"); return;
    }
    // Erst Kategorie umbenennen, dann alle Produkte mit altem Namen umhängen
    const res1 = await sb.from("kategorien").update({ name: name }).eq("id", editId);
    if (res1.error) { setErr("Fehler: " + res1.error.message); return; }
    const res2 = await sb.from("produkte").update({ kategorie: name }).eq("kategorie", alt.name);
    if (res2.error) { setErr("Kategorie umbenannt, aber Produkte-Update fehlgeschlagen: " + res2.error.message); return; }
    setKategorien(function(prev) { return prev.map(function(k) { return k.id === editId ? Object.assign({}, k, { name: name }) : k; }); });
    setProdukte(function(prev) { return prev.map(function(p) { return p.kategorie === alt.name ? Object.assign({}, p, { kategorie: name }) : p; }); });
    setEditId(null);
  };

  const delKat = async function(k) {
    setErr("");
    if (k.name === "Sonstige") { setErr("Die Kategorie 'Sonstige' kann nicht gelöscht werden — sie ist der Fallback."); return; }
    var n = countMap[k.name] || 0;
    var msg = n > 0
      ? "Kategorie '" + k.name + "' löschen?\n\n" + n + " Produkt(e) werden auf 'Sonstige' verschoben."
      : "Kategorie '" + k.name + "' löschen?";
    if (!confirm(msg)) return;
    if (n > 0) {
      const res1 = await sb.from("produkte").update({ kategorie: "Sonstige" }).eq("kategorie", k.name);
      if (res1.error) { setErr("Fehler beim Umhängen der Produkte: " + res1.error.message); return; }
      setProdukte(function(prev) { return prev.map(function(p) { return p.kategorie === k.name ? Object.assign({}, p, { kategorie: "Sonstige" }) : p; }); });
    }
    const res2 = await sb.from("kategorien").delete().eq("id", k.id);
    if (res2.error) { setErr("Fehler beim Löschen: " + res2.error.message); return; }
    setKategorien(function(prev) { return prev.filter(function(x) { return x.id !== k.id; }); });
  };

  return (<div className="max-w-2xl mx-auto p-4">
    <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Produkt-Kategorien verwalten</div>

    <div className="mb-4 p-4 bg-white border border-gray-200 rounded-lg">
      <label className="text-xs text-gray-500">Neue Kategorie</label>
      <div className="flex gap-2 mt-1">
        <input value={neuName} onChange={function(e) { setNeuName(e.target.value); }} placeholder="z.B. Ernährungsberatung" className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" />
        <button onClick={addKat} disabled={creating || !neuName.trim()} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-300 text-white text-xs font-bold rounded-lg">{creating ? "..." : "+ Anlegen"}</button>
      </div>
    </div>

    {err && <div className="mb-3 p-2 bg-red-50 border border-red-200 rounded text-xs text-red-700">{err}</div>}

    <div className="space-y-1">
      {sorted.map(function(k) {
        var n = countMap[k.name] || 0;
        var isSonstige = k.name === "Sonstige";
        return (<div key={k.id} className="flex items-center justify-between px-3 py-2 bg-white border border-gray-200 rounded-lg">
          {editId === k.id ? (
            <div className="flex-1 flex gap-2">
              <input value={editName} onChange={function(e) { setEditName(e.target.value); }} className="flex-1 px-2 py-1 border border-emerald-300 rounded text-sm focus:border-emerald-500 focus:outline-none" autoFocus />
              <button onClick={saveEdit} className="px-3 py-1 bg-emerald-600 text-white text-xs font-bold rounded">Speichern</button>
              <button onClick={function() { setEditId(null); }} className="px-3 py-1 bg-gray-200 text-gray-700 text-xs font-bold rounded">Abbrechen</button>
            </div>
          ) : (
            <>
              <div className="flex items-center gap-3">
                <span className="text-sm text-gray-800">{k.name}</span>
                {isSonstige && <span className="text-xs text-gray-400">(Fallback)</span>}
                <span className="text-xs text-gray-400">{n} Produkt{n === 1 ? "" : "e"}</span>
              </div>
              <div className="flex items-center gap-1">
                <button onClick={function() { startEdit(k); }} title="Umbenennen" className="text-xs text-gray-400 hover:text-emerald-600 px-2">&#9998;</button>
                {!isSonstige && <button onClick={function() { delKat(k); }} title="Löschen" className="text-xs text-gray-400 hover:text-red-600 px-2">×</button>}
              </div>
            </>
          )}
        </div>);
      })}
    </div>

    <div className="mt-6 p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700">
      <div className="font-bold mb-1">Hinweis</div>
      <div>Beim Löschen einer Kategorie werden alle darin enthaltenen Produkte automatisch in 'Sonstige' verschoben. Umbenennen aktualisiert auch alle Produkte, die diese Kategorie nutzen.</div>
    </div>
  </div>);
}

function BerichteView({ trainer, users, erfolge, terminarten, produkte }) {
  const isAdmin = trainer.rolle === "admin";
  const isLeitung = trainer.rolle === "leitung";
  const isTrainer = trainer.rolle === "trainer";
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth() + 1); // 1-12
  const [targetTrainerId, setTargetTrainerId] = useState(trainer.id);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const tartLabel = function(id) { var t = (terminarten || []).find(function(x) { return x.id === id; }); return t ? t.label : id; };
  const tartIsGruppe = function(id) { var t = (terminarten || []).find(function(x) { return x.id === id; }); return t ? t.is_gruppentermin === true : false; };

  // Wer darf welchen Bericht ziehen:
  // - Trainer: nur sich selbst
  // - Leitung: alle im eigenen Studio
  // - Admin: alle
  const selectableUsers = isAdmin
    ? users
    : isLeitung
      ? users.filter(function(u) { return u.studio === trainer.studio; })
      : users.filter(function(u) { return u.id === trainer.id; });

  const monthLabels = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  const yearOptions = [];
  for (var y = today.getFullYear(); y >= today.getFullYear() - 2; y--) yearOptions.push(y);

  const generate = async function() {
    setErr(""); setBusy(true);
    try {
      var target = users.find(function(u) { return u.id === targetTrainerId; });
      if (!target) { setErr("Trainer nicht gefunden."); setBusy(false); return; }

      // Zeitraum: vom 1. des Monats bis zum letzten Tag des Monats inklusive
      var von = new Date(year, month - 1, 1, 0, 0, 0);
      var bis = new Date(year, month, 0, 23, 59, 59);

      // Bericht-Erfolge filtern
      var data = erfolge.filter(function(e) {
        if (e.trainer_id !== targetTrainerId) return false;
        var d = new Date(e.datum);
        return d >= von && d <= bis;
      }).sort(function(a, b) { return new Date(a.datum) - new Date(b.datum); });

      if (data.length === 0) {
        setErr("Keine Erfolge im gewählten Zeitraum für " + target.name + ".");
        setBusy(false);
        return;
      }

      // Sheet 1: Termine (Detailliste)
      var rows1 = [["Datum", "Nr.", "Studio", "Terminart", "Gruppe", "Teilnehmer", "Verkäufe", "Anzahl Verkäufe", "Umsatz €"]];
      data.forEach(function(e) {
        var dDate = new Date(e.datum);
        var verk = e.verkauft || [];
        var verkNamen = verk.map(function(v) { return v.name || v.id || ""; }).join(", ");
        var verkSum = verk.reduce(function(s, v) { return s + (Number(v.preis) || 0); }, 0);
        rows1.push([
          dDate.toLocaleDateString("de-DE"),
          e.nummer || "",
          e.studio || "",
          tartLabel(e.terminart),
          tartIsGruppe(e.terminart) ? "Ja" : "Nein",
          e.teilnehmer_anzahl != null ? e.teilnehmer_anzahl : "",
          verkNamen,
          verk.length,
          Number(verkSum.toFixed(2))
        ]);
      });

      // Sheet 2: Zusammenfassung (KPIs)
      var einzelData = data.filter(function(e) { return !tartIsGruppe(e.terminart); });
      var gruppenData = data.filter(function(e) { return tartIsGruppe(e.terminart); });
      var totalVerkaufe = 0, totalUmsatz = 0;
      data.forEach(function(e) {
        (e.verkauft || []).forEach(function(v) {
          totalVerkaufe++;
          totalUmsatz += Number(v.preis) || 0;
        });
      });
      var totalTeilnehmer = gruppenData.reduce(function(s, e) { return s + (e.teilnehmer_anzahl || 0); }, 0);
      var avgTeilnehmer = gruppenData.length > 0 ? (totalTeilnehmer / gruppenData.length) : 0;

      var rows2 = [
        ["Trainer", target.name],
        ["Heimatstudio", target.studio],
        ["Berichtszeitraum", monthLabels[month - 1] + " " + year],
        ["", ""],
        ["Termine gesamt", data.length],
        ["  davon Einzeltermine", einzelData.length],
        ["  davon Gruppentermine", gruppenData.length],
        ["", ""],
        ["Verkäufe gesamt", totalVerkaufe],
        ["Umsatz gesamt €", Number(totalUmsatz.toFixed(2))],
        ["Ø Umsatz/Termin €", einzelData.length > 0 ? Number((totalUmsatz / einzelData.length).toFixed(2)) : 0],
        ["", ""],
        ["Teilnehmer gesamt (Gruppen)", totalTeilnehmer],
        ["Ø Teilnehmer/Gruppentermin", Number(avgTeilnehmer.toFixed(1))]
      ];

      // Sheet 3: Pro Terminart aufschlüsseln
      var byArt = {};
      data.forEach(function(e) {
        var l = tartLabel(e.terminart);
        if (!byArt[l]) byArt[l] = { count: 0, verkaufe: 0, umsatz: 0, teilnehmer: 0, gruppe: tartIsGruppe(e.terminart) };
        byArt[l].count++;
        if (e.teilnehmer_anzahl != null) byArt[l].teilnehmer += e.teilnehmer_anzahl;
        (e.verkauft || []).forEach(function(v) {
          byArt[l].verkaufe++;
          byArt[l].umsatz += Number(v.preis) || 0;
        });
      });
      var rows3 = [["Terminart", "Anzahl", "Gruppentermin", "Teilnehmer ges.", "Verkäufe", "Umsatz €"]];
      Object.keys(byArt).sort().forEach(function(l) {
        var x = byArt[l];
        rows3.push([
          l, x.count, x.gruppe ? "Ja" : "Nein",
          x.gruppe ? x.teilnehmer : "",
          x.verkaufe, Number(x.umsatz.toFixed(2))
        ]);
      });

      // Workbook bauen
      var wb = XLSX.utils.book_new();
      var ws1 = XLSX.utils.aoa_to_sheet(rows1);
      ws1["!cols"] = [{wch:12},{wch:5},{wch:12},{wch:25},{wch:8},{wch:11},{wch:40},{wch:8},{wch:10}];
      XLSX.utils.book_append_sheet(wb, ws1, "Termine");

      var ws2 = XLSX.utils.aoa_to_sheet(rows2);
      ws2["!cols"] = [{wch:30},{wch:18}];
      XLSX.utils.book_append_sheet(wb, ws2, "Zusammenfassung");

      var ws3 = XLSX.utils.aoa_to_sheet(rows3);
      ws3["!cols"] = [{wch:30},{wch:8},{wch:14},{wch:15},{wch:10},{wch:12}];
      XLSX.utils.book_append_sheet(wb, ws3, "Pro Terminart");

      // Datei-Name
      var fname = "Monatsbericht_" + target.name.replace(/\s+/g, "_") + "_" + year + "-" + String(month).padStart(2, "0") + ".xlsx";
      XLSX.writeFile(wb, fname);
    } catch (e) {
      setErr("Fehler beim Erstellen: " + (e.message || JSON.stringify(e)));
    } finally {
      setBusy(false);
    }
  };

  return (<div className="max-w-2xl mx-auto p-4">
    <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Monatsbericht</div>

    <div className="bg-white border border-gray-200 rounded-lg p-4 space-y-3">
      <div>
        <label className="text-xs text-gray-500 uppercase tracking-wider">Trainer</label>
        <select value={targetTrainerId} onChange={function(e) { setTargetTrainerId(e.target.value); }} disabled={isTrainer} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white disabled:bg-gray-100">
          {selectableUsers.sort(function(a,b) { return a.name.localeCompare(b.name, "de"); }).map(function(u) { return <option key={u.id} value={u.id}>{u.name} · {u.studio}</option>; })}
        </select>
        {isTrainer && <p className="text-xs text-gray-400 mt-1">Du kannst nur deinen eigenen Bericht runterladen.</p>}
        {isLeitung && <p className="text-xs text-gray-400 mt-1">Als Leitung siehst du alle Trainer aus {trainer.studio}.</p>}
        {isAdmin && <p className="text-xs text-gray-400 mt-1">Als Admin siehst du alle Trainer aller Studios.</p>}
      </div>

      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="text-xs text-gray-500 uppercase tracking-wider">Monat</label>
          <select value={month} onChange={function(e) { setMonth(parseInt(e.target.value, 10)); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white">
            {monthLabels.map(function(l, i) { return <option key={i+1} value={i+1}>{l}</option>; })}
          </select>
        </div>
        <div>
          <label className="text-xs text-gray-500 uppercase tracking-wider">Jahr</label>
          <select value={year} onChange={function(e) { setYear(parseInt(e.target.value, 10)); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white">
            {yearOptions.map(function(y) { return <option key={y} value={y}>{y}</option>; })}
          </select>
        </div>
      </div>

      {err && <div className="p-2 bg-red-50 border border-red-200 rounded text-xs text-red-700">{err}</div>}

      <button onClick={generate} disabled={busy || !targetTrainerId} className="w-full py-2.5 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-300 text-white text-sm font-bold rounded-lg">
        {busy ? "Wird erstellt..." : "📥 Bericht als Excel herunterladen"}
      </button>
    </div>

    <div className="mt-6 p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700">
      <div className="font-bold mb-1">Was ist im Bericht enthalten?</div>
      <div>Drei Tabellen-Blätter: alle Termine im Detail (mit Termin-Nr., Verkäufen, Teilnehmern), eine Zusammenfassung mit KPIs und eine Aufschlüsselung pro Terminart. Bei Gruppenterminen ist die Teilnehmerzahl statt Mitgliedsdaten erfasst.</div>
    </div>
  </div>);
}

function App() {
  const [view, setView] = useState("briefing");
  const [trainer, setTrainer] = useState(null);
  const [aktivesStudio, setAktivesStudio] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [showProfil, setShowProfil] = useState(false);
  const [users, setUsers] = useState([]);
  const [produkte, setProdukte] = useState([]);
  const [verfuegbarkeit, setVerfuegbarkeit] = useState([]);
  const [erfolge, setErfolge] = useState([]);
  const [ziele, setZiele] = useState([]);
  const [kategorien, setKategorien] = useState([]);
  const [terminarten, setTerminarten] = useState([]);
  const [studioTipps, setStudioTipps] = useState("");
  const [ready, setReady] = useState(false);
  const [erfolgeFullLoad, setErfolgeFullLoad] = useState(false);
  const [erfolgeReloading, setErfolgeReloading] = useState(false);

  // Auth-State: lädt Profil aus users-Tabelle für aktuellen Auth-User
  const loadProfile = async function(authUser) {
    if (!authUser) { setTrainer(null); setAktivesStudio(null); return; }
    const res = await sb.from("users").select("*").eq("id", authUser.id).single();
    if (res.data) {
      const t = { id: res.data.id, name: res.data.name, studio: res.data.studio, rolle: res.data.rolle };
      setTrainer(t);
      setAktivesStudio(t.studio); // Default = Heimatstudio
    } else {
      setTrainer(null);
      sb.auth.signOut();
    }
  };

  // Beim Mount: aktuellen Session-Status prüfen + Listener registrieren
  useEffect(function() {
    sb.auth.getSession().then(function(res) {
      const session = res.data.session;
      if (session) loadProfile(session.user);
      setAuthChecked(true);
    });
    const { data: listener } = sb.auth.onAuthStateChange(function(event, session) {
      if (session) loadProfile(session.user);
      else { setTrainer(null); setAktivesStudio(null); }
    });
    return function() { listener.subscription.unsubscribe(); };
  }, []);

  // Daten laden, sobald Trainer eingeloggt ist (vorher würde RLS blockieren)
  // Erfolge: standardmäßig nur letzte 30 Tage (Egress-Optimierung).
  // Vollladung über Toggle in Dashboard/Erfolge-Historie.
  useEffect(function() {
    if (!trainer) { setReady(false); return; }
    var thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString();
    var erfolgeQuery = erfolgeFullLoad
      ? sb.from("erfolge").select("*")
      : sb.from("erfolge").select("*").gte("datum", thirtyDaysAgo);
    Promise.all([
      sb.from("users").select("*"),
      sb.from("produkte").select("*"),
      erfolgeQuery,
      sb.from("ziele").select("*"),
      sb.from("produkt_verfuegbarkeit").select("*"),
      sb.from("kategorien").select("*"),
      sb.from("terminarten").select("*")
    ]).then(function(results) {
      if (results[0].data) setUsers(results[0].data);
      if (results[1].data) setProdukte(results[1].data);
      if (results[2].data) setErfolge(results[2].data);
      if (results[3].data) setZiele(results[3].data);
      if (results[4].data) setVerfuegbarkeit(results[4].data);
      if (results[5].data) setKategorien(results[5].data);
      if (results[6].data) setTerminarten(results[6].data);
      setReady(true);
    });
  }, [trainer, erfolgeFullLoad]);

  // Manueller Reload "Alle Erfolge laden" (Toggle aus Dashboard)
  const reloadErfolge = function(full) {
    setErfolgeReloading(true);
    setErfolgeFullLoad(full);
    // useEffect oben löst automatisch neu aus durch Dependency
    setTimeout(function() { setErfolgeReloading(false); }, 1500);
  };

  // Studio-Tipps neu laden, wenn aktives Studio wechselt (für Briefing-Kontext)
  useEffect(function() {
    if (!aktivesStudio) return;
    sb.from("studio_tipps").select("tipps").eq("studio", aktivesStudio).single().then(function(res) {
      setStudioTipps(res.data ? (res.data.tipps || "") : "");
    });
  }, [aktivesStudio]);

  const logout = async function() {
    await sb.auth.signOut();
    setTrainer(null);
    setAktivesStudio(null);
    setView("briefing");
  };

  if (!authChecked) return <div className="min-h-screen bg-gray-900 flex items-center justify-center"><div className="text-gray-500 text-sm">Lade...</div></div>;
  if (!trainer) return <Login />;
  if (!ready || !aktivesStudio) return <div className="min-h-screen bg-gray-50 flex items-center justify-center"><div className="text-gray-500 text-sm">Lade Daten...</div></div>;

  // Kontext-Trainer: Heimatstudio bleibt erhalten, aber für Studio-bezogene Operationen nutzen wir aktivesStudio.
  // ctxStudio ist das, was Views als "ihr aktuelles Studio" sehen sollen.
  const ctx = Object.assign({}, trainer, { studio: aktivesStudio });

  return (<div className="min-h-screen bg-gray-50">
    <Nav view={view} setView={setView} trainer={trainer} aktivesStudio={aktivesStudio} setAktivesStudio={setAktivesStudio} onLogout={logout} onProfilClick={function() { setShowProfil(true); }} />
    {showProfil && <ProfilModal trainer={trainer} onClose={function() { setShowProfil(false); }} />}
    <div className="py-4">
      {view === "briefing" && <BriefingView studioTipps={studioTipps} trainer={ctx} produkte={produkte} verfuegbarkeit={verfuegbarkeit} />}
      {view === "erfolge" && <ErfolgeView trainer={trainer} aktivesStudio={aktivesStudio} produkte={produkte} verfuegbarkeit={verfuegbarkeit} erfolge={erfolge} setErfolge={setErfolge} kategorien={kategorien} terminarten={terminarten} />}
      {view === "dashboard" && <DashboardView trainer={ctx} produkte={produkte} erfolge={erfolge} ziele={ziele} kategorien={kategorien} terminarten={terminarten} erfolgeFullLoad={erfolgeFullLoad} reloadErfolge={reloadErfolge} erfolgeReloading={erfolgeReloading} />}
      {view === "berichte" && <BerichteView trainer={trainer} users={users} erfolge={erfolge} terminarten={terminarten} produkte={produkte} />}
      {view === "team" && (trainer.rolle === "leitung" || trainer.rolle === "admin") && <TeamView trainer={trainer} users={users} setUsers={setUsers} />}
      {view === "produkte" && (trainer.rolle === "leitung" || trainer.rolle === "admin") && <ProdukteView trainer={ctx} produkte={produkte} setProdukte={setProdukte} verfuegbarkeit={verfuegbarkeit} setVerfuegbarkeit={setVerfuegbarkeit} kategorien={kategorien} erfolge={erfolge} setErfolge={setErfolge} />}
      {view === "kategorien" && (trainer.rolle === "leitung" || trainer.rolle === "admin") && <KategorienView kategorien={kategorien} setKategorien={setKategorien} produkte={produkte} setProdukte={setProdukte} />}
      {view === "terminarten" && (trainer.rolle === "leitung" || trainer.rolle === "admin") && <TerminartenView terminarten={terminarten} setTerminarten={setTerminarten} erfolge={erfolge} setErfolge={setErfolge} trainer={trainer} />}
      {view === "ziele" && (trainer.rolle === "leitung" || trainer.rolle === "admin") && <ZieleView trainer={ctx} produkte={produkte} verfuegbarkeit={verfuegbarkeit} ziele={ziele} setZiele={setZiele} erfolge={erfolge} />}
      {view === "tipps" && (trainer.rolle === "leitung" || trainer.rolle === "admin") && <StudioTippsView trainer={ctx} />}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
