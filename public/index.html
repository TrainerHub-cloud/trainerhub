// Helper: liefert Produkte, die für ein bestimmtes Studio verfügbar UND aktiv sind
function getStudioProdukte(produkte, verfuegbarkeit, studio) {
  if (!studio) return [];
  const idsForStudio = new Set(verfuegbarkeit.filter(function(v) { return v.studio === studio; }).map(function(v) { return v.produkt_id; }));
  return produkte.filter(function(p) { return p.aktiv && idsForStudio.has(p.id); });
}

// Helper: liefert Studios, in denen ein Produkt verfügbar ist
function getProduktStudios(verfuegbarkeit, produktId) {
  return verfuegbarkeit.filter(function(v) { return v.produkt_id === produktId; }).map(function(v) { return v.studio; });
}

// Cache: Geräte pro Studio werden beim ersten Briefing geladen und im Browser zwischengespeichert
const geraeteCache = {};
async function loadStudioGeraete(studio) {
  if (geraeteCache[studio]) return geraeteCache[studio];
  const res = await sb.from("studio_geraete").select("kategorie, name, exklusiv").eq("studio", studio).eq("aktiv", true);
  const out = { fitness: [], wellness: [], diagnostik: [], exklusiv: [] };
  if (res.data) {
    res.data.forEach(function(g) {
      if (out[g.kategorie]) out[g.kategorie].push(g.name);
      if (g.exklusiv) out.exklusiv.push(g.name);
    });
  }
  geraeteCache[studio] = out;
  return out;
}

// Pseudonymisierung: vor jedem API-Call werden Klarnamen, Geburtsdaten, E-Mails und Telefonnummern entfernt.
// Liefert {clean, removed} zurück, damit der Trainer sieht, was rausgefiltert wurde.
function pseudonymize(text) {
  if (!text) return { clean: "", removed: [] };
  let clean = text;
  const removed = [];
  // E-Mail
  if (/[\w.+-]+@[\w-]+\.[\w.-]+/.test(clean)) { clean = clean.replace(/[\w.+-]+@[\w-]+\.[\w.-]+/g, "[E-Mail]"); removed.push("E-Mail"); }
  // Telefon (deutsche Formate, mind. 7 Ziffern, optional + und Bindestriche/Leerzeichen)
  if (/(\+?\d[\d\s\-\/]{6,}\d)/.test(clean)) { clean = clean.replace(/(\+?\d[\d\s\-\/]{6,}\d)/g, "[Telefon]"); removed.push("Telefon"); }
  // Geburtsdatum / Datum DD.MM.YYYY oder DD.MM.YY
  if (/\b\d{1,2}\.\d{1,2}\.\d{2,4}\b/.test(clean)) { clean = clean.replace(/\b\d{1,2}\.\d{1,2}\.\d{2,4}\b/g, "[Datum]"); removed.push("Datum"); }
  // Namen mit Anrede: "Frau Müller", "Herr Dr. Schmidt-Meyer"
  if (/\b(Herr|Frau|Hr\.|Fr\.)\s+(Dr\.\s+|Prof\.\s+)?[A-ZÄÖÜ][a-zäöüß]+(-[A-ZÄÖÜ][a-zäöüß]+)?(\s+[A-ZÄÖÜ][a-zäöüß]+(-[A-ZÄÖÜ][a-zäöüß]+)?)?/.test(clean)) {
    clean = clean.replace(/\b(Herr|Frau|Hr\.|Fr\.)\s+(Dr\.\s+|Prof\.\s+)?[A-ZÄÖÜ][a-zäöüß]+(-[A-ZÄÖÜ][a-zäöüß]+)?(\s+[A-ZÄÖÜ][a-zäöüß]+(-[A-ZÄÖÜ][a-zäöüß]+)?)?/g, "[Mitglied]");
    removed.push("Name");
  }
  // Felder mit Doppelpunkt: "Name: Max Mustermann", "Mitglied: ..."
  if (/^\s*(Name|Mitglied|Vorname|Nachname|Adresse|Anschrift|Straße|PLZ|Ort|Wohnort|Telefon|Tel|Mobil|Handy|E-?Mail|Mail|Geburtsdatum|Geb)\s*:\s*.+$/im.test(clean)) {
    clean = clean.replace(/^\s*(Name|Mitglied|Vorname|Nachname|Adresse|Anschrift|Straße|PLZ|Ort|Wohnort|Telefon|Tel|Mobil|Handy|E-?Mail|Mail|Geburtsdatum|Geb)\s*:\s*.+$/gim, "$1: [entfernt]");
    if (!removed.includes("Personenfeld")) removed.push("Personenfeld");
  }
  return { clean: clean, removed: Array.from(new Set(removed)) };
}

async function callAPI(anamnese, letzter, studioTipps, studio, studioProdukte, mode) {
  // mode: "kompakt" (default) | "detail"
  const m = mode === "detail" ? "detail" : "kompakt";
  // Pseudonymisierung VOR dem API-Call
  const a = pseudonymize(anamnese);
  const l = pseudonymize(letzter || "");
  const removedAll = Array.from(new Set([].concat(a.removed, l.removed)));
  let msg = "ANAMNESE:\n" + a.clean;
  if (l.clean && l.clean.trim()) msg += "\n\nLETZTER TERMIN:\n" + l.clean;
  try {
    const geraete = studio ? await loadStudioGeraete(studio) : null;
    const r = await fetch("/api/generate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-opus-4-6", max_tokens: m === "detail" ? 2500 : 1500, system: buildSYS(studioTipps, studio, geraete, studioProdukte, m), messages: [{ role: "user", content: msg }] }),
    });
    if (!r.ok) { const e = await r.json().catch(function() { return {}; }); const m2 = typeof e.error === "string" ? e.error : (e.error?.message || JSON.stringify(e)); throw new Error(m2); }
    const d = await r.json();
    let text = d.content.filter(function(b) { return b.type === "text"; }).map(function(b) { return b.text; }).join("\n");
    // Post-Filter: Verkaufsanker gegen Whitelist matchen
    const filtered = filterVerkaufsanker(text, studioProdukte || []);
    return { ok: true, text: filtered.text, removed: removedAll, removedAnker: filtered.removedAnker };
  } catch (e) { return { ok: false, text: e.message, removed: removedAll, removedAnker: [] }; }
}

// Post-Filter: prüft den VERKAUFSANKER-Abschnitt und entfernt Bullet-Points,
// die kein zugelassenes Produkt aus der Whitelist enthalten.
function filterVerkaufsanker(text, studioProdukte) {
  if (!text || !text.includes("VERKAUFSANKER")) return { text: text, removedAnker: [] };
  const whitelist = studioProdukte.filter(function(p) { return p.preis && Number(p.preis) > 0; }).map(function(p) { return p.name.toLowerCase(); });
  if (whitelist.length === 0) return { text: text, removedAnker: [] };
  // Zerlegen in Abschnitte: alles zwischen "VERKAUFSANKER" und nächster Headline (### oder ENDE)
  const lines = text.split("\n");
  const out = [];
  const removedAnker = [];
  let inAnker = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const isHeadline = /^#{1,4}\s/.test(line) || /^[A-ZÄÖÜ\s]{4,}$/.test(line.trim());
    if (line.includes("VERKAUFSANKER")) { inAnker = true; out.push(line); continue; }
    if (inAnker && isHeadline && !line.includes("VERKAUFSANKER")) { inAnker = false; out.push(line); continue; }
    if (inAnker) {
      // Bullet-Point: prüfen ob ein Whitelist-Eintrag drinsteht
      const isBullet = /^[\s]*[▸\-\*•]/.test(line) || /^\s*\d+\./.test(line);
      if (isBullet && line.trim().length > 3) {
        const lower = line.toLowerCase();
        const match = whitelist.some(function(name) { return lower.includes(name); });
        if (!match) {
          // Ankerzeile entfernen, kurzen Auszug merken
          const excerpt = line.replace(/^[\s▸\-\*•\d\.]+/, "").split(/[:\(\—\-]/)[0].trim().slice(0, 60);
          if (excerpt) removedAnker.push(excerpt);
          continue;
        }
      }
    }
    out.push(line);
  }
  let cleanedText = out.join("\n");
  // Falls am Ende KEIN gültiger Anker mehr im Verkaufsanker-Block steht, Hinweis ergänzen
  if (removedAnker.length > 0) {
    cleanedText = cleanedText.replace(
      /(VERKAUFSANKER[^\n]*\n)((?:(?![\#\n]{1,4}\s|^[A-ZÄÖÜ\s]{4,}$)[^\n]*\n?)*)/,
      function(match, header, body) {
        if (!/[▸\-\*•]/.test(body)) {
          return header + "▸Keine zugelassenen Verkaufsanker für diese Anamnese gefunden.\n";
        }
        return match;
      }
    );
  }
  return { text: cleanedText, removedAnker: removedAnker };
}

async function parseScreenshot(base64) {
  try {
    const r = await fetch("/api/generate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-opus-4-6", max_tokens: 1000,
        system: "Du analysierst Screenshots aus Kassensystemen (z.B. Magicline). Extrahiere alle Produkte mit Namen und Preisen. Antworte NUR mit einem JSON-Array, kein anderer Text. Format: [{\"name\":\"Produktname\",\"preis\":12.90}]. Wenn du nichts erkennst, antworte mit [].",
        messages: [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
          { type: "text", text: "Extrahiere alle Produkte und Preise aus diesem Screenshot." }
        ]}]
      }),
    });
    if (!r.ok) throw new Error("API Fehler");
    const d = await r.json();
    const txt = d.content.filter(function(b) { return b.type === "text"; }).map(function(b) { return b.text; }).join("");
    const clean = txt.replace(/`{3}json|`{3}/g, "").trim();
    return JSON.parse(clean);
  } catch (e) { return []; }
}

function Briefing({ text }) {
  if (!text) return null;
  const parts = text.split(/(?=^### )/gm).filter(function(p) { return p.trim().startsWith("### "); });
  const colors = { "ACHTUNG": ["bg-red-50", "border-red-300", "text-red-700"], "OFFENE PUNKTE": ["bg-amber-50", "border-amber-300", "text-amber-700"] };
  return React.createElement("div", { className: "space-y-3" }, parts.map(function(p, i) {
    var nl = p.indexOf("\n"); if (nl === -1) return null;
    var title = p.slice(4, nl).trim(), body = p.slice(nl + 1).trim();
    var c = colors[title] || ["bg-white", "border-gray-200", "text-emerald-700"];
    return React.createElement("div", { key: i, className: "p-4 rounded-lg border " + c[0] + " " + c[1] },
      React.createElement("div", { className: "font-bold text-xs uppercase tracking-wider mb-2 " + c[2] }, title),
      React.createElement("div", { className: "text-sm text-gray-800 leading-relaxed" },
        body.split("\n").map(function(line, j) {
          if (!line.trim()) return null;
          if (line.startsWith("- ")) {
            var ct = line.slice(2), sg = ct.split(/\*\*(.*?)\*\*/g);
            return React.createElement("div", { key: j, className: "flex gap-2 mb-1.5" },
              React.createElement("span", { className: "text-emerald-500 mt-0.5 flex-shrink-0" }, "▸"),
              React.createElement("span", null, sg.map(function(s, k) {
                return k % 2 === 1 ? React.createElement("strong", { key: k }, s) : React.createElement("span", { key: k }, s);
              }))
            );
          }
          return React.createElement("p", { key: j, className: "mb-1" }, line);
        })
      )
    );
  }));
}

function ProfilModal({ trainer, onClose }) {
  const [oldPw, setOldPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [confirmPw, setConfirmPw] = useState("");
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [ok, setOk] = useState("");
  const [email, setEmail] = useState("");

  // E-Mail aus Auth-Session laden (steht nicht im trainer-Objekt, da nur public-Daten dort)
  useEffect(function() {
    sb.auth.getUser().then(function(res) {
      if (res.data && res.data.user) setEmail(res.data.user.email || "");
    });
  }, []);

  const change = async function() {
    setErr(""); setOk("");
    if (!oldPw || !newPw || !confirmPw) { setErr("Alle Felder ausfüllen"); return; }
    if (newPw.length < 8) { setErr("Neues Passwort muss mindestens 8 Zeichen haben"); return; }
    if (newPw !== confirmPw) { setErr("Passwort und Bestätigung stimmen nicht überein"); return; }
    if (oldPw === newPw) { setErr("Neues Passwort muss sich vom alten unterscheiden"); return; }

    setLoading(true);
    // 1. Reauth: altes Passwort verifizieren über erneuten Login
    const reauth = await sb.auth.signInWithPassword({ email: email, password: oldPw });
    if (reauth.error) {
      setLoading(false);
      setErr("Aktuelles Passwort ist falsch");
      setOldPw("");
      return;
    }
    // 2. Passwort ändern
    const { error } = await sb.auth.updateUser({ password: newPw });
    setLoading(false);
    if (error) {
      setErr("Fehler beim Ändern: " + error.message);
      return;
    }
    setOk("Passwort wurde geändert. Du bleibst eingeloggt.");
    setOldPw(""); setNewPw(""); setConfirmPw("");
    setTimeout(function() { onClose(); }, 2500);
  };

  return (<div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" onClick={onClose}>
    <div className="bg-white rounded-xl max-w-md w-full p-6 space-y-4" onClick={function(e) { e.stopPropagation(); }}>
      <div className="flex items-center justify-between">
        <div className="text-lg font-bold text-gray-800">Mein Profil</div>
        <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">&#10005;</button>
      </div>

      <div className="space-y-2 pb-4 border-b border-gray-200">
        <div className="flex justify-between text-sm"><span className="text-gray-500">Name</span><span className="text-gray-800 font-medium">{trainer.name}</span></div>
        <div className="flex justify-between text-sm"><span className="text-gray-500">E-Mail</span><span className="text-gray-800 font-medium text-xs">{email}</span></div>
        <div className="flex justify-between text-sm"><span className="text-gray-500">Heimatstudio</span><span className="text-gray-800 font-medium">{trainer.studio}</span></div>
        <div className="flex justify-between text-sm"><span className="text-gray-500">Rolle</span><span className="text-gray-800 font-medium">{trainer.rolle === "admin" ? "Admin" : trainer.rolle === "leitung" ? "Leitung" : "Trainer"}</span></div>
      </div>

      <div className="space-y-3">
        <div className="text-sm font-bold text-gray-700">Passwort ändern</div>
        <div>
          <label className="text-xs text-gray-500">Aktuelles Passwort</label>
          <input type="password" autoComplete="current-password" value={oldPw} onChange={function(e) { setOldPw(e.target.value); setErr(""); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" />
        </div>
        <div>
          <label className="text-xs text-gray-500">Neues Passwort (mindestens 8 Zeichen)</label>
          <input type="password" autoComplete="new-password" value={newPw} onChange={function(e) { setNewPw(e.target.value); setErr(""); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" />
        </div>
        <div>
          <label className="text-xs text-gray-500">Neues Passwort bestätigen</label>
          <input type="password" autoComplete="new-password" value={confirmPw} onChange={function(e) { setConfirmPw(e.target.value); setErr(""); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" onKeyDown={function(e) { if(e.key==="Enter") change(); }} />
        </div>
        {err && <div className="p-2 bg-red-50 border border-red-200 rounded text-xs text-red-700">{err}</div>}
        {ok && <div className="p-2 bg-emerald-50 border border-emerald-200 rounded text-xs text-emerald-700">{ok}</div>}
        <div className="flex gap-2">
          <button onClick={change} disabled={loading} className="flex-1 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-400 text-white text-sm font-bold rounded-lg">{loading ? "Ändere..." : "Passwort ändern"}</button>
          <button onClick={onClose} className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-bold rounded-lg">Abbrechen</button>
        </div>
      </div>
    </div>
  </div>);
}

function BriefingView({ studioTipps, trainer, produkte, verfuegbarkeit }) {
  const [ana, setAna] = useState("");
  const [lt, setLt] = useState("");
  const [result, setResult] = useState(null);
  const [detail, setDetail] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadingDetail, setLoadingDetail] = useState(false);
  const [err, setErr] = useState(null);
  const [showLt, setShowLt] = useState(false);
  const [consent, setConsent] = useState(false);
  const [removed, setRemoved] = useState([]);
  const [removedAnker, setRemovedAnker] = useState([]);
  const go = async function() {
    if (!ana.trim() || !consent) return;
    setLoading(true); setErr(null); setResult(null); setDetail(null); setRemoved([]); setRemovedAnker([]);
    const studioProdukte = getStudioProdukte(produkte, verfuegbarkeit, trainer.studio);
    const r = await callAPI(ana, lt, studioTipps, trainer.studio, studioProdukte, "kompakt");
    setRemoved(r.removed || []);
    setRemovedAnker(r.removedAnker || []);
    r.ok ? setResult(r.text) : setErr(r.text);
    setLoading(false);
  };
  const loadDetail = async function() {
    setLoadingDetail(true);
    const studioProdukte = getStudioProdukte(produkte, verfuegbarkeit, trainer.studio);
    const r = await callAPI(ana, lt, studioTipps, trainer.studio, studioProdukte, "detail");
    if (r.ok) {
      setDetail(r.text);
      if (r.removedAnker && r.removedAnker.length) setRemovedAnker(function(prev) { return prev.concat(r.removedAnker); });
    } else { setErr(r.text); }
    setLoadingDetail(false);
  };
  const reset = function() { setAna(""); setLt(""); setResult(null); setDetail(null); setErr(null); setShowLt(false); setConsent(false); setRemoved([]); setRemovedAnker([]); };
  if (result) return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Trainer-Briefing</div><button onClick={reset} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">Neues Briefing</button></div>
    {removed.length > 0 && <div className="mb-3 p-2 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700">Vor KI-Versand entfernt: {removed.join(", ")}</div>}
    {removedAnker.length > 0 && <div className="mb-3 p-2 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-800"><span className="font-bold">Hinweis:</span> Folgende vorgeschlagene Verkaufsanker wurden entfernt, weil sie nicht in der Produkt-Whitelist deines Studios stehen: {Array.from(new Set(removedAnker)).join(", ")}. Falls relevant: Produkt im Tab Produkte freigeben.</div>}
    <Briefing text={result} />
    {!detail && (<div className="mt-4">
      <button onClick={loadDetail} disabled={loadingDetail} className="w-full py-2.5 bg-gray-100 hover:bg-gray-200 disabled:bg-gray-50 text-gray-700 text-xs font-bold rounded-lg transition-colors">{loadingDetail ? "Ausführliches Briefing wird generiert..." : "+ Mehr Details (ausführliches Briefing)"}</button>
    </div>)}
    {detail && (<div className="mt-6 pt-6 border-t border-gray-200">
      <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Ausführliches Briefing</div>
      <Briefing text={detail} />
    </div>)}
  </div>);
  return (<div className="max-w-3xl mx-auto p-4 space-y-4">
    <div><div className="flex items-center justify-between mb-2"><label className="text-sm font-bold text-gray-700">Anamnese einfügen</label><span className="text-xs text-gray-400">Copy &amp; Paste · Standort {trainer.studio}</span></div><textarea value={ana} onChange={function(e) { setAna(e.target.value); }} placeholder="Anamnese-Daten hier einfügen..." rows="10" className="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none resize-none bg-white" /></div>
    {!showLt ? <button onClick={function() { setShowLt(true); }} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">+ Letzten Termin hinzufügen</button> : <div><label className="text-sm font-bold text-gray-700 mb-2 block">Letzter Termin (optional)</label><textarea value={lt} onChange={function(e) { setLt(e.target.value); }} placeholder="Notizen vom letzten Termin..." rows="4" className="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none resize-none bg-white" /></div>}
    <label className="flex items-start gap-2 p-3 bg-amber-50 border border-amber-200 rounded-lg cursor-pointer">
      <input type="checkbox" checked={consent} onChange={function(e) { setConsent(e.target.checked); }} className="mt-0.5 flex-shrink-0" />
      <span className="text-xs text-amber-900 leading-snug">Mitglied wurde über die KI-gestützte Trainingsplanung informiert und hat eingewilligt (Art. 9 Abs. 2 lit. a DSGVO). Klarnamen, Geburtsdaten und Kontaktdaten werden vor dem Versand automatisch entfernt.</span>

    {err && <div className="p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{err}</div>}

  </div>);
}

function ErfolgeView({ trainer, aktivesStudio, produkte, verfuegbarkeit, erfolge, setErfolge }) {
  const [tart, setTart] = useState("");
  const [sel, setSel] = useState([]);
  const [saved, setSaved] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const aktive = getStudioProdukte(produkte, verfuegbarkeit, aktivesStudio);
  const grouped = KATEGORIEN.map(function(k) { return { k: k, items: aktive.filter(function(p) { return p.kategorie === k; }) }; }).filter(function(g) { return g.items.length > 0; });
  const toggle = function(id) { setSel(function(p) { return p.includes(id) ? p.filter(function(x) { return x !== id; }) : p.concat([id]); }); };
  const istVertretung = aktivesStudio !== trainer.studio;

  const save = async function() {
    if (!tart) return;
    const vk = sel.map(function(id) { const p = produkte.find(function(x) { return x.id === id; }); return { id: id, name: p ? p.name : id, preis: p ? Number(p.preis) : 0 }; });
    // Erfolg gehört zum AKTIVEN Studio (= dort fand der Termin statt), nicht zwingend zum Heimatstudio
    const newE = { id: "e" + Date.now(), trainer_id: trainer.id, trainer: trainer.name, studio: aktivesStudio, terminart: tart, verkauft: vk, datum: new Date().toISOString() };
    const res = await sb.from("erfolge").insert([newE]).select();
    if (res.error) { alert("Fehler beim Speichern: " + res.error.message); return; }
    setErfolge(function(prev) { return prev.concat([newE]); });
    setSaved(true); setTimeout(function() { setTart(""); setSel([]); setSaved(false); }, 1500);
  };

  // Historie zeigt eigene Erfolge im aktiven Studio
  const myErfolge = erfolge.filter(function(x) { return x.studio === aktivesStudio && x.trainer_id === trainer.id; });
  const delErfolg = async function(id) {
    await sb.from("erfolge").delete().eq("id", id);
    setErfolge(function(prev) { return prev.filter(function(x) { return x.id !== id; }); });
  };

  return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4">
      <div>
        <div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Erfolge erfassen</div>
        {istVertretung && <div className="text-xs text-amber-600 font-medium mt-1">Vertretung in {aktivesStudio}</div>}
      </div>
      <button onClick={function() { setShowHistory(!showHistory); }} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">{showHistory ? "← Zurück" : "Historie anzeigen"}</button>
    </div>
    {showHistory ? (
      <div className="space-y-2">
        {myErfolge.length === 0 && <div className="text-center py-8 text-gray-400 text-sm">Noch keine Erfolge.</div>}
        {myErfolge.sort(function(a,b) { return new Date(b.datum) - new Date(a.datum); }).map(function(e) { return (
          <div key={e.id} className="bg-white border border-gray-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-1">
              <div className="text-sm font-medium text-gray-800">{e.trainer} · <span className="text-gray-500">{(TERMINARTEN.find(function(t) { return t.id === e.terminart; }) || {}).label || e.terminart}</span></div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-400">{new Date(e.datum).toLocaleDateString("de-DE")}</span>
                <button onClick={function() { delErfolg(e.id); }} className="text-xs text-red-400 hover:text-red-600">&#10005;</button>
              </div>
            </div>
            {e.verkauft && e.verkauft.length > 0 && <div className="text-xs text-gray-500">{e.verkauft.map(function(v) { return v.name || v; }).join(", ")}</div>}
          </div>
        ); })}
      </div>
    ) : (
      <div>
        {saved && <div className="mb-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-700 font-medium">&#10003; Gespeichert</div>}
        <div className="space-y-4">
          <div>
            <label className="text-xs text-gray-500 uppercase tracking-wider">Terminart</label>
            <select value={tart} onChange={function(e) { setTart(e.target.value); }} className="w-full mt-1 px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white"><option value="">Bitte wählen</option>{TERMINARTEN.map(function(t) { return <option key={t.id} value={t.id}>{t.label}</option>; })}</select>
          </div>
          <div><label className="text-xs text-gray-500 uppercase tracking-wider mb-3 block">Verkauft / Gebucht</label>
            {grouped.map(function(g) { return (<div key={g.k} className="mb-3"><div className="text-xs font-bold text-gray-400 mb-1.5">{g.k}</div><div className="grid grid-cols-2 gap-2">{g.items.map(function(p) { return (
              <button key={p.id} onClick={function() { toggle(p.id); }} className={"text-left px-3 py-2 rounded-lg text-xs font-medium transition-all border " + (sel.includes(p.id) ? "bg-emerald-50 border-emerald-300 text-emerald-800" : "bg-white border-gray-200 text-gray-600 hover:border-gray-300")}>
                <span className="mr-2">{sel.includes(p.id) ? "✓" : "○"}</span>{p.name}
              </button>); })}</div></div>); })}
          </div>
          <button onClick={save} disabled={!tart} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-300 text-white font-bold rounded-lg text-sm transition-colors">Erfolg speichern</button>
        </div>
      </div>
    )}
  </div>);
}

function TeamView({ trainer, users, setUsers }) {
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ name: "", studio: STUDIOS[3], rolle: "trainer", aktiv: true });
  const [createForm, setCreateForm] = useState(null);
  const [creating, setCreating] = useState(false);
  const [createErr, setCreateErr] = useState("");
  const [createOk, setCreateOk] = useState("");
  const [pwModal, setPwModal] = useState(null);
  const [pw1, setPw1] = useState("");
  const [pw2, setPw2] = useState("");
  const [pwLoading, setPwLoading] = useState(false);
  const [pwErr, setPwErr] = useState("");
  const [pwOk, setPwOk] = useState("");
  const isAdmin = trainer.rolle === "admin";

  const canResetUser = function(u) {
    if (!trainer || !u) return false;
    if (u.id === trainer.id) return false;
    if (trainer.rolle === "admin") return true;
    if (trainer.rolle === "leitung") {
      if (u.studio !== trainer.studio) return false;
      if (u.rolle === "admin") return false;
      return true;
    }
    return false;
  };

  const startReset = function(u) {
    setPwModal(u);
    setPw1(""); setPw2(""); setPwErr(""); setPwOk("");
  };

  const submitReset = async function() {
    setPwErr(""); setPwOk("");
    if (pw1.length < 8) { setPwErr("Passwort mindestens 8 Zeichen"); return; }
    if (pw1 !== pw2) { setPwErr("Passwörter stimmen nicht überein"); return; }
    setPwLoading(true);
    const { data, error } = await sb.functions.invoke("admin-reset-password", {
      body: { target_user_id: pwModal.id, new_password: pw1 },
    });
    setPwLoading(false);
    if (error || (data && data.error)) {
      setPwErr((data && data.error) || error.message || "Reset fehlgeschlagen");
      return;
    }
    setPwOk("Passwort für " + pwModal.name + " wurde gesetzt. Mündlich weitergeben — niemals per E-Mail oder Chat.");
    setPw1(""); setPw2("");
  };

  const startCreate = function() {
    setCreateForm({
      email: "",
      password: "",
      name: "",
      studio: trainer.studio,
      rolle: "trainer",
    });
    setCreateErr(""); setCreateOk("");
  };

  const submitCreate = async function() {
    if (!createForm.email || !createForm.password || !createForm.name) {
      setCreateErr("Alle Felder ausfüllen"); return;
    }
    if (createForm.password.length < 8) {
      setCreateErr("Passwort mindestens 8 Zeichen"); return;
    }
    setCreating(true); setCreateErr(""); setCreateOk("");
    const { data, error } = await sb.functions.invoke("create-trainer", {
      body: {
        email: createForm.email.trim().toLowerCase(),
        password: createForm.password,
        name: createForm.name.trim(),
        studio: createForm.studio,
        rolle: createForm.rolle,
      },
    });
    setCreating(false);
    if (error || (data && data.error)) {
      setCreateErr((data && data.error) || error.message || "Fehler beim Anlegen");
      return;
    }
    if (data && data.success) {
      // Neuen User in lokale Liste aufnehmen
      const newUser = { id: data.user.id, name: data.user.name, studio: data.user.studio, rolle: data.user.rolle, aktiv: true };
      setUsers(function(prev) { return prev.concat([newUser]); });
      setCreateOk("Trainer angelegt: " + createForm.email);
      setCreateForm(null);
      setTimeout(function() { setCreateOk(""); }, 4000);
    }
  };

  const startEdit = function(u) {
    setForm({ name: u.name, studio: u.studio, rolle: u.rolle, aktiv: u.aktiv !== false, id: u.id });
    setEdit(u.id);
  };
  const save = async function() {
    if (!form.name.trim()) return;
    const update = { name: form.name.trim(), studio: form.studio, rolle: form.rolle, aktiv: form.aktiv };
    const res = await sb.from("users").update(update).eq("id", edit);
    if (res.error) { alert("Fehler: " + res.error.message); return; }
    setUsers(function(prev) { return prev.map(function(u) { return u.id === edit ? Object.assign({}, u, update) : u; }); });
    setEdit(null);
  };

  const visible = isAdmin ? users : users.filter(function(u) { return u.studio === trainer.studio; });
  const grouped = STUDIOS.map(function(s) { return { s: s, items: visible.filter(function(u) { return u.studio === s; }) }; }).filter(function(g) { return g.items.length > 0; });

  return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4">

      <button onClick={startCreate} className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold rounded-lg">+ Trainer anlegen</button>

    {createOk && <div className="mb-3 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-700">{createOk}</div>}

    {createForm && (<div className="mb-4 p-4 bg-white border border-emerald-300 rounded-lg space-y-3">
      <div className="text-xs font-bold text-emerald-700 uppercase">Neuen Trainer anlegen</div>
      <div className="grid grid-cols-2 gap-3">
        <div>
          <label className="text-xs text-gray-500">Name</label>
          <input value={createForm.name} onChange={function(e) { setCreateForm(Object.assign({}, createForm, { name: e.target.value })); }} placeholder="Vorname" className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" />
        </div>
        <div>
          <label className="text-xs text-gray-500">E-Mail</label>
          <input type="email" value={createForm.email} onChange={function(e) { setCreateForm(Object.assign({}, createForm, { email: e.target.value })); }} placeholder="vorname.studio@fitnesspark.de" className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" />
        </div>
        <div>
          <label className="text-xs text-gray-500">Studio</label>
          <select value={createForm.studio} onChange={function(e) { setCreateForm(Object.assign({}, createForm, { studio: e.target.value })); }} disabled={!isAdmin} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white disabled:bg-gray-100">{STUDIOS.map(function(s) { return <option key={s}>{s}</option>; })}</select>
          {!isAdmin && <div className="text-xs text-gray-400 mt-0.5">Leitung kann nur fürs eigene Studio anlegen</div>}
        </div>
        <div>
          <label className="text-xs text-gray-500">Rolle</label>
          <select value={createForm.rolle} onChange={function(e) { setCreateForm(Object.assign({}, createForm, { rolle: e.target.value })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white">
            <option value="trainer">Trainer</option>
            <option value="leitung">Leitung</option>
            {isAdmin && <option value="admin">Admin</option>}
          </select>
        </div>
        <div className="col-span-2">
          <label className="text-xs text-gray-500">Initialpasswort (mindestens 8 Zeichen)</label>
          <input type="text" value={createForm.password} onChange={function(e) { setCreateForm(Object.assign({}, createForm, { password: e.target.value })); }} placeholder="z.B. Trainer-Brinkum-2026" className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none font-mono" />
          <div className="text-xs text-gray-400 mt-0.5">Klartext sichtbar — gib es dem Trainer und sage ihm, es nach dem ersten Login zu ändern.</div>
        </div>
      </div>
      {createErr && <div className="p-2 bg-red-50 border border-red-200 rounded text-xs text-red-700">{createErr}</div>}
      <div className="flex gap-2">
        <button onClick={submitCreate} disabled={creating} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-400 text-white text-xs font-bold rounded-lg">{creating ? "Wird angelegt..." : "Trainer anlegen"}</button>
        <button onClick={function() { setCreateForm(null); setCreateErr(""); }} className="px-4 py-2 bg-gray-200 text-gray-700 text-xs font-bold rounded-lg">Abbrechen</button>
      </div>
    </div>)}

    {edit && (<div className="mb-4 p-4 bg-white border border-emerald-300 rounded-lg space-y-3">
      <div className="text-xs font-bold text-emerald-700 uppercase">Profil bearbeiten</div>
      <div className="grid grid-cols-2 gap-3">
        <div><label className="text-xs text-gray-500">Name</label><input value={form.name} onChange={function(e) { setForm(Object.assign({}, form, { name: e.target.value })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
        <div><label className="text-xs text-gray-500">Studio</label><select value={form.studio} onChange={function(e) { setForm(Object.assign({}, form, { studio: e.target.value })); }} disabled={!isAdmin} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white disabled:bg-gray-100">{STUDIOS.map(function(s) { return <option key={s}>{s}</option>; })}</select></div>
        <div><label className="text-xs text-gray-500">Rolle</label><select value={form.rolle} onChange={function(e) { setForm(Object.assign({}, form, { rolle: e.target.value })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white"><option value="trainer">Trainer</option><option value="leitung">Leitung</option>{isAdmin && <option value="admin">Admin</option>}</select></div>
        <div className="flex items-end"><label className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer"><input type="checkbox" checked={form.aktiv} onChange={function(e) { setForm(Object.assign({}, form, { aktiv: e.target.checked })); }} />Aktiv</label></div>
      </div>
      <div className="flex gap-2"><button onClick={save} className="px-4 py-2 bg-emerald-600 text-white text-xs font-bold rounded-lg">Speichern</button><button onClick={function() { setEdit(null); }} className="px-4 py-2 bg-gray-200 text-gray-700 text-xs font-bold rounded-lg">Abbrechen</button></div>
    </div>)}

    {pwOk && <div className="mb-3 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-700">{pwOk}</div>}

    {grouped.map(function(g) { return (<div key={g.s} className="mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">{g.s}</div><div className="space-y-1">{g.items.map(function(u) { return (
      <div key={u.id} className={"flex items-center justify-between px-3 py-2 rounded-lg border text-sm " + (u.aktiv === false ? "bg-gray-50 border-gray-100 opacity-50" : "bg-white border-gray-200")}>
        <div className="flex items-center gap-3"><span className="text-gray-800">{u.name}</span><span className={"text-xs " + (u.rolle === "admin" ? "text-emerald-600" : u.rolle === "leitung" ? "text-amber-600" : "text-gray-400")}>{u.rolle === "admin" ? "Admin" : u.rolle === "leitung" ? "Leitung" : "Trainer"}</span>{u.aktiv === false && <span className="text-xs text-red-400">deaktiviert</span>}</div>
        <div className="flex items-center gap-1">
          {canResetUser(u) && <button onClick={function() { startReset(u); }} title="Passwort zurücksetzen" className="text-xs text-gray-400 hover:text-amber-600 px-2">🔑</button>}
          <button onClick={function() { startEdit(u); }} title="Bearbeiten" className="text-xs text-gray-400 hover:text-emerald-600 px-2">&#9998;</button>
        </div>
      </div>); })}</div></div>); })}

    {pwModal && (<div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={function() { if (!pwLoading) setPwModal(null); }}>
      <div className="bg-white rounded-lg shadow-xl max-w-md w-full p-6" onClick={function(e) { e.stopPropagation(); }}>
        <div className="text-xs font-bold text-amber-700 uppercase mb-2">Passwort zurücksetzen</div>
        <div className="text-sm text-gray-700 mb-1"><span className="font-medium">{pwModal.name}</span> · <span className="text-gray-500">{pwModal.studio}</span> · <span className="text-gray-500">{pwModal.rolle === "admin" ? "Admin" : pwModal.rolle === "leitung" ? "Leitung" : "Trainer"}</span></div>
        <div className="mb-4 p-2 bg-amber-50 border border-amber-200 rounded text-xs text-amber-800">Du setzt das Passwort eines anderen Users. Gib es mündlich weiter — niemals per E-Mail oder Chat.</div>
        <div className="space-y-3">
          <div><label className="text-xs text-gray-500">Neues Passwort (mindestens 8 Zeichen)</label><input type="text" value={pw1} onChange={function(e) { setPw1(e.target.value); }} placeholder="z.B. Reset-2026-Brinkum" className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-amber-500 focus:outline-none font-mono" autoFocus /></div>
          <div><label className="text-xs text-gray-500">Wiederholen</label><input type="text" value={pw2} onChange={function(e) { setPw2(e.target.value); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-amber-500 focus:outline-none font-mono" /></div>
        </div>
        {pwErr && <div className="mt-3 p-2 bg-red-50 border border-red-200 rounded text-xs text-red-700">{pwErr}</div>}
        <div className="flex gap-2 mt-4">
          <button onClick={submitReset} disabled={pwLoading || !pw1 || !pw2} className="px-4 py-2 bg-amber-600 hover:bg-amber-500 disabled:bg-gray-300 text-white text-xs font-bold rounded-lg">{pwLoading ? "Wird gesetzt..." : "Passwort setzen"}</button>
          <button onClick={function() { setPwModal(null); }} disabled={pwLoading} className="px-4 py-2 bg-gray-200 text-gray-700 text-xs font-bold rounded-lg">Schließen</button>
        </div>
      </div>
    </div>)}
  </div>);
}

function ProdukteView({ trainer, produkte, setProdukte, verfuegbarkeit, setVerfuegbarkeit }) {
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ name: "", preis: 0, einheit: "€", kategorie: KATEGORIEN[0], studios: [] });
  const [scannedItems, setScannedItems] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [filter, setFilter] = useState("eigenes"); // "eigenes" | "alle"
  const fileRef = useRef(null);

  const startAdd = function() {
    // Default: nur eigenes Studio vorausgewählt
    setForm({ name: "", preis: 0, einheit: "€", kategorie: KATEGORIEN[0], studios: [trainer.studio] });
    setEdit("new");
  };
  const startEdit = function(p) {
    setForm({ name: p.name, preis: p.preis, einheit: p.einheit, kategorie: p.kategorie, id: p.id, studios: getProduktStudios(verfuegbarkeit, p.id) });
    setEdit(p.id);
  };
  const toggleStudio = function(s) {
    setForm(function(f) {
      const has = f.studios.includes(s);
      return Object.assign({}, f, { studios: has ? f.studios.filter(function(x) { return x !== s; }) : f.studios.concat([s]) });
    });
  };

  const save = async function() {
    if (!form.name.trim()) return;
    if (form.studios.length === 0) { alert("Bitte mindestens ein Studio auswählen."); return; }
    if (edit === "new") {
      const np = { id: "p" + Date.now(), name: form.name.trim(), preis: form.preis, einheit: form.einheit, kategorie: form.kategorie, aktiv: true, erstellt_von_studio: trainer.studio };
      await sb.from("produkte").insert([np]);
      const vRows = form.studios.map(function(s) { return { produkt_id: np.id, studio: s }; });
      await sb.from("produkt_verfuegbarkeit").insert(vRows);
      setProdukte(function(prev) { return prev.concat([np]); });
      setVerfuegbarkeit(function(prev) { return prev.concat(vRows); });
    } else {
      // Produkt-Felder updaten
      await sb.from("produkte").update({ name: form.name.trim(), preis: form.preis, einheit: form.einheit, kategorie: form.kategorie }).eq("id", edit);
      setProdukte(function(prev) { return prev.map(function(p) { return p.id === edit ? Object.assign({}, p, { name: form.name.trim(), preis: form.preis, einheit: form.einheit, kategorie: form.kategorie }) : p; }); });
      // Verfügbarkeit syncen: alte raus, neue rein
      const oldStudios = getProduktStudios(verfuegbarkeit, edit);
      const toRemove = oldStudios.filter(function(s) { return !form.studios.includes(s); });
      const toAdd = form.studios.filter(function(s) { return !oldStudios.includes(s); });
      if (toRemove.length) {
        await sb.from("produkt_verfuegbarkeit").delete().eq("produkt_id", edit).in("studio", toRemove);
      }
      if (toAdd.length) {
        const newRows = toAdd.map(function(s) { return { produkt_id: edit, studio: s }; });
        await sb.from("produkt_verfuegbarkeit").insert(newRows);
      }
      setVerfuegbarkeit(function(prev) {
        const filtered = prev.filter(function(v) { return !(v.produkt_id === edit && toRemove.includes(v.studio)); });
        return filtered.concat(toAdd.map(function(s) { return { produkt_id: edit, studio: s }; }));
      });
    }
    setEdit(null);
  };

  // Soft-Delete: aktiv = false. Reaktivieren möglich.
  const toggleAktiv = async function(id) {
    const p = produkte.find(function(x) { return x.id === id; });
    await sb.from("produkte").update({ aktiv: !p.aktiv }).eq("id", id);
    setProdukte(function(prev) { return prev.map(function(x) { return x.id === id ? Object.assign({}, x, { aktiv: !x.aktiv }) : x; }); });
  };

  const handleUpload = async function(e) {
    const file = e.target.files[0]; if (!file) return;
    setUploading(true);
    const reader = new FileReader();
    reader.onload = async function() { const b64 = reader.result.split(",")[1]; const items = await parseScreenshot(b64); setScannedItems(items.map(function(it) { return Object.assign({}, it, { selected: true }); })); setUploading(false); };
    reader.readAsDataURL(file);
  };
  const addScanned = async function() {
    const toAdd = scannedItems.filter(function(it) { return it.selected; });
    if (!toAdd.length) return;
    const newP = toAdd.map(function(it) { return { id: "p" + Date.now() + Math.random().toString(36).slice(2,6), name: it.name, preis: it.preis || 0, einheit: "€", kategorie: "Produkt", aktiv: true, erstellt_von_studio: trainer.studio }; });
    await sb.from("produkte").insert(newP);
    // Scanned Produkte werden direkt für das eigene Studio freigeschaltet (kann später erweitert werden)
    const vRows = newP.map(function(p) { return { produkt_id: p.id, studio: trainer.studio }; });
    await sb.from("produkt_verfuegbarkeit").insert(vRows);
    setProdukte(function(prev) { return prev.concat(newP); });
    setVerfuegbarkeit(function(prev) { return prev.concat(vRows); });
    setScannedItems([]);
  };
  const toggleScanned = function(idx) { var n = scannedItems.slice(); n[idx] = Object.assign({}, n[idx], { selected: !n[idx].selected }); setScannedItems(n); };

  // Filter: "eigenes" zeigt nur Produkte, die in trainer.studio verfügbar sind. "alle" zeigt alle.
  const visible = filter === "eigenes"
    ? produkte.filter(function(p) { return getProduktStudios(verfuegbarkeit, p.id).includes(trainer.studio); })
    : produkte;
  const grouped = KATEGORIEN.map(function(k) { return { k: k, items: visible.filter(function(p) { return p.kategorie === k; }) }; }).filter(function(g) { return g.items.length > 0; });

  return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Produkte konfigurieren</div><button onClick={startAdd} className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold rounded-lg">+ Produkt</button></div>

    <div className="flex gap-1 mb-4">
      <button onClick={function() { setFilter("eigenes"); }} className={"px-3 py-1.5 rounded-full text-xs font-medium transition-colors " + (filter === "eigenes" ? "bg-emerald-600 text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200")}>{trainer.studio}</button>
      <button onClick={function() { setFilter("alle"); }} className={"px-3 py-1.5 rounded-full text-xs font-medium transition-colors " + (filter === "alle" ? "bg-emerald-600 text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200")}>Alle Studios</button>
    </div>

    <div className="mb-4 border border-dashed border-gray-300 rounded-lg p-4">
      <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Produkte aus Magicline importieren</div>
      <p className="text-xs text-gray-500 mb-3">Screenshot aus der Magicline Verkaufsansicht hochladen. Wird automatisch für {trainer.studio} freigeschaltet.</p>
      <input ref={fileRef} type="file" accept="image/*" onChange={handleUpload} className="hidden" />
      <button onClick={function() { fileRef.current.click(); }} disabled={uploading} className="w-full py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 text-xs font-medium rounded-lg transition-colors">{uploading ? "Wird analysiert..." : "Screenshot hochladen"}</button>
      {scannedItems.length > 0 && (<div className="mt-3 space-y-1">
        <div className="text-xs text-gray-500 mb-1">Erkannte Produkte:</div>
        {scannedItems.map(function(it, idx) { return <button key={idx} onClick={function() { toggleScanned(idx); }} className={"w-full text-left px-3 py-2 rounded-lg text-xs font-medium transition-all border " + (it.selected ? "bg-emerald-50 border-emerald-300 text-emerald-800" : "bg-white border-gray-200 text-gray-400 line-through")}><span className="mr-2">{it.selected ? "✓" : "○"}</span>{it.name} -- {(it.preis || 0).toFixed(2)}€</button>; })}
        <button onClick={addScanned} className="w-full mt-2 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold rounded-lg transition-colors">Ausgewählte Produkte hinzufügen</button>
      </div>)}
    </div>

    {edit && (<div className="mb-4 p-4 bg-white border border-emerald-300 rounded-lg space-y-3">
      <div className="text-xs font-bold text-emerald-700 uppercase">{edit === "new" ? "Neues Produkt" : "Bearbeiten"}</div>
      <div className="grid grid-cols-2 gap-3">
        <div><label className="text-xs text-gray-500">Name</label><input value={form.name} onChange={function(e) { setForm(Object.assign({}, form, { name: e.target.value })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
        <div><label className="text-xs text-gray-500">Kategorie</label><select value={form.kategorie} onChange={function(e) { setForm(Object.assign({}, form, { kategorie: e.target.value })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white">{KATEGORIEN.map(function(k) { return <option key={k}>{k}</option>; })}</select></div>
        <div><label className="text-xs text-gray-500">Preis</label><input type="number" step="0.01" value={form.preis} onChange={function(e) { setForm(Object.assign({}, form, { preis: parseFloat(e.target.value) || 0 })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
        <div><label className="text-xs text-gray-500">Einheit</label><select value={form.einheit} onChange={function(e) { setForm(Object.assign({}, form, { einheit: e.target.value })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white"><option value="€">€ (einmalig)</option><option value="€/Monat">€/Monat</option><option value="€/Woche">€/Woche</option></select></div>
      </div>
      <div>
        <label className="text-xs text-gray-500 block mb-2">Verfügbar in Studios</label>
        <div className="flex flex-wrap gap-2">
          {STUDIOS.map(function(s) { var on = form.studios.includes(s); return (
            <button key={s} onClick={function() { toggleStudio(s); }} className={"px-3 py-1.5 rounded-full text-xs font-medium transition-colors border " + (on ? "bg-emerald-50 border-emerald-300 text-emerald-700" : "bg-white border-gray-200 text-gray-500")}>
              {on ? "✓ " : ""}{s}
            </button>); })}
        </div>
        {form.studios.length === 0 && <div className="text-xs text-red-500 mt-1">Mindestens ein Studio auswählen</div>}
      </div>
      <div className="flex gap-2"><button onClick={save} className="px-4 py-2 bg-emerald-600 text-white text-xs font-bold rounded-lg">Speichern</button><button onClick={function() { setEdit(null); }} className="px-4 py-2 bg-gray-200 text-gray-700 text-xs font-bold rounded-lg">Abbrechen</button></div>
    </div>)}

    {grouped.length === 0 && <div className="text-center py-8 text-gray-400 text-sm">Keine Produkte {filter === "eigenes" ? "in " + trainer.studio : "im System"}.</div>}
    {grouped.map(function(g) { return (<div key={g.k} className="mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">{g.k}</div><div className="space-y-1">{g.items.map(function(p) {
      var studios = getProduktStudios(verfuegbarkeit, p.id);
      var inStudio = studios.includes(trainer.studio);
      return (
      <div key={p.id} className={"flex items-center justify-between px-3 py-2 rounded-lg border text-sm " + (p.aktiv ? "bg-white border-gray-200" : "bg-gray-50 border-gray-100 opacity-50")}>
        <div className="flex items-center gap-3 flex-1 min-w-0">
          <button onClick={function() { toggleAktiv(p.id); }} title={p.aktiv ? "Deaktivieren (Soft-Delete)" : "Reaktivieren"} className={"w-5 h-5 rounded border flex items-center justify-center text-xs flex-shrink-0 " + (p.aktiv ? "bg-emerald-500 border-emerald-500 text-white" : "border-gray-300")}>{p.aktiv ? "✓" : ""}</button>
          <div className="min-w-0 flex-1">
            <div className="flex items-center gap-2">
              <span className={p.aktiv ? "text-gray-800" : "text-gray-400"}>{p.name}</span>
              {p.preis > 0 && <span className="text-xs text-gray-400 flex-shrink-0">{p.preis}{p.einheit && p.einheit.includes("Monat") ? "€/Mo" : p.einheit && p.einheit.includes("Woche") ? "€/Wo" : "€"}</span>}
            </div>
            <div className="text-xs text-gray-400 truncate">{studios.length === STUDIOS.length ? "Alle Studios" : studios.join(", ") || "Kein Studio"}</div>
          </div>
        </div>
        <div className="flex gap-1 flex-shrink-0"><button onClick={function() { startEdit(p); }} className="text-xs text-gray-400 hover:text-emerald-600 px-2">&#9998;</button></div>
      </div>); })}</div></div>); })}
  </div>);
}

function StudioTippsView({ trainer }) {
  const [val, setVal] = useState("");
  const [saved, setSaved] = useState(false);
  const [loaded, setLoaded] = useState(false);

function ZieleView({ trainer, produkte, verfuegbarkeit, ziele, setZiele, erfolge }) {

  const startAdd = function() {
    var mon = new Date(); var sun = new Date(mon); sun.setDate(mon.getDate() + (7 - mon.getDay()));
    var monStr = mon.toISOString().slice(0,10); var sunStr = sun.toISOString().slice(0,10);
    setForm({ produkt_id: "", produkt_name: "", ziel_anzahl: 5, zeitraum_von: monStr, zeitraum_bis: sunStr });
    setEdit("new");
  };

  const save = async function() {
    if (!form.produkt_name || !form.zeitraum_von || !form.zeitraum_bis) return;
    var nz = { id: "z" + Date.now(), studio: trainer.studio, produkt_id: form.produkt_id, produkt_name: form.produkt_name, ziel_anzahl: form.ziel_anzahl, zeitraum_von: form.zeitraum_von, zeitraum_bis: form.zeitraum_bis, erstellt_von: trainer.name };
    await sb.from("ziele").insert([nz]);

    setEdit(null);
  };

  const del = async function(id) {
    await sb.from("ziele").delete().eq("id", id);
    setZiele(function(prev) { return prev.filter(function(z) { return z.id !== id; }); });
  };

  const getProgress = function(z) {
    return erfolge.filter(function(e) {
      if (e.studio !== trainer.studio) return false;
      var d = new Date(e.datum); var von = new Date(z.zeitraum_von); var bis = new Date(z.zeitraum_bis); bis.setHours(23,59,59);

    }).reduce(function(sum, e) {
      if (!z.produkt_id) return sum + (e.verkauft || []).length;
      return sum + (e.verkauft || []).filter(function(v) { return (v.id || v) === z.produkt_id; }).length;

    {edit && (<div className="mb-4 p-4 bg-white border border-emerald-300 rounded-lg space-y-3">

        <div><label className="text-xs text-gray-500">Ziel-Anzahl</label><input type="number" value={form.ziel_anzahl} onChange={function(e) { setForm(Object.assign({}, form, { ziel_anzahl: parseInt(e.target.value) || 1 })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
        <div><label className="text-xs text-gray-500">Von</label><input type="date" value={form.zeitraum_von} onChange={function(e) { setForm(Object.assign({}, form, { zeitraum_von: e.target.value })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>

    </div>)}

        var progress = getProgress(z);

          <div className="flex items-center justify-between mb-2">
            <div><div className="text-sm font-medium text-gray-800">{z.produkt_name || "Alle Verkäufe"}</div><div className="text-xs text-gray-400">{new Date(z.zeitraum_von).toLocaleDateString("de-DE")} – {new Date(z.zeitraum_bis).toLocaleDateString("de-DE")} · von {z.erstellt_von}</div></div>
            <div className="flex items-center gap-2">
              <span className={"text-sm font-bold " + (isDone ? "text-emerald-600" : "text-gray-700")}>{progress}/{z.ziel_anzahl}</span>

      })}

          rep += "Durchschnitt Umsatz/Termin: " + (data.length ? (totalU / data.length).toFixed(0) : "0") + " EUR\n\n";
          rep += "TOP PRODUKTE\n";
          sp.slice(0, 5).forEach(function(p) { rep += "- " + p.name + ": " + p.count + "x (" + p.umsatz.toFixed(0) + " EUR)\n"; });
          if (Object.keys(tc).length > 0) { rep += "\nTRAINER-PERFORMANCE\n"; Object.entries(tc).sort(function(a,b) { return b[1].u - a[1].u; }).forEach(function(entry) { rep += "- " + entry[0] + ": " + entry[1].c + " Termine, " + entry[1].v + " Verkäufe, " + entry[1].u.toFixed(0) + " EUR\n"; }); }
          rep += "\nBENCHMARK\n";
          rep += "Euer Studio: " + myAvgV.toFixed(1) + " Verkäufe/Termin, " + myAvgU.toFixed(0) + " EUR/Termin\n";
          rep += "FP-Durchschnitt: " + bmAvgV.toFixed(1) + " Verkäufe/Termin, " + bmAvgU.toFixed(0) + " EUR/Termin\n";
          var blob = new Blob([rep], { type: "text/plain;charset=utf-8" });
          var url = URL.createObjectURL(blob);
          var a = document.createElement("a"); a.href = url; a.download = "Report_" + trainer.studio + "_" + new Date().toISOString().slice(0,10) + ".txt"; a.click(); URL.revokeObjectURL(url);
        }} className="w-full py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-xs font-bold rounded-lg transition-colors">Report herunterladen</button>
      </div>)}
    </div>)}
  </div>);
}

function App() {
  const [view, setView] = useState("briefing");
  const [trainer, setTrainer] = useState(null);
  const [aktivesStudio, setAktivesStudio] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  const [showProfil, setShowProfil] = useState(false);
  const [users, setUsers] = useState([]);
  const [produkte, setProdukte] = useState([]);
  const [verfuegbarkeit, setVerfuegbarkeit] = useState([]);
  const [erfolge, setErfolge] = useState([]);
  const [ziele, setZiele] = useState([]);
  const [studioTipps, setStudioTipps] = useState("");
  const [ready, setReady] = useState(false);

  // Auth-State: lädt Profil aus users-Tabelle für aktuellen Auth-User
  const loadProfile = async function(authUser) {
    if (!authUser) { setTrainer(null); setAktivesStudio(null); return; }
    const res = await sb.from("users").select("*").eq("id", authUser.id).single();
    if (res.data) {
      const t = { id: res.data.id, name: res.data.name, studio: res.data.studio, rolle: res.data.rolle };
      setTrainer(t);
      setAktivesStudio(t.studio); // Default = Heimatstudio
    } else {
      setTrainer(null);
      sb.auth.signOut();
    }
  };

  // Beim Mount: aktuellen Session-Status prüfen + Listener registrieren
  useEffect(function() {
    sb.auth.getSession().then(function(res) {
      const session = res.data.session;
      if (session) loadProfile(session.user);
      setAuthChecked(true);
    });
    const { data: listener } = sb.auth.onAuthStateChange(function(event, session) {
      if (session) loadProfile(session.user);
      else { setTrainer(null); setAktivesStudio(null); }
    });
    return function() { listener.subscription.unsubscribe(); };
  }, []);

  // Daten laden, sobald Trainer eingeloggt ist (vorher würde RLS blockieren)
  useEffect(function() {
    if (!trainer) { setReady(false); return; }
    Promise.all([
      sb.from("users").select("*"),
      sb.from("produkte").select("*"),
      sb.from("erfolge").select("*"),
      sb.from("ziele").select("*"),
      sb.from("produkt_verfuegbarkeit").select("*")
    ]).then(function(results) {
      if (results[0].data) setUsers(results[0].data);
      if (results[1].data) setProdukte(results[1].data);
      if (results[2].data) setErfolge(results[2].data);
      if (results[3].data) setZiele(results[3].data);
      if (results[4].data) setVerfuegbarkeit(results[4].data);
      setReady(true);
    });
  }, [trainer]);

  // Studio-Tipps neu laden, wenn aktives Studio wechselt (für Briefing-Kontext)
  useEffect(function() {
    if (!aktivesStudio) return;
    sb.from("studio_tipps").select("tipps").eq("studio", aktivesStudio).single().then(function(res) {
      setStudioTipps(res.data ? (res.data.tipps || "") : "");
    });
  }, [aktivesStudio]);

  const logout = async function() {
    await sb.auth.signOut();
    setTrainer(null);
    setAktivesStudio(null);
    setView("briefing");
  };

  if (!authChecked) return <div className="min-h-screen bg-gray-900 flex items-center justify-center"><div className="text-gray-500 text-sm">Lade...</div></div>;
  if (!trainer) return <Login />;
  if (!ready || !aktivesStudio) return <div className="min-h-screen bg-gray-50 flex items-center justify-center"><div className="text-gray-500 text-sm">Lade Daten...</div></div>;

  // Kontext-Trainer: Heimatstudio bleibt erhalten, aber für Studio-bezogene Operationen nutzen wir aktivesStudio.
  // ctxStudio ist das, was Views als "ihr aktuelles Studio" sehen sollen.
  const ctx = Object.assign({}, trainer, { studio: aktivesStudio });

  return (<div className="min-h-screen bg-gray-50">
    <Nav view={view} setView={setView} trainer={trainer} aktivesStudio={aktivesStudio} setAktivesStudio={setAktivesStudio} onLogout={logout} onProfilClick={function() { setShowProfil(true); }} />
    {showProfil && <ProfilModal trainer={trainer} onClose={function() { setShowProfil(false); }} />}
    <div className="py-4">
      {view === "briefing" && <BriefingView studioTipps={studioTipps} trainer={ctx} produkte={produkte} verfuegbarkeit={verfuegbarkeit} />}
      {view === "erfolge" && <ErfolgeView trainer={trainer} aktivesStudio={aktivesStudio} produkte={produkte} verfuegbarkeit={verfuegbarkeit} erfolge={erfolge} setErfolge={setErfolge} />}
      {view === "dashboard" && <DashboardView trainer={ctx} produkte={produkte} erfolge={erfolge} ziele={ziele} />}
      {view === "team" && (trainer.rolle === "leitung" || trainer.rolle === "admin") && <TeamView trainer={trainer} users={users} setUsers={setUsers} />}
      {view === "produkte" && (trainer.rolle === "leitung" || trainer.rolle === "admin") && <ProdukteView trainer={ctx} produkte={produkte} setProdukte={setProdukte} verfuegbarkeit={verfuegbarkeit} setVerfuegbarkeit={setVerfuegbarkeit} />}
      {view === "ziele" && (trainer.rolle === "leitung" || trainer.rolle === "admin") && <ZieleView trainer={ctx} produkte={produkte} verfuegbarkeit={verfuegbarkeit} ziele={ziele} setZiele={setZiele} erfolge={erfolge} />}
      {view === "tipps" && (trainer.rolle === "leitung" || trainer.rolle === "admin") && <StudioTippsView trainer={ctx} />}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
