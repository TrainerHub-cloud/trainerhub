// Helper: liefert Produkte, die für ein bestimmtes Studio verfügbar UND aktiv sind
function getStudioProdukte(produkte, verfuegbarkeit, studio, opts) {
  if (!studio) return [];
  const idsForStudio = new Set(verfuegbarkeit.filter(function(v) { return v.studio === studio; }).map(function(v) { return v.produkt_id; }));
  const excludeAktivitaeten = opts && opts.excludeAktivitaeten;
  return produkte.filter(function(p) {
    if (!p.aktiv || !idsForStudio.has(p.id)) return false;
    if (excludeAktivitaeten && p.ist_aktivitaet) return false;
    return true;
  });
}

// Helper: liefert Studios, in denen ein Produkt verfügbar ist
function getProduktStudios(verfuegbarkeit, produktId) {
  return verfuegbarkeit.filter(function(v) { return v.produkt_id === produktId; }).map(function(v) { return v.studio; });
}

// Cache: Geräte pro Studio werden beim ersten Briefing geladen und im Browser zwischengespeichert
const geraeteCache = {};
async function loadStudioGeraete(studio) {
  if (geraeteCache[studio]) return geraeteCache[studio];
  const res = await sb.from("studio_geraete").select("kategorie, name, exklusiv").eq("studio", studio).eq("aktiv", true);
  const out = { fitness: [], wellness: [], diagnostik: [], exklusiv: [] };
  if (res.data) {
    res.data.forEach(function(g) {
      if (out[g.kategorie]) out[g.kategorie].push(g.name);
      if (g.exklusiv) out.exklusiv.push(g.name);
    });
  }
  geraeteCache[studio] = out;
  return out;
}

// Pseudonymisierung: vor jedem API-Call werden Klarnamen, Geburtsdaten, E-Mails und Telefonnummern entfernt.
// Liefert {clean, removed} zurück, damit der Trainer sieht, was rausgefiltert wurde.
function pseudonymize(text) {
  if (!text) return { clean: "", removed: [] };
  let clean = text;
  const removed = [];
  // E-Mail
  if (/[\w.+-]+@[\w-]+\.[\w.-]+/.test(clean)) { clean = clean.replace(/[\w.+-]+@[\w-]+\.[\w.-]+/g, "[E-Mail]"); removed.push("E-Mail"); }
  // Telefon (deutsche Formate, mind. 7 Ziffern, optional + und Bindestriche/Leerzeichen)
  if (/(\+?\d[\d\s\-\/]{6,}\d)/.test(clean)) { clean = clean.replace(/(\+?\d[\d\s\-\/]{6,}\d)/g, "[Telefon]"); removed.push("Telefon"); }
  // Geburtsdatum / Datum DD.MM.YYYY oder DD.MM.YY
  if (/\b\d{1,2}\.\d{1,2}\.\d{2,4}\b/.test(clean)) { clean = clean.replace(/\b\d{1,2}\.\d{1,2}\.\d{2,4}\b/g, "[Datum]"); removed.push("Datum"); }
  // Namen mit Anrede: "Frau Müller", "Herr Dr. Schmidt-Meyer"
  if (/\b(Herr|Frau|Hr\.|Fr\.)\s+(Dr\.\s+|Prof\.\s+)?[A-ZÄÖÜ][a-zäöüß]+(-[A-ZÄÖÜ][a-zäöüß]+)?(\s+[A-ZÄÖÜ][a-zäöüß]+(-[A-ZÄÖÜ][a-zäöüß]+)?)?/.test(clean)) {
    clean = clean.replace(/\b(Herr|Frau|Hr\.|Fr\.)\s+(Dr\.\s+|Prof\.\s+)?[A-ZÄÖÜ][a-zäöüß]+(-[A-ZÄÖÜ][a-zäöüß]+)?(\s+[A-ZÄÖÜ][a-zäöüß]+(-[A-ZÄÖÜ][a-zäöüß]+)?)?/g, "[Mitglied]");
    removed.push("Name");
  }
  // Felder mit Doppelpunkt: "Name: Max Mustermann", "Mitglied: ..."
  if (/^\s*(Name|Mitglied|Vorname|Nachname|Adresse|Anschrift|Straße|PLZ|Ort|Wohnort|Telefon|Tel|Mobil|Handy|E-?Mail|Mail|Geburtsdatum|Geb)\s*:\s*.+$/im.test(clean)) {
    clean = clean.replace(/^\s*(Name|Mitglied|Vorname|Nachname|Adresse|Anschrift|Straße|PLZ|Ort|Wohnort|Telefon|Tel|Mobil|Handy|E-?Mail|Mail|Geburtsdatum|Geb)\s*:\s*.+$/gim, "$1: [entfernt]");
    if (!removed.includes("Personenfeld")) removed.push("Personenfeld");
  }
  return { clean: clean, removed: Array.from(new Set(removed)) };
}

async function callAPI(anamnese, letzter, studioTipps, studio, studioProdukte, mode) {
  // mode: "kompakt" (default) | "detail"
  const m = mode === "detail" ? "detail" : "kompakt";
  // Pseudonymisierung VOR dem API-Call
  const a = pseudonymize(anamnese);
  const l = pseudonymize(letzter || "");
  const removedAll = Array.from(new Set([].concat(a.removed, l.removed)));
  let msg = "ANAMNESE:\n" + a.clean;
  if (l.clean && l.clean.trim()) msg += "\n\nLETZTER TERMIN:\n" + l.clean;
  try {
    const geraete = studio ? await loadStudioGeraete(studio) : null;
    const r = await fetch("/api/generate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: m === "detail" ? 2500 : 1500, system: buildSYS(studioTipps, studio, geraete, studioProdukte, m), messages: [{ role: "user", content: msg }] }),
    });
    if (!r.ok) { const e = await r.json().catch(function() { return {}; }); const m2 = typeof e.error === "string" ? e.error : (e.error?.message || JSON.stringify(e)); throw new Error(m2); }
    const d = await r.json();
    let text = d.content.filter(function(b) { return b.type === "text"; }).map(function(b) { return b.text; }).join("\n");
    // Post-Filter: Verkaufsanker gegen Whitelist matchen
    const filtered = filterVerkaufsanker(text, studioProdukte || []);
    return { ok: true, text: filtered.text, removed: removedAll, removedAnker: filtered.removedAnker };
  } catch (e) { return { ok: false, text: e.message, removed: removedAll, removedAnker: [] }; }
}

// Post-Filter: prüft den VERKAUFSANKER-Abschnitt und entfernt Bullet-Points,
// die kein zugelassenes Produkt aus der Whitelist enthalten.
function filterVerkaufsanker(text, studioProdukte) {
  if (!text || !text.includes("VERKAUFSANKER")) return { text: text, removedAnker: [] };
  const whitelist = studioProdukte.filter(function(p) { return p.preis && Number(p.preis) > 0; }).map(function(p) { return p.name.toLowerCase(); });
  if (whitelist.length === 0) return { text: text, removedAnker: [] };
  // Zerlegen in Abschnitte: alles zwischen "VERKAUFSANKER" und nächster Headline (### oder ENDE)
  const lines = text.split("\n");
  const out = [];
  const removedAnker = [];
  let inAnker = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const isHeadline = /^#{1,4}\s/.test(line) || /^[A-ZÄÖÜ\s]{4,}$/.test(line.trim());
    if (line.includes("VERKAUFSANKER")) { inAnker = true; out.push(line); continue; }
    if (inAnker && isHeadline && !line.includes("VERKAUFSANKER")) { inAnker = false; out.push(line); continue; }
    if (inAnker) {
      // Bullet-Point: prüfen ob ein Whitelist-Eintrag drinsteht
      const isBullet = /^[\s]*[▸\-\*•]/.test(line) || /^\s*\d+\./.test(line);
      if (isBullet && line.trim().length > 3) {
        const lower = line.toLowerCase();
        const match = whitelist.some(function(name) { return lower.includes(name); });
        if (!match) {
          // Ankerzeile entfernen, kurzen Auszug merken
          const excerpt = line.replace(/^[\s▸\-\*•\d\.]+/, "").split(/[:\(\—\-]/)[0].trim().slice(0, 60);
          if (excerpt) removedAnker.push(excerpt);
          continue;
        }
      }
    }
    out.push(line);
  }
  let cleanedText = out.join("\n");
  // Falls am Ende KEIN gültiger Anker mehr im Verkaufsanker-Block steht, Hinweis ergänzen
  if (removedAnker.length > 0) {
    cleanedText = cleanedText.replace(
      /(VERKAUFSANKER[^\n]*\n)((?:(?![\#\n]{1,4}\s|^[A-ZÄÖÜ\s]{4,}$)[^\n]*\n?)*)/,
      function(match, header, body) {
        if (!/[▸\-\*•]/.test(body)) {
          return header + "▸Keine zugelassenen Verkaufsanker für diese Anamnese gefunden.\n";
        }
        return match;
      }
    );
  }
  return { text: cleanedText, removedAnker: removedAnker };
}

async function parseScreenshot(base64) {
  try {
    const r = await fetch("/api/generate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6", max_tokens: 1000,
        system: "Du analysierst Screenshots aus Kassensystemen (z.B. Magicline). Extrahiere alle Produkte mit Namen und Preisen. Antworte NUR mit einem JSON-Array, kein anderer Text. Format: [{\"name\":\"Produktname\",\"preis\":12.90}]. Wenn du nichts erkennst, antworte mit [].",
        messages: [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
          { type: "text", text: "Extrahiere alle Produkte und Preise aus diesem Screenshot." }
        ]}]
      }),
    });
    if (!r.ok) throw new Error("API Fehler");
    const d = await r.json();
    const txt = d.content.filter(function(b) { return b.type === "text"; }).map(function(b) { return b.text; }).join("");
    const clean = txt.replace(/`{3}json|`{3}/g, "").trim();
    return JSON.parse(clean);
  } catch (e) { return []; }
}

function Briefing({ text }) {
  if (!text) return null;
  const parts = text.split(/(?=^### )/gm).filter(function(p) { return p.trim().startsWith("### "); });
  const colors = { "ACHTUNG": ["bg-red-50", "border-red-300", "text-red-700"], "OFFENE PUNKTE": ["bg-amber-50", "border-amber-300", "text-amber-700"] };
  return React.createElement("div", { className: "space-y-3" }, parts.map(function(p, i) {
    var nl = p.indexOf("\n"); if (nl === -1) return null;
    var title = p.slice(4, nl).trim(), body = p.slice(nl + 1).trim();
    var c = colors[title] || ["bg-white", "border-gray-200", "text-emerald-700"];
    return React.createElement("div", { key: i, className: "p-4 rounded-lg border " + c[0] + " " + c[1] },
      React.createElement("div", { className: "font-bold text-xs uppercase tracking-wider mb-2 " + c[2] }, title),
      React.createElement("div", { className: "text-sm text-gray-800 leading-relaxed" },
        body.split("\n").map(function(line, j) {
          if (!line.trim()) return null;
          if (line.startsWith("- ")) {
            var ct = line.slice(2), sg = ct.split(/\*\*(.*?)\*\*/g);
            return React.createElement("div", { key: j, className: "flex gap-2 mb-1.5" },
              React.createElement("span", { className: "text-emerald-500 mt-0.5 flex-shrink-0" }, "▸"),
              React.createElement("span", null, sg.map(function(s, k) {
                return k % 2 === 1 ? React.createElement("strong", { key: k }, s) : React.createElement("span", { key: k }, s);
              }))
            );
          }
          return React.createElement("p", { key: j, className: "mb-1" }, line);
        })
      )
    );
  }));
}

  const change = async function() {
    setErr(""); setOk("");
    if (!oldPw || !newPw || !confirmPw) { setErr("Alle Felder ausfüllen"); return; }
    if (newPw.length < 8) { setErr("Neues Passwort muss mindestens 8 Zeichen haben"); return; }
    if (newPw !== confirmPw) { setErr("Passwort und Bestätigung stimmen nicht überein"); return; }
    if (oldPw === newPw) { setErr("Neues Passwort muss sich vom alten unterscheiden"); return; }

    setLoading(true);
    // 1. Reauth: altes Passwort verifizieren über erneuten Login
    const reauth = await sb.auth.signInWithPassword({ email: email, password: oldPw });
    if (reauth.error) {
      setLoading(false);
      setErr("Aktuelles Passwort ist falsch");
      setOldPw("");
      return;
    }
    // 2. Passwort ändern
    const { error } = await sb.auth.updateUser({ password: newPw });
    setLoading(false);
    if (error) {
      setErr("Fehler beim Ändern: " + error.message);
      return;
    }
    setOk("Passwort wurde geändert. Du bleibst eingeloggt.");
    setOldPw(""); setNewPw(""); setConfirmPw("");
    setTimeout(function() { onClose(); }, 2500);
  };

  return (<div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" onClick={onClose}>
    <div className="bg-white rounded-xl max-w-md w-full p-6 space-y-4" onClick={function(e) { e.stopPropagation(); }}>
      <div className="flex items-center justify-between">
        <div className="text-lg font-bold text-gray-800">Mein Profil</div>
        <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl leading-none">&#10005;</button>
      </div>

      <div className="space-y-2 pb-4 border-b border-gray-200">
        <div className="flex justify-between text-sm"><span className="text-gray-500">Name</span><span className="text-gray-800 font-medium">{trainer.name}</span></div>
        <div className="flex justify-between text-sm"><span className="text-gray-500">E-Mail</span><span className="text-gray-800 font-medium text-xs">{email}</span></div>
        <div className="flex justify-between text-sm"><span className="text-gray-500">Heimatstudio</span><span className="text-gray-800 font-medium">{trainer.studio}</span></div>
        <div className="flex justify-between text-sm"><span className="text-gray-500">Rolle</span><span className="text-gray-800 font-medium">{trainer.rolle === "admin" ? "Admin" : trainer.rolle === "leitung" ? "Leitung" : "Trainer"}</span></div>
      </div>

      <div className="space-y-3">
        <div className="text-sm font-bold text-gray-700">Passwort ändern</div>
        <div>
          <label className="text-xs text-gray-500">Aktuelles Passwort</label>
          <input type="password" autoComplete="current-password" value={oldPw} onChange={function(e) { setOldPw(e.target.value); setErr(""); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" />
        </div>
        <div>
          <label className="text-xs text-gray-500">Neues Passwort (mindestens 8 Zeichen)</label>
          <input type="password" autoComplete="new-password" value={newPw} onChange={function(e) { setNewPw(e.target.value); setErr(""); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" />
        </div>
        <div>
          <label className="text-xs text-gray-500">Neues Passwort bestätigen</label>
          <input type="password" autoComplete="new-password" value={confirmPw} onChange={function(e) { setConfirmPw(e.target.value); setErr(""); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" onKeyDown={function(e) { if(e.key==="Enter") change(); }} />
        </div>
        {err && <div className="p-2 bg-red-50 border border-red-200 rounded text-xs text-red-700">{err}</div>}
        {ok && <div className="p-2 bg-emerald-50 border border-emerald-200 rounded text-xs text-emerald-700">{ok}</div>}
        <div className="flex gap-2">
          <button onClick={change} disabled={loading} className="flex-1 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-400 text-white text-sm font-bold rounded-lg">{loading ? "Ändere..." : "Passwort ändern"}</button>
          <button onClick={onClose} className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-bold rounded-lg">Abbrechen</button>
        </div>
      </div>
    </div>
  </div>);
}

function Login() {
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [loading, setLoading] = useState(false);

  const login = async function() {
    if (!email || !pw) return;
    setLoading(true); setErr("");
    const { error } = await sb.auth.signInWithPassword({ email: email.trim().toLowerCase(), password: pw });
    setLoading(false);
    if (error) { setErr("E-Mail oder Passwort falsch."); setPw(""); }
  };

  return (
    <div className="min-h-screen bg-gray-900 flex items-center justify-center p-4"><div className="w-full max-w-sm">
      <div className="text-center mb-8">
        <div className="text-3xl font-black text-white tracking-tight">TRAINER<span className="text-emerald-400">HUB</span></div>
        <div className="text-xs text-gray-500 mt-1 tracking-widest uppercase">Anmelden</div>
      </div>
      <div className="bg-gray-800 rounded-xl p-6 space-y-4">
        <div>
          <label className="text-xs text-gray-400 uppercase tracking-wider">E-Mail</label>
          <input type="email" autoComplete="username" value={email} onChange={function(e) { setEmail(e.target.value); setErr(""); }} placeholder="vorname.studio@fitnesspark.de" className="w-full mt-1 px-3 py-2.5 bg-gray-700 text-white rounded-lg border border-gray-600 focus:border-emerald-500 focus:outline-none text-sm" />
        </div>
        <div>
          <label className="text-xs text-gray-400 uppercase tracking-wider">Passwort</label>
          <input type="password" autoComplete="current-password" value={pw} onChange={function(e) { setPw(e.target.value); setErr(""); }} className="w-full mt-1 px-3 py-2.5 bg-gray-700 text-white rounded-lg border border-gray-600 focus:border-emerald-500 focus:outline-none text-sm" onKeyDown={function(e) { if(e.key==="Enter") login(); }} />
        </div>
        {err && <div className="text-xs text-red-400 text-center">{err}</div>}
        <button onClick={login} disabled={!email || !pw || loading} className="w-full py-2.5 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-600 disabled:text-gray-400 text-white font-bold rounded-lg text-sm transition-colors">{loading ? "Anmelden..." : "Anmelden"}</button>
        <div className="text-center text-xs text-gray-500 mt-2">Passwort vergessen? Bei Hendrik melden.</div>
      </div>
    </div></div>
  );
}

function BriefingView({ studioTipps, trainer, produkte, verfuegbarkeit }) {
  const [ana, setAna] = useState("");
  const [lt, setLt] = useState("");
  const [result, setResult] = useState(null);
  const [detail, setDetail] = useState(null);
  const [loading, setLoading] = useState(false);
  const [loadingDetail, setLoadingDetail] = useState(false);
  const [err, setErr] = useState(null);
  const [showLt, setShowLt] = useState(false);
  const [consent, setConsent] = useState(false);
  const [removed, setRemoved] = useState([]);
  const [removedAnker, setRemovedAnker] = useState([]);
  const go = async function() {
    if (!ana.trim() || !consent) return;
    setLoading(true); setErr(null); setResult(null); setDetail(null); setRemoved([]); setRemovedAnker([]);
    const studioProdukte = getStudioProdukte(produkte, verfuegbarkeit, trainer.studio, { excludeAktivitaeten: true });
    const r = await callAPI(ana, lt, studioTipps, trainer.studio, studioProdukte, "kompakt");
    setRemoved(r.removed || []);
    setRemovedAnker(r.removedAnker || []);
    r.ok ? setResult(r.text) : setErr(r.text);
    setLoading(false);
  };
  const loadDetail = async function() {
    setLoadingDetail(true);
    const studioProdukte = getStudioProdukte(produkte, verfuegbarkeit, trainer.studio, { excludeAktivitaeten: true });
    const r = await callAPI(ana, lt, studioTipps, trainer.studio, studioProdukte, "detail");
    if (r.ok) {
      setDetail(r.text);
      if (r.removedAnker && r.removedAnker.length) setRemovedAnker(function(prev) { return prev.concat(r.removedAnker); });
    } else { setErr(r.text); }
    setLoadingDetail(false);
  };
  const reset = function() { setAna(""); setLt(""); setResult(null); setDetail(null); setErr(null); setShowLt(false); setConsent(false); setRemoved([]); setRemovedAnker([]); };
  if (result) return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Trainer-Briefing</div><button onClick={reset} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">Neues Briefing</button></div>
    {removed.length > 0 && <div className="mb-3 p-2 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700">Vor KI-Versand entfernt: {removed.join(", ")}</div>}
    {removedAnker.length > 0 && <div className="mb-3 p-2 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-800"><span className="font-bold">Hinweis:</span> Folgende vorgeschlagene Verkaufsanker wurden entfernt, weil sie nicht in der Produkt-Whitelist deines Studios stehen: {Array.from(new Set(removedAnker)).join(", ")}. Falls relevant: Produkt im Tab Produkte freigeben.</div>}
    <Briefing text={result} />
    {!detail && (<div className="mt-4">
      <button onClick={loadDetail} disabled={loadingDetail} className="w-full py-2.5 bg-gray-100 hover:bg-gray-200 disabled:bg-gray-50 text-gray-700 text-xs font-bold rounded-lg transition-colors">{loadingDetail ? "Ausführliches Briefing wird generiert..." : "+ Mehr Details (ausführliches Briefing)"}</button>
    </div>)}
    {detail && (<div className="mt-6 pt-6 border-t border-gray-200">
      <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Ausführliches Briefing</div>
      <Briefing text={detail} />
    </div>)}
  </div>);
  return (<div className="max-w-3xl mx-auto p-4 space-y-4">
    <div><div className="flex items-center justify-between mb-2"><label className="text-sm font-bold text-gray-700">Anamnese einfügen</label><span className="text-xs text-gray-400">Copy &amp; Paste · Standort {trainer.studio}</span></div><textarea value={ana} onChange={function(e) { setAna(e.target.value); }} placeholder="Anamnese-Daten hier einfügen..." rows="10" className="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none resize-none bg-white" /></div>
    {!showLt ? <button onClick={function() { setShowLt(true); }} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">+ Letzten Termin hinzufügen</button> : <div><label className="text-sm font-bold text-gray-700 mb-2 block">Letzter Termin (optional)</label><textarea value={lt} onChange={function(e) { setLt(e.target.value); }} placeholder="Notizen vom letzten Termin..." rows="4" className="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none resize-none bg-white" /></div>}
    <label className="flex items-start gap-2 p-3 bg-amber-50 border border-amber-200 rounded-lg cursor-pointer">
      <input type="checkbox" checked={consent} onChange={function(e) { setConsent(e.target.checked); }} className="mt-0.5 flex-shrink-0" />
      <span className="text-xs text-amber-900 leading-snug">Mitglied wurde über die KI-gestützte Trainingsplanung informiert und hat eingewilligt (Art. 9 Abs. 2 lit. a DSGVO). Klarnamen, Geburtsdaten und Kontaktdaten werden vor dem Versand automatisch entfernt.</span>
    </label>
    {err && <div className="p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{err}</div>}
    <button onClick={go} disabled={!ana.trim() || !consent || loading} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-300 text-white font-bold rounded-lg text-sm transition-colors">{loading ? "Briefing wird generiert..." : "Briefing generieren"}</button>
  </div>);
}

function ErfolgeView({ trainer, aktivesStudio, produkte, verfuegbarkeit, erfolge, setErfolge, kategorien, terminarten }) {
  const [tart, setTart] = useState("");
  const [sel, setSel] = useState([]);
  const [teilnehmer, setTeilnehmer] = useState("");
  const [seminarCount, setSeminarCount] = useState("");
  const [saved, setSaved] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const aktive = getStudioProdukte(produkte, verfuegbarkeit, aktivesStudio);
  const katNames = (kategorien && kategorien.length > 0) ? kategorien.map(function(k) { return k.name; }) : KATEGORIEN_FALLBACK;
  // Aktivitäten-Items separat halten und unten anzeigen, alle anderen klassisch nach Kategorie gruppieren
  const aktivitaeten = aktive.filter(function(p) { return p.ist_aktivitaet; });
  const verkaufsItems = aktive.filter(function(p) { return !p.ist_aktivitaet; });
  const grouped = katNames.map(function(k) { return { k: k, items: verkaufsItems.filter(function(p) { return p.kategorie === k; }).slice().sort(function(a, b) { return (a.name || "").localeCompare(b.name || "", "de"); }) }; }).filter(function(g) { return g.items.length > 0; });
  const tartList = (terminarten && terminarten.length > 0) ? terminarten.filter(function(t) { return t.aktiv !== false; }).slice().sort(function(a, b) { return a.label.localeCompare(b.label, "de"); }) : TERMINARTEN_FALLBACK;
  const tartLabel = function(id) { var t = tartList.find(function(x) { return x.id === id; }); if (t) return t.label; var all = (terminarten || []).find(function(x) { return x.id === id; }); return all ? all.label : id; };
  const tartObj = tartList.find(function(t) { return t.id === tart; });
  const isGruppentermin = tartObj && tartObj.is_gruppentermin === true;
  const SEMINAR_ID = "p_aktivitaet_seminar";
  const seminarSelected = sel.includes(SEMINAR_ID);
  const toggle = function(id) {
    setSel(function(p) { return p.includes(id) ? p.filter(function(x) { return x !== id; }) : p.concat([id]); });
    if (id === SEMINAR_ID) setSeminarCount(""); // Reset bei jedem Toggle
  };
  const istVertretung = aktivesStudio !== trainer.studio;

  const save = async function() {
    if (!tart) return;
    if (isGruppentermin) {
      var n = parseInt(teilnehmer, 10);
      if (!n || n < 1) { alert("Bitte Teilnehmerzahl eingeben (mindestens 1)."); return; }
    }
    var seminarAnzahl = 0;
    if (seminarSelected) {
      seminarAnzahl = parseInt(seminarCount, 10);
      if (isNaN(seminarAnzahl) || seminarAnzahl < 0 || seminarAnzahl > 4) {
        alert("Seminareintragungen: Zahl zwischen 0 und 4 eintragen.");
        return;
      }
    }

    // Verkaufs-Array bauen: normale Items 1x, Seminar n-mal hineingelegt
    const vk = [];
    sel.forEach(function(id) {
      const p = produkte.find(function(x) { return x.id === id; });
      const item = { id: id, name: p ? p.name : id, preis: p ? Number(p.preis) : 0 };
      if (id === SEMINAR_ID) {
        for (var i = 0; i < seminarAnzahl; i++) vk.push(item);
      } else {
        vk.push(item);
      }
    });

    const newE = {
      id: "e" + Date.now(),
      trainer_id: trainer.id,
      trainer: trainer.name,
      studio: aktivesStudio,
      terminart: tart,
      verkauft: vk,
      datum: new Date().toISOString(),
      teilnehmer_anzahl: isGruppentermin ? parseInt(teilnehmer, 10) : null
    };
    const res = await sb.from("erfolge").insert([newE]).select().single();
    if (res.error) { alert("Fehler beim Speichern: " + res.error.message); return; }
    const finalE = res.data || newE;
    setErfolge(function(prev) { return prev.concat([finalE]); });
    setSaved(true); setTimeout(function() { setTart(""); setSel([]); setTeilnehmer(""); setSeminarCount(""); setSaved(false); }, 1500);
  };

  // Historie zeigt eigene Erfolge im aktiven Studio
  const myErfolge = erfolge.filter(function(x) { return x.studio === aktivesStudio && x.trainer_id === trainer.id; });
  const delErfolg = async function(id) {
    if (!confirm("Diesen Erfolg wirklich löschen? Er wird auch aus dem Dashboard entfernt.")) return;
    const res = await sb.from("erfolge").delete().eq("id", id);
    if (res.error) {
      alert("Fehler beim Löschen: " + res.error.message);
      return;
    }
    setErfolge(function(prev) { return prev.filter(function(x) { return x.id !== id; }); });
  };

  return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4">
      <div>
        <div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Erfolge erfassen</div>
        {istVertretung && <div className="text-xs text-amber-600 font-medium mt-1">Vertretung in {aktivesStudio}</div>}
      </div>
      <button onClick={function() { setShowHistory(!showHistory); }} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">{showHistory ? "← Zurück" : "Historie anzeigen"}</button>
    </div>
    {showHistory ? (
      <div className="space-y-2">
        {myErfolge.length === 0 && <div className="text-center py-8 text-gray-400 text-sm">Noch keine Erfolge in den letzten 30 Tagen.</div>}
        {myErfolge.sort(function(a,b) { return new Date(b.datum) - new Date(a.datum); }).map(function(e) { return (
          <div key={e.id} className="bg-white border border-gray-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-1">
              <div className="text-sm font-medium text-gray-800 flex items-center gap-2">
                {e.nummer && <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 text-xs font-bold">{e.nummer}</span>}
                <span>{e.trainer}</span>
                <span className="text-gray-400">·</span>
                <span className="text-gray-500">{tartLabel(e.terminart)}</span>
                {e.teilnehmer_anzahl != null && <span className="text-xs text-emerald-600 font-medium">· {e.teilnehmer_anzahl} TN</span>}
              </div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-400">{new Date(e.datum).toLocaleDateString("de-DE")}</span>
                <button onClick={function() { delErfolg(e.id); }} className="text-xs text-red-400 hover:text-red-600">&#10005;</button>
              </div>
            </div>
            {e.verkauft && e.verkauft.length > 0 && <div className="text-xs text-gray-500">{e.verkauft.map(function(v) { return v.name || v; }).join(", ")}</div>}
          </div>
        ); })}
        {myErfolge.length > 0 && <div className="text-center text-xs text-gray-400 pt-2">Standardmäßig werden nur die letzten 30 Tage geladen. Ältere Erfolge im Dashboard über "Alle Erfolge laden".</div>}
      </div>
    ) : (
      <div>
        {saved && <div className="mb-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-700 font-medium">&#10003; Gespeichert</div>}
        <div className="space-y-4">
          <div>
            <label className="text-xs text-gray-500 uppercase tracking-wider">Terminart</label>
            <select value={tart} onChange={function(e) { setTart(e.target.value); setTeilnehmer(""); }} className="w-full mt-1 px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white"><option value="">Bitte wählen</option>{tartList.map(function(t) { return <option key={t.id} value={t.id}>{t.label}{t.is_gruppentermin ? " (Gruppe)" : ""}</option>; })}</select>
          </div>
          {isGruppentermin && (
            <div>
              <label className="text-xs text-gray-500 uppercase tracking-wider">Teilnehmerzahl</label>
              <input type="number" min="1" value={teilnehmer} onChange={function(e) { setTeilnehmer(e.target.value); }} placeholder="z.B. 12" className="w-full mt-1 px-3 py-2.5 border border-emerald-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-emerald-50" autoFocus />
              <p className="text-xs text-gray-500 mt-1">Bei Gruppenterminen werden keine Mitgliedsnamen erfasst — nur die Anzahl der Teilnehmer.</p>
            </div>
          )}

function ProdukteView({ trainer, produkte, setProdukte, verfuegbarkeit, setVerfuegbarkeit, kategorien, erfolge, setErfolge }) {
  const katNames = (kategorien && kategorien.length > 0) ? kategorien.map(function(k) { return k.name; }) : KATEGORIEN_FALLBACK;
  const defaultKat = katNames[0];
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ name: "", preis: 0, einheit: "€", kategorie: defaultKat, studios: [] });
  const [scannedItems, setScannedItems] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [filter, setFilter] = useState("eigenes"); // "eigenes" | "alle"
  const [deleting, setDeleting] = useState(null); // produkt_id während Löschvorgang
  const fileRef = useRef(null);
  const isAdmin = trainer.rolle === "admin";

  const startAdd = function() {
    // Default: nur eigenes Studio vorausgewählt
    setForm({ name: "", preis: 0, einheit: "€", kategorie: defaultKat, studios: [trainer.studio] });
    setEdit("new");
  };
  const startEdit = function(p) {
    setForm({ name: p.name, preis: p.preis, einheit: p.einheit, kategorie: p.kategorie, id: p.id, studios: getProduktStudios(verfuegbarkeit, p.id) });
    setEdit(p.id);
  };
  const toggleStudio = function(s) {
    setForm(function(f) {
      const has = f.studios.includes(s);
      return Object.assign({}, f, { studios: has ? f.studios.filter(function(x) { return x !== s; }) : f.studios.concat([s]) });
    });
  };

  const save = async function() {
    if (!form.name.trim()) return;
    if (form.studios.length === 0) { alert("Bitte mindestens ein Studio auswählen."); return; }
    if (edit === "new") {
      const np = { id: "p" + Date.now(), name: form.name.trim(), preis: form.preis, einheit: form.einheit, kategorie: form.kategorie, aktiv: true, erstellt_von_studio: trainer.studio };
      await sb.from("produkte").insert([np]);
      const vRows = form.studios.map(function(s) { return { produkt_id: np.id, studio: s }; });
      await sb.from("produkt_verfuegbarkeit").insert(vRows);
      setProdukte(function(prev) { return prev.concat([np]); });
      setVerfuegbarkeit(function(prev) { return prev.concat(vRows); });
    } else {
      // Produkt-Felder updaten
      await sb.from("produkte").update({ name: form.name.trim(), preis: form.preis, einheit: form.einheit, kategorie: form.kategorie }).eq("id", edit);
      setProdukte(function(prev) { return prev.map(function(p) { return p.id === edit ? Object.assign({}, p, { name: form.name.trim(), preis: form.preis, einheit: form.einheit, kategorie: form.kategorie }) : p; }); });
      // Verfügbarkeit syncen: alte raus, neue rein
      const oldStudios = getProduktStudios(verfuegbarkeit, edit);
      const toRemove = oldStudios.filter(function(s) { return !form.studios.includes(s); });
      const toAdd = form.studios.filter(function(s) { return !oldStudios.includes(s); });
      if (toRemove.length) {
        await sb.from("produkt_verfuegbarkeit").delete().eq("produkt_id", edit).in("studio", toRemove);
      }
      if (toAdd.length) {
        const newRows = toAdd.map(function(s) { return { produkt_id: edit, studio: s }; });
        await sb.from("produkt_verfuegbarkeit").insert(newRows);
      }
      setVerfuegbarkeit(function(prev) {
        const filtered = prev.filter(function(v) { return !(v.produkt_id === edit && toRemove.includes(v.studio)); });
        return filtered.concat(toAdd.map(function(s) { return { produkt_id: edit, studio: s }; }));
      });
    }
    setEdit(null);
  };

  // Soft-Delete: aktiv = false. Reaktivieren möglich.
  const toggleAktiv = async function(id) {
    const p = produkte.find(function(x) { return x.id === id; });
    await sb.from("produkte").update({ aktiv: !p.aktiv }).eq("id", id);
    setProdukte(function(prev) { return prev.map(function(x) { return x.id === id ? Object.assign({}, x, { aktiv: !x.aktiv }) : x; }); });
  };

  // Hard-Delete: nur Admin. Erfolge-Snapshots werden auf "Gelöscht"-Produkt umgehängt,
  // damit historische Statistiken erhalten bleiben (standardmäßig ausgeblendet).
  const hardDelete = async function(p) {
    if (!isAdmin) return;
    if (p.id === DELETED_PRODUKT_ID) { alert("Das Spezial-Produkt 'Gelöscht' kann nicht gelöscht werden."); return; }

    // Anzahl betroffener Erfolge zählen für Hinweis
    var affected = 0;
    erfolge.forEach(function(e) {
      if (Array.isArray(e.verkauft) && e.verkauft.some(function(v) { return v.id === p.id; })) affected++;
    });

    var msg = "Produkt '" + p.name + "' endgültig löschen?";
    if (affected > 0) {
      msg += "\n\n" + affected + " Erfolg(e) referenzieren dieses Produkt. Die Verkäufe werden auf das Sammel-Produkt 'Gelöscht' umgehängt und sind in Statistiken standardmäßig ausgeblendet.";
    }
    msg += "\n\nDieser Schritt kann nicht rückgängig gemacht werden.";

    if (!confirm(msg)) return;
    setDeleting(p.id);

    try {
      // Erfolge mit Snapshot-Eintrag dieses Produkts: verkauft-Array umschreiben
      // ID wird auf p_geloescht umgehängt (für Filter-Logik), Name behält Original mit "(gelöscht)"-Suffix.
      const affectedErfolge = erfolge.filter(function(e) {
        return Array.isArray(e.verkauft) && e.verkauft.some(function(v) { return v.id === p.id; });
      });
      for (var i = 0; i < affectedErfolge.length; i++) {
        var e = affectedErfolge[i];
        var newVerkauft = e.verkauft.map(function(v) {
          if (v.id !== p.id) return v;
          var origName = v.name || p.name;
          // Idempotent: kein doppeltes "(gelöscht)" anhängen
          var newName = origName.endsWith("(gelöscht)") ? origName : origName + " (gelöscht)";
          return { id: DELETED_PRODUKT_ID, name: newName, preis: Number(v.preis) || 0 };
        });
        const upd = await sb.from("erfolge").update({ verkauft: newVerkauft }).eq("id", e.id);
        if (upd.error) throw upd.error;
      }

      // Verfügbarkeiten löschen (FK-Cleanup)
      const delV = await sb.from("produkt_verfuegbarkeit").delete().eq("produkt_id", p.id);
      if (delV.error) throw delV.error;

      // Produkt löschen
      const delP = await sb.from("produkte").delete().eq("id", p.id);
      if (delP.error) throw delP.error;

      // Lokalen State aktualisieren
      setProdukte(function(prev) { return prev.filter(function(x) { return x.id !== p.id; }); });
      setVerfuegbarkeit(function(prev) { return prev.filter(function(v) { return v.produkt_id !== p.id; }); });
      if (setErfolge) {
        setErfolge(function(prev) { return prev.map(function(e) {
          if (!Array.isArray(e.verkauft) || !e.verkauft.some(function(v) { return v.id === p.id; })) return e;
          return Object.assign({}, e, { verkauft: e.verkauft.map(function(v) {
            if (v.id !== p.id) return v;
            var origName = v.name || p.name;
            var newName = origName.endsWith("(gelöscht)") ? origName : origName + " (gelöscht)";
            return { id: DELETED_PRODUKT_ID, name: newName, preis: Number(v.preis) || 0 };
          }) });
        }); });
      }
    } catch (err) {
      alert("Fehler beim Löschen: " + (err.message || JSON.stringify(err)));
    } finally {
      setDeleting(null);
    }
  };

  const handleUpload = async function(e) {
    const file = e.target.files[0]; if (!file) return;
    setUploading(true);
    const reader = new FileReader();
    reader.onload = async function() { const b64 = reader.result.split(",")[1]; const items = await parseScreenshot(b64); setScannedItems(items.map(function(it) { return Object.assign({}, it, { selected: true }); })); setUploading(false); };
    reader.readAsDataURL(file);
  };
  const addScanned = async function() {
    const toAdd = scannedItems.filter(function(it) { return it.selected; });
    if (!toAdd.length) return;
    const newP = toAdd.map(function(it) { return { id: "p" + Date.now() + Math.random().toString(36).slice(2,6), name: it.name, preis: it.preis || 0, einheit: "€", kategorie: "Produkt", aktiv: true, erstellt_von_studio: trainer.studio }; });
    await sb.from("produkte").insert(newP);
    // Scanned Produkte werden direkt für das eigene Studio freigeschaltet (kann später erweitert werden)
    const vRows = newP.map(function(p) { return { produkt_id: p.id, studio: trainer.studio }; });
    await sb.from("produkt_verfuegbarkeit").insert(vRows);
    setProdukte(function(prev) { return prev.concat(newP); });
    setVerfuegbarkeit(function(prev) { return prev.concat(vRows); });
    setScannedItems([]);
  };
  const toggleScanned = function(idx) { var n = scannedItems.slice(); n[idx] = Object.assign({}, n[idx], { selected: !n[idx].selected }); setScannedItems(n); };

  // Filter: "eigenes" zeigt nur Produkte, die in trainer.studio verfügbar sind. "alle" zeigt alle.
  // Spezial-Produkt "Gelöscht" wird in der Produkt-Verwaltung NIE angezeigt.

    ? sichtbar.filter(function(p) { return getProduktStudios(verfuegbarkeit, p.id).includes(trainer.studio); })
    : sichtbar;
  const grouped = katNames.map(function(k) { return { k: k, items: visible.filter(function(p) { return p.kategorie === k; }).slice().sort(function(a, b) { return (a.name || "").localeCompare(b.name || "", "de"); }) }; }).filter(function(g) { return g.items.length > 0; });

  return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Produkte konfigurieren</div><button onClick={startAdd} className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold rounded-lg">+ Produkt</button></div>

    <div className="flex gap-1 mb-4">

      {scannedItems.length > 0 && (<div className="mt-3 space-y-1">

        {scannedItems.map(function(it, idx) { return <button key={idx} onClick={function() { toggleScanned(idx); }} className={"w-full text-left px-3 py-2 rounded-lg text-xs font-medium transition-all border " + (it.selected ? "bg-emerald-50 border-emerald-300 text-emerald-800" : "bg-white border-gray-200 text-gray-400 line-through")}><span className="mr-2">{it.selected ? "✓" : "○"}</span>{it.name} -- {(it.preis || 0).toFixed(2)}€</button>; })}
        <button onClick={addScanned} className="w-full mt-2 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold rounded-lg transition-colors">Ausgewählte Produkte hinzufügen</button>
      </div>)}
    </div>

    {edit === "new" && (<div className="mb-4 p-4 bg-white border border-emerald-300 rounded-lg space-y-3">
      <div className="text-xs font-bold text-emerald-700 uppercase">Neues Produkt</div>

function ZieleView({ trainer, produkte, verfuegbarkeit, ziele, setZiele, erfolge }) {
  const [edit, setEdit] = useState(null);
  const [form, setForm] = useState({ produkt_id: "", produkt_name: "", ziel_anzahl: 5, zeitraum_von: "", zeitraum_bis: "" });
  const studioZiele = ziele.filter(function(z) { return z.studio === trainer.studio; });
  const studioProdukte = getStudioProdukte(produkte, verfuegbarkeit, trainer.studio);
  const today = new Date().toISOString().slice(0, 10);

  const startAdd = function() {
    var mon = new Date(); var sun = new Date(mon); sun.setDate(mon.getDate() + (7 - mon.getDay()));
    var monStr = mon.toISOString().slice(0,10); var sunStr = sun.toISOString().slice(0,10);
    setForm({ produkt_id: "", produkt_name: "", ziel_anzahl: 5, zeitraum_von: monStr, zeitraum_bis: sunStr });
    setEdit("new");
  };

  const save = async function() {
    if (!form.produkt_name || !form.zeitraum_von || !form.zeitraum_bis) return;
    var nz = { id: "z" + Date.now(), studio: trainer.studio, produkt_id: form.produkt_id, produkt_name: form.produkt_name, ziel_anzahl: form.ziel_anzahl, zeitraum_von: form.zeitraum_von, zeitraum_bis: form.zeitraum_bis, erstellt_von: trainer.name };
    await sb.from("ziele").insert([nz]);
    setZiele(function(prev) { return prev.concat([nz]); });
    setEdit(null);
  };

  const del = async function(id) {
    await sb.from("ziele").delete().eq("id", id);
    setZiele(function(prev) { return prev.filter(function(z) { return z.id !== id; }); });
  };

  const getProgress = function(z) {
    return erfolge.filter(function(e) {
      if (e.studio !== trainer.studio) return false;
      var d = new Date(e.datum); var von = new Date(z.zeitraum_von); var bis = new Date(z.zeitraum_bis); bis.setHours(23,59,59);
      if (d < von || d > bis) return false;
      if (!z.produkt_id) return true;
      return (e.verkauft || []).some(function(v) { return (v.id || v) === z.produkt_id; });
    }).reduce(function(sum, e) {
      if (!z.produkt_id) return sum + (e.verkauft || []).length;
      return sum + (e.verkauft || []).filter(function(v) { return (v.id || v) === z.produkt_id; }).length;
    }, 0);
  };

  var aktive = studioProdukte;

  return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Ziele verwalten</div><button onClick={startAdd} className="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold rounded-lg">+ Ziel</button></div>
    {edit && (<div className="mb-4 p-4 bg-white border border-emerald-300 rounded-lg space-y-3">
      <div className="text-xs font-bold text-emerald-700 uppercase">Neues Ziel</div>
      <div className="grid grid-cols-2 gap-3">
        <div><label className="text-xs text-gray-500">Produkt</label><select value={form.produkt_id} onChange={function(e) { var p = aktive.find(function(x) { return x.id === e.target.value; }); setForm(Object.assign({}, form, { produkt_id: e.target.value, produkt_name: p ? p.name : "Alle Verkäufe" })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white"><option value="">Alle Verkäufe</option>{aktive.map(function(p) { return <option key={p.id} value={p.id}>{p.name}</option>; })}</select></div>
        <div><label className="text-xs text-gray-500">Ziel-Anzahl</label><input type="number" value={form.ziel_anzahl} onChange={function(e) { setForm(Object.assign({}, form, { ziel_anzahl: parseInt(e.target.value) || 1 })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
        <div><label className="text-xs text-gray-500">Von</label><input type="date" value={form.zeitraum_von} onChange={function(e) { setForm(Object.assign({}, form, { zeitraum_von: e.target.value })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
        <div><label className="text-xs text-gray-500">Bis</label><input type="date" value={form.zeitraum_bis} onChange={function(e) { setForm(Object.assign({}, form, { zeitraum_bis: e.target.value })); }} className="w-full mt-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
      </div>
      <div className="flex gap-2"><button onClick={save} className="px-4 py-2 bg-emerald-600 text-white text-xs font-bold rounded-lg">Speichern</button><button onClick={function() { setEdit(null); }} className="px-4 py-2 bg-gray-200 text-gray-700 text-xs font-bold rounded-lg">Abbrechen</button></div>
    </div>)}
    <div className="space-y-3">
      {studioZiele.length === 0 && <div className="text-center py-8 text-gray-400 text-sm">Noch keine Ziele definiert.</div>}
      {studioZiele.sort(function(a,b) { return new Date(b.zeitraum_bis) - new Date(a.zeitraum_bis); }).map(function(z) {
        var progress = getProgress(z);
        var pct = Math.min((progress / z.ziel_anzahl) * 100, 100);
        var isActive = today >= z.zeitraum_von && today <= z.zeitraum_bis;
        var isDone = progress >= z.ziel_anzahl;
        return (<div key={z.id} className={"bg-white border rounded-lg p-4 " + (isDone ? "border-emerald-300" : isActive ? "border-gray-200" : "border-gray-100 opacity-60")}>
          <div className="flex items-center justify-between mb-2">
            <div><div className="text-sm font-medium text-gray-800">{z.produkt_name || "Alle Verkäufe"}</div><div className="text-xs text-gray-400">{new Date(z.zeitraum_von).toLocaleDateString("de-DE")} – {new Date(z.zeitraum_bis).toLocaleDateString("de-DE")} · von {z.erstellt_von}</div></div>
            <div className="flex items-center gap-2">
              <span className={"text-sm font-bold " + (isDone ? "text-emerald-600" : "text-gray-700")}>{progress}/{z.ziel_anzahl}</span>
              <button onClick={function() { del(z.id); }} className="text-xs text-gray-400 hover:text-red-600">&#10005;</button>
            </div>
          </div>
          <div className="h-3 bg-gray-100 rounded-full overflow-hidden"><div className={"h-full rounded-full transition-all " + (isDone ? "bg-emerald-500" : "bg-amber-400")} style={{ width: pct + "%" }}></div></div>
        </div>);
      })}
    </div>
  </div>);
}

function DashboardView({ trainer, produkte, erfolge, ziele, kategorien, terminarten, erfolgeFullLoad, reloadErfolge, erfolgeReloading }) {

  const isAdmin = trainer.rolle === "admin";
  const isTrainer = trainer.rolle === "trainer";
  const [von, setVon] = useState("");
  const [bis, setBis] = useState("");
  const [kat, setKat] = useState("Alle");
  const [tartFilter, setTartFilter] = useState("Alle");
  const [showDeleted, setShowDeleted] = useState(false);

  const inZeitraum = function(e) {

  var tc = {};
  var tp = {};

  var ac = {};
  var tartListDash = (terminarten && terminarten.length > 0) ? terminarten : TERMINARTEN_FALLBACK;
  // Terminarten-Übersicht: ALLE Termine im Zeitraum (unabhängig vom aktuell gesetzten Terminart-Filter)
  dataAll.forEach(function(e) { var t = tartListDash.find(function(t) { return t.id === e.terminart; }); var l = t ? t.label : e.terminart; ac[l] = (ac[l] || 0) + 1; });
  var sv = {};
  if (isL || isAdmin) {
    erfolge.filter(inZeitraum).filter(function(e) { return tartFilter === "Alle" || e.terminart === tartFilter; })

  }
  var dashKatNames = (kategorien && kategorien.length > 0) ? kategorien.map(function(k) { return k.name; }).filter(function(n) { return n !== "Aktivitäten"; }) : KATEGORIEN_FALLBACK;
  var katFilter = ["Alle"].concat(dashKatNames);

    tartListDash.filter(function(t) { return !t.is_gruppentermin; })

  var today = new Date().toISOString().slice(0, 10);
  var benchmark = {};
  erfolge.filter(inZeitraum).filter(function(e) { return tartFilter === "Alle" || e.terminart === tartFilter; }).forEach(function(e) {

  var bmAvgU = bmStudios > 0 ? Object.values(benchmark).reduce(function(s, b) { return s + (b.termine > 0 ? b.umsatz / b.termine : 0); }, 0) / bmStudios : 0;
  var myBm = benchmark[trainer.studio] || { termine: 0, verkaufe: 0, umsatz: 0 };
  var myAvgV = myBm.termine > 0 ? myBm.verkaufe / myBm.termine : 0;
  var myAvgU = myBm.termine > 0 ? myBm.umsatz / myBm.termine : 0;

  // ============== 3-KPI-BLOCK: Seminareintragungs-Quote, Folgetermin-Quote, Umsatz/Termin ==============
  // Ziel-Terminarten für Seminareintragung-Quote: Starttermin + 1. Termin Einweisung
  var SEMINAR_KPI_TARTS = ["t_starttermin", "t_einweisung_intensiv"];
  var SEMINAR_PROD_ID = "p_aktivitaet_seminar";
  var FOLGETERMIN_PROD_ID = "p_aktivitaet_folgetermin";
  var INBODY_PROD_ID = "p_aktivitaet_inbody";

  // Helper: berechnet KPIs für einen Erfolgs-Datensatz
  var calcKpis = function(erfolgList) {
    var startTermine = erfolgList.filter(function(e) { return SEMINAR_KPI_TARTS.includes(e.terminart); });
    var seminarEintragungen = 0;
    startTermine.forEach(function(e) {

    });

    });
    var einzelTermine = erfolgList.filter(function(e) {

      return !t || !t.is_gruppentermin;
    });
    var umsatz = 0;

    });
    return {
      anzStartTermine: startTermine.length,
      seminarEintragungen: seminarEintragungen,

      folgeQuote: erfolgList.length > 0 ? (folgeTermineSet / erfolgList.length) : 0,
      anzEinzelTermine: einzelTermine.length,
      umsatz: umsatz,

  };

  // Eigene KPIs (aus dataAll = baseData im Zeitraum)

  // Vergleichs-KPIs:
  //   Trainer:        Studio-Schnitt (alle Erfolge im eigenen Studio im Zeitraum)

  var compareKpis;
  var compareLabel;
  if (isTrainer) {
    var studioErfolge = erfolge.filter(function(e) { return e.studio === trainer.studio; }).filter(inZeitraum);

    compareLabel = "Studio-Schnitt " + trainer.studio;
  } else {

  }

  var fxMaxAvg = fxTrainerList.reduce(function(m, x) { return Math.max(m, x.avg); }, 1);
  // ============== ENDE FITEXPRESS ==============
  return (<div className="max-w-4xl mx-auto p-4">
    <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">{isTrainer ? "Mein Dashboard · " + trainer.name : "Dashboard · " + trainer.studio}</div>

      {data.length > 0 && function() { var activeZiele = ziele.filter(function(z) { return z.studio === trainer.studio && today >= z.zeitraum_von && today <= z.zeitraum_bis; }); if (activeZiele.length === 0) return null; return (<div className="mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Aktuelle Ziele</div><div className="grid grid-cols-2 gap-2">{activeZiele.map(function(z) { var prog = erfolge.filter(function(e) { if (e.studio !== trainer.studio) return false; var d = new Date(e.datum); if (d < new Date(z.zeitraum_von) || d > new Date(z.zeitraum_bis + "T23:59:59")) return false; if (!z.produkt_id) return true; return (e.verkauft || []).some(function(v) { return (v.id || v) === z.produkt_id; }); }).reduce(function(s, e) { if (!z.produkt_id) return s + (e.verkauft || []).length; return s + (e.verkauft || []).filter(function(v) { return (v.id || v) === z.produkt_id; }).length; }, 0); var pct = Math.min((prog / z.ziel_anzahl) * 100, 100); var done = prog >= z.ziel_anzahl; return (<div key={z.id} className={"bg-white border rounded-lg p-3 " + (done ? "border-emerald-300" : "border-gray-200")}><div className="flex justify-between text-xs mb-1"><span className="text-gray-600 font-medium">{z.produkt_name || "Alle Verkäufe"}</span><span className={"font-bold " + (done ? "text-emerald-600" : "text-gray-700")}>{prog}/{z.ziel_anzahl}</span></div><div className="h-2 bg-gray-100 rounded-full overflow-hidden"><div className={"h-full rounded-full " + (done ? "bg-emerald-500" : "bg-amber-400")} style={{ width: pct + "%" }}></div></div></div>); })}</div></div>); }()}
      {data.length > 0 && (<div>

        <div className="bg-white border border-gray-200 rounded-lg p-4 text-center"><div className="text-2xl font-black text-gray-900">{data.length ? (totalU / data.length).toFixed(0) : "0"}€</div><div className="text-xs text-gray-500 mt-1">Ø Umsatz/Termin</div></div>
        <div className="bg-white border border-gray-200 rounded-lg p-4 text-center"><div className="text-2xl font-black text-emerald-600">{totalU.toFixed(0)}€</div><div className="text-xs text-gray-500 mt-1">{kat === "Alle" ? "Gesamtumsatz" : "Umsatz " + kat}</div></div>

              {myKpis.umsatzProTermin >= compareKpis.umsatzProTermin ? "▲" : "▼"} Schnitt: {compareKpis.umsatzProTermin.toFixed(0)}€
            </div>
          </div>
        </div>
      </div>
      {/* ============== ENDE 3-KPI-BLOCK ============== */}
      {sp.length > 0 && <div className="bg-white border border-gray-200 rounded-lg p-4 mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Produkt-Ranking {kat !== "Alle" ? "· " + kat : ""}</div><div className="space-y-2">{sp.map(function(p) { var ep = p.count > 0 ? (p.umsatz / p.count) : 0; return (<div key={p.id} className="flex items-center gap-3">
        <div className="w-44 text-xs text-gray-600 truncate flex-shrink-0">{p.name} <span className="text-gray-400">({ep.toFixed(0)}€/St.)</span></div>
        <div className="flex-1 h-5 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-emerald-500 rounded-full" style={{ width: Math.max((p.count / mx) * 100, 0) + "%", minWidth: p.count > 0 ? "8px" : "0" }}></div></div>
        <div className="text-xs font-bold text-gray-700 w-6 text-right">{p.count}x</div>
        <div className="text-xs text-emerald-600 font-bold w-14 text-right">{p.umsatz.toFixed(0)}€</div>
      </div>); })}</div></div>}
      {(isL || isAdmin) && Object.keys(tc).length > 0 && (<div className="bg-white border border-gray-200 rounded-lg p-4 mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Trainer-Performance {kat !== "Alle" ? "· " + kat : ""}</div><div className="space-y-3">{Object.entries(tc).sort(function(a,b) { return b[1].u - a[1].u; }).map(function(entry) { var n = entry[0]; var d = entry[1]; var prods = tp[n] ? Object.values(tp[n]).sort(function(a,b) { return b.count - a.count; }) : []; return (<div key={n} className="border-b border-gray-100 pb-3 last:border-0">
        <div className="flex items-center justify-between text-sm mb-1"><span className="text-gray-700 font-medium">{n}</span><div className="flex gap-4 text-xs"><span className="text-gray-500">{d.c} Termine</span><span className="text-gray-700 font-bold">{d.v} Verkäufe</span><span className="text-emerald-600 font-bold">{d.u.toFixed(0)}€</span><span className="text-gray-400">Ø {d.c ? (d.u / d.c).toFixed(0) : 0}€/Termin</span></div></div>

function TerminartenView({ terminarten, setTerminarten, erfolge, setErfolge, trainer }) {
  const [neuLabel, setNeuLabel] = useState("");
  const [creating, setCreating] = useState(false);
  const [err, setErr] = useState("");
  const [editId, setEditId] = useState(null);
  const [editLabel, setEditLabel] = useState("");
  const isAdmin = trainer.rolle === "admin";

  // Anzahl Erfolge pro Terminart-ID (für Anzeige + Lösch-Hinweis)
  const countMap = {};
  erfolge.forEach(function(e) { countMap[e.terminart] = (countMap[e.terminart] || 0) + 1; });

  const sorted = terminarten.slice().sort(function(a, b) { return a.label.localeCompare(b.label, "de"); });

  // ID-Generator: snake_case aus Label, mit Timestamp-Suffix für Eindeutigkeit
  const makeId = function(label) {
    var slug = label.toLowerCase()
      .replace(/ä/g, "ae").replace(/ö/g, "oe").replace(/ü/g, "ue").replace(/ß/g, "ss")
      .replace(/[^a-z0-9]+/g, "_")
      .replace(/^_+|_+$/g, "")
      .slice(0, 30);
    if (!slug) slug = "termin";
    return "t_" + slug + "_" + Date.now().toString().slice(-6);
  };

  const addTart = async function() {
    setErr("");
    var label = neuLabel.trim();
    if (!label) { setErr("Bezeichnung darf nicht leer sein"); return; }
    if (terminarten.find(function(t) { return t.label.toLowerCase() === label.toLowerCase(); })) {
      setErr("Diese Terminart gibt es bereits"); return;
    }
    setCreating(true);
    var newId = makeId(label);
    const res = await sb.from("terminarten").insert([{ id: newId, label: label, aktiv: true }]).select().single();
    setCreating(false);
    if (res.error) { setErr("Fehler: " + res.error.message); return; }
    setTerminarten(function(prev) { return prev.concat([res.data]); });
    setNeuLabel("");
  };

  const startEdit = function(t) {
    setEditId(t.id); setEditLabel(t.label); setErr("");
  };

  const saveEdit = async function() {
    setErr("");
    var label = editLabel.trim();
    if (!label) { setErr("Bezeichnung darf nicht leer sein"); return; }
    var alt = terminarten.find(function(t) { return t.id === editId; });
    if (!alt) return;
    if (label === alt.label) { setEditId(null); return; }
    if (terminarten.find(function(t) { return t.id !== editId && t.label.toLowerCase() === label.toLowerCase(); })) {
      setErr("Diese Terminart gibt es bereits"); return;
    }
    const res = await sb.from("terminarten").update({ label: label }).eq("id", editId);
    if (res.error) { setErr("Fehler: " + res.error.message); return; }
    setTerminarten(function(prev) { return prev.map(function(t) { return t.id === editId ? Object.assign({}, t, { label: label }) : t; }); });
    setEditId(null);
  };

  const delTart = async function(t) {
    setErr("");
    if (t.id === "t_sonstige") { setErr("Die Terminart 'Sonstige' kann nicht gelöscht werden — sie ist der Fallback."); return; }
    var n = countMap[t.id] || 0;
    var msg = n > 0
      ? "Terminart '" + t.label + "' löschen?\n\n" + n + " Erfolg(e) werden auf 'Sonstige' verschoben."
      : "Terminart '" + t.label + "' löschen?";
    if (!confirm(msg)) return;
    if (n > 0) {
      const res1 = await sb.from("erfolge").update({ terminart: "t_sonstige" }).eq("terminart", t.id);
      if (res1.error) { setErr("Fehler beim Umhängen der Erfolge: " + res1.error.message); return; }
      setErfolge(function(prev) { return prev.map(function(e) { return e.terminart === t.id ? Object.assign({}, e, { terminart: "t_sonstige" }) : e; }); });
    }
    const res2 = await sb.from("terminarten").delete().eq("id", t.id);
    if (res2.error) { setErr("Fehler beim Löschen: " + res2.error.message); return; }
    setTerminarten(function(prev) { return prev.filter(function(x) { return x.id !== t.id; }); });
  };

  const toggleGruppe = async function(t) {
    setErr("");
    var newVal = !t.is_gruppentermin;
    const res = await sb.from("terminarten").update({ is_gruppentermin: newVal }).eq("id", t.id);
    if (res.error) { setErr("Fehler: " + res.error.message); return; }
    setTerminarten(function(prev) { return prev.map(function(x) { return x.id === t.id ? Object.assign({}, x, { is_gruppentermin: newVal }) : x; }); });
  };

  return (<div className="max-w-2xl mx-auto p-4">
    <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Terminarten verwalten</div>

    {!isAdmin && (
      <div className="mb-4 p-3 bg-amber-50 border border-amber-200 rounded-lg text-xs text-amber-800">
        <div className="font-bold mb-1">Nur-Lese-Modus</div>
        <div>Anlegen, Umbenennen und Löschen von Terminarten ist nur Admins erlaubt.</div>
      </div>
    )}

    {isAdmin && (
      <div className="mb-4 p-4 bg-white border border-gray-200 rounded-lg">
        <label className="text-xs text-gray-500">Neue Terminart</label>
        <div className="flex gap-2 mt-1">
          <input value={neuLabel} onChange={function(e) { setNeuLabel(e.target.value); }} placeholder="z.B. Probetraining" className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" />
          <button onClick={addTart} disabled={creating || !neuLabel.trim()} className="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-300 text-white text-xs font-bold rounded-lg">{creating ? "..." : "+ Anlegen"}</button>
        </div>
      </div>
    )}

    {err && <div className="mb-3 p-2 bg-red-50 border border-red-200 rounded text-xs text-red-700">{err}</div>}

    <div className="space-y-1">
      {sorted.map(function(t) {
        var n = countMap[t.id] || 0;
        var isSonstige = t.id === "t_sonstige";
        return (<div key={t.id} className="flex items-center justify-between px-3 py-2 bg-white border border-gray-200 rounded-lg">
          {editId === t.id ? (
            <div className="flex-1 flex gap-2">
              <input value={editLabel} onChange={function(e) { setEditLabel(e.target.value); }} className="flex-1 px-2 py-1 border border-emerald-300 rounded text-sm focus:border-emerald-500 focus:outline-none" autoFocus />
              <button onClick={saveEdit} className="px-3 py-1 bg-emerald-600 text-white text-xs font-bold rounded">Speichern</button>
              <button onClick={function() { setEditId(null); }} className="px-3 py-1 bg-gray-200 text-gray-700 text-xs font-bold rounded">Abbrechen</button>
            </div>
          ) : (
            <>
              <div className="flex items-center gap-3">
                <span className="text-sm text-gray-800">{t.label}</span>
                {isSonstige && <span className="text-xs text-gray-400">(Fallback)</span>}
                {t.is_gruppentermin && <span className="text-xs px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700 font-medium">Gruppe</span>}
                <span className="text-xs text-gray-400">{n} Erfolg{n === 1 ? "" : "e"}</span>
              </div>
              {isAdmin && <div className="flex items-center gap-1">
                {!isSonstige && <button onClick={function() { toggleGruppe(t); }} title={t.is_gruppentermin ? "Als Einzeltermin markieren" : "Als Gruppentermin markieren"} className="text-xs text-gray-400 hover:text-emerald-600 px-2">{t.is_gruppentermin ? "👥" : "👤"}</button>}
                <button onClick={function() { startEdit(t); }} title="Umbenennen" className="text-xs text-gray-400 hover:text-emerald-600 px-2">&#9998;</button>
                {!isSonstige && <button onClick={function() { delTart(t); }} title="Löschen" className="text-xs text-gray-400 hover:text-red-600 px-2">×</button>}
              </div>}
            </>
          )}
        </div>);
      })}
    </div>

    <div className="mt-6 p-3 bg-blue-50 border border-blue-200 rounded-lg text-xs text-blue-700">
      <div className="font-bold mb-1">Hinweis</div>
      <div>Beim Löschen einer Terminart werden alle dranhängenden Erfolge automatisch auf 'Sonstige' verschoben. Die Terminart 'Sonstige' selbst kann nicht gelöscht werden.</div>
    </div>
  </div>);
}
