function buildSYS(studioTipps) {
  let base = "Du bist TrainerHub, ein AI-Copilot für Fitnesstrainer im Premium-Segment. Erstelle aus der Anamnese ein strukturiertes Trainer-Briefing.\n";
  base += "REGELN: Deutsch. Max 300 Wörter. 30-Sekunden-Scan. Du sprichst den Trainer an. Die Person oder Vorname. Keine Aufgaben fürs Mitglied außerhalb des Studios. Sicherheit first. Keine Erfindungen.\n";
  base += "EVIDENZ-PFLICHT: Jeder Trainingsimpuls MUSS auf einer konkreten Studie oder Leitlinie basieren. Gib die Quelle in Klammern an (Autor, Jahr ODER Leitlinie z.B. ACSM, NSCA). Wenn du für einen Impuls KEINE Studie benennen kannst, formuliere ihn so: Keine direkte Studienlage verfügbar. Basierend auf vergleichbaren Befunden zu [ähnliches Krankheitsbild/Faktor] wird empfohlen: [Empfehlung] (Quelle der analogen Evidenz). Erfinde NIEMALS eine Studie oder einen Autor. Im Zweifel lieber weniger Impulse mit solider Evidenz als viele ohne Grundlage. Qualität vor Quantität.\n";
  base += "STUDIO-DATEN FITNESS PARK:\n";
  base += "- Intensivbetreuung + Sensopro: 2 Euro/Woche (Koordination, Rumpfstabilität, Challenger-Tracking, Trainertermine alle 3 Monate)\n";
  base += "- Betreuungsstufen: Basic (2x/Jahr) - Intensive (2 Euro/Wo) - Personal (ab 89,90 Euro/h)\n";
  base += "- Personal Training Mitglieder: 89,90 Euro/h | 10er: 899 Euro | 20er: 1.618,20 Euro\n";
  base += "- Kurse: Rückenkurs, Pilates, Yoga, BodyPump, Cycling, Functional Training, Zumba, BBP, Jumping, Power Plate\n";
  base += "- Spezialgeräte: EGYM, Milon Q, Flexx-Zirkel (Beweglichkeit), Sensopro (Koordination), Kinesis, Power Plate\n";
  base += "- Diagnostik: InBody, Cardioscan, Back-Check, Zell Check, Mobee Fit\n";
  base += "- Produkte: Inkospor, Jungbrunnen Superfoods, Getränke-Flat, Shake des Monats\n";
  base += "- Wellness: Sauna (inkl.), Medyjet, brainLight, Solarium\n";
  base += "- Abnehmen: myshape Programm\n";
  base += "ERNÄHRUNG: Eiweiß ~1,6g/kg/Tag optimal (Morton et al. 2018, n=1863). Whey/Kollagen stärkste Evidenz (Drummond et al. 2026, n=4755). Jede Empfehlung mit Kurzreferenz.\n";
  if (studioTipps && studioTipps.trim()) {
    base += "STUDIO-SPEZIFISCHE TRAININGSTIPPS (von der Studioleitung hinterlegt):\n" + studioTipps + "\n";
  }
  base += "EXAKTE AUSGABESTRUKTUR:\n";
  base += "### PERSON AUF EINEN BLICK\n- 4-5 Stichpunkte, je max 8 Wörter\n";
  base += "### TRAININGSIMPULSE\n- 3-5 kurze Denkanstöße, Format: **Impuls** -- Begründung (Quelle)\n- JEDER Impuls mit Studienreferenz oder Leitlinie. Ohne Evidenz: transparent kennzeichnen.\n";
  base += "### ACHTUNG\n- NICHT: [Was] -- WEIL: [Begründung aus Anamnese]\n";
  base += "### VERKAUFSANKER\n- 2-4 studio-interne Zusatzverkäufe mit Preis und Formulierungsvorschlag in Anführungszeichen\n";
  base += "### ERNÄHRUNGSIMPULSE\n- 1-2 evidenzbasierte Hinweise mit (Autor, Jahr). Abschluss: Ernährungsberatung empfehlen.\n";
  base += "### OFFENE PUNKTE\n- Fehlende relevante Infos";
  return base;
}

async function callAPI(anamnese, letzter, studioTipps) {
  let msg = "ANAMNESE:\n" + anamnese;
  if (letzter && letzter.trim()) msg += "\n\nLETZTER TERMIN:\n" + letzter;
  try {
    const r = await fetch("/api/generate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, system: buildSYS(studioTipps), messages: [{ role: "user", content: msg }] }),
    });
    if (!r.ok) { const e = await r.json().catch(function() { return {}; }); const m = typeof e.error === "string" ? e.error : (e.error?.message || JSON.stringify(e)); throw new Error(m); }
    const d = await r.json();
    return { ok: true, text: d.content.filter(function(b) { return b.type === "text"; }).map(function(b) { return b.text; }).join("\n") };
  } catch (e) { return { ok: false, text: e.message }; }
}

async function parseScreenshot(base64) {
  try {
    const r = await fetch("/api/generate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6", max_tokens: 1000,
        system: "Du analysierst Screenshots aus Kassensystemen (z.B. Magicline). Extrahiere alle Produkte mit Namen und Preisen. Antworte NUR mit einem JSON-Array, kein anderer Text. Format: [{\"name\":\"Produktname\",\"preis\":12.90}]. Wenn du nichts erkennst, antworte mit [].",
        messages: [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: "image/jpeg", data: base64 } },
          { type: "text", text: "Extrahiere alle Produkte und Preise aus diesem Screenshot." }
        ]}]
      }),
    });
    if (!r.ok) throw new Error("API Fehler");
    const d = await r.json();
    const txt = d.content.filter(function(b) { return b.type === "text"; }).map(function(b) { return b.text; }).join("");
    const clean = txt.replace(/`{3}json|`{3}/g, "").trim();
    return JSON.parse(clean);
  } catch (e) { return []; }
}

function Briefing({ text }) {
  if (!text) return null;
  const parts = text.split(/(?=^### )/gm).filter(function(p) { return p.trim().startsWith("### "); });
  const colors = { "ACHTUNG": ["bg-red-50", "border-red-300", "text-red-700"], "OFFENE PUNKTE": ["bg-amber-50", "border-amber-300", "text-amber-700"] };
  return React.createElement("div", { className: "space-y-3" }, parts.map(function(p, i) {
    var nl = p.indexOf("\n"); if (nl === -1) return null;
    var title = p.slice(4, nl).trim(), body = p.slice(nl + 1).trim();
    var c = colors[title] || ["bg-white", "border-gray-200", "text-emerald-700"];
    return React.createElement("div", { key: i, className: "p-4 rounded-lg border " + c[0] + " " + c[1] },
      React.createElement("div", { className: "font-bold text-xs uppercase tracking-wider mb-2 " + c[2] }, title),
      React.createElement("div", { className: "text-sm text-gray-800 leading-relaxed" },
        body.split("\n").map(function(line, j) {
          if (!line.trim()) return null;
          if (line.startsWith("- ")) {
            var ct = line.slice(2), sg = ct.split(/\*\*(.*?)\*\*/g);
            return React.createElement("div", { key: j, className: "flex gap-2 mb-1.5" },
              React.createElement("span", { className: "text-emerald-500 mt-0.5 flex-shrink-0" }, "\u25B8"),
              React.createElement("span", null, sg.map(function(s, k) {
                return k % 2 === 1 ? React.createElement("strong", { key: k }, s) : React.createElement("span", { key: k }, s);
              }))
            );
          }
          return React.createElement("p", { key: j, className: "mb-1" }, line);
        })
      )
    );
  }));
}

function Login({ users, onLogin }) {
  const [step, setStep] = useState(1);
  const [pw, setPw] = useState("");
  const [studio, setStudio] = useState("");
  const [uid, setUid] = useState("");
  const [pin, setPin] = useState("");
  const [err, setErr] = useState("");
  const company = DEFAULT_COMPANY;
  const goStep1 = function() { if (pw !== company.password) { setErr("Falsches Passwort"); setPw(""); return; } setErr(""); setStep(2); };
  const goStep2 = function(s) { setStudio(s); setErr(""); setStep(3); };
  const goStep3 = function() { const u = users.find(function(x) { return x.id === uid; }); if (!u) { setErr("Bitte Mitarbeiter auswählen"); return; } if (u.pin !== pin) { setErr("Falsche PIN"); setPin(""); return; } onLogin({ name: u.name, studio: u.studio, rolle: u.rolle, id: u.id }); };
  const studioUsers = users.filter(function(u) { return u.studio === studio; });
  const studiosWithUsers = STUDIOS.filter(function(s) { return users.some(function(u) { return u.studio === s; }); });
  return (
    <div className="min-h-screen bg-gray-900 flex items-center justify-center p-4"><div className="w-full max-w-sm">
      <div className="text-center mb-8">
        <div className="text-3xl font-black text-white tracking-tight">TRAINER<span className="text-emerald-400">HUB</span></div>
        {step === 1 && <div className="text-xs text-gray-500 mt-1 tracking-widest uppercase">Unternehmens-Login</div>}
        {step === 2 && <div className="text-xs text-emerald-400 mt-1 tracking-widest uppercase">{company.name}</div>}
        {step === 3 && <div className="text-xs text-emerald-400 mt-1 tracking-widest uppercase">{company.name} · {studio}</div>}
      </div>
      {step === 1 && (<div className="bg-gray-800 rounded-xl p-6 space-y-4">
        <div><label className="text-xs text-gray-400 uppercase tracking-wider">Unternehmens-Passwort</label>
          <input type="password" value={pw} onChange={function(e) { setPw(e.target.value); setErr(""); }} placeholder="Passwort eingeben" className="w-full mt-1 px-3 py-2.5 bg-gray-700 text-white rounded-lg border border-gray-600 focus:border-emerald-500 focus:outline-none text-sm" onKeyDown={function(e) { if(e.key==="Enter") goStep1(); }} /></div>
        {err && <div className="text-xs text-red-400 text-center">{err}</div>}
        <button onClick={goStep1} disabled={!pw} className="w-full py-2.5 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-600 disabled:text-gray-400 text-white font-bold rounded-lg text-sm transition-colors">Anmelden</button>
      </div>)}
      {step === 2 && (<div className="bg-gray-800 rounded-xl p-6 space-y-3">
        <div className="text-xs text-gray-400 uppercase tracking-wider mb-2">Studio auswählen</div>
        {studiosWithUsers.map(function(s) { return <button key={s} onClick={function() { goStep2(s); }} className="w-full py-3 px-4 bg-gray-700 hover:bg-gray-600 text-white rounded-lg text-sm font-medium transition-colors text-left">{s}</button>; })}
        <button onClick={function() { setStep(1); setPw(""); setErr(""); }} className="w-full text-xs text-gray-500 hover:text-white mt-2">&#8592; Zurück</button>
      </div>)}
      {step === 3 && (<div className="bg-gray-800 rounded-xl p-6 space-y-4">
        <div><label className="text-xs text-gray-400 uppercase tracking-wider">Mitarbeiter</label>
          <select value={uid} onChange={function(e) { setUid(e.target.value); setErr(""); }} className="w-full mt-1 px-3 py-2.5 bg-gray-700 text-white rounded-lg border border-gray-600 focus:border-emerald-500 focus:outline-none text-sm">
            <option value="">Bitte wählen</option>
            {studioUsers.map(function(u) { return <option key={u.id} value={u.id}>{u.name}{u.rolle === "leitung" ? " (Leitung)" : ""}</option>; })}
          </select></div>
        <div><label className="text-xs text-gray-400 uppercase tracking-wider">PIN</label>
          <input type="password" maxLength="6" value={pin} onChange={function(e) { setPin(e.target.value.replace(/\D/g, "")); setErr(""); }} placeholder="----" className="w-full mt-1 px-3 py-2.5 bg-gray-700 text-white rounded-lg border border-gray-600 focus:border-emerald-500 focus:outline-none text-sm tracking-widest text-center text-lg" onKeyDown={function(e) { if(e.key==="Enter") goStep3(); }} /></div>
        {err && <div className="text-xs text-red-400 text-center">{err}</div>}
        <button onClick={goStep3} disabled={!uid || !pin} className="w-full py-2.5 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-600 disabled:text-gray-400 text-white font-bold rounded-lg text-sm transition-colors">Einloggen</button>
        <button onClick={function() { setStep(2); setUid(""); setPin(""); setErr(""); }} className="w-full text-xs text-gray-500 hover:text-white">&#8592; Studio wechseln</button>
      </div>)}
    </div></div>
  );
}

function Nav({ view, setView, trainer, onLogout }) {
  const isL = trainer.rolle === "leitung";
  const tabs = [{ id: "briefing", l: "Briefing" }, { id: "erfolge", l: "Erfolge" }, { id: "dashboard", l: "Dashboard" }];
  if (isL) { tabs.push({ id: "team", l: "Team" }); tabs.push({ id: "produkte", l: "Produkte" }); tabs.push({ id: "tipps", l: "Studio-Tipps" }); }
  return (<div className="bg-gray-900 text-white px-4 py-3"><div className="max-w-4xl mx-auto flex items-center justify-between flex-wrap gap-2">
    <div className="flex items-center gap-4"><div className="font-black text-lg tracking-tight">TRAINER<span className="text-emerald-400">HUB</span></div><div className="flex gap-1">{tabs.map(function(t) { return <button key={t.id} onClick={function() { setView(t.id); }} className={"px-3 py-1.5 rounded-md text-xs font-medium transition-colors " + (view === t.id ? "bg-emerald-600 text-white" : "text-gray-400 hover:text-white hover:bg-gray-800")}>{t.l}</button>; })}</div></div>
    <div className="flex items-center gap-3"><span className="text-xs text-gray-500">{trainer.name} · {trainer.studio} · <span className={isL ? "text-amber-400" : "text-gray-500"}>{isL ? "Leitung" : "Trainer"}</span></span><button onClick={onLogout} className="text-xs text-gray-500 hover:text-white">Logout</button></div>
  </div></div>);
}

function BriefingView({ studioTipps }) {
  const [ana, setAna] = useState("");
  const [lt, setLt] = useState("");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);
  const [showLt, setShowLt] = useState(false);
  const go = async function() { if (!ana.trim()) return; setLoading(true); setErr(null); setResult(null); const r = await callAPI(ana, lt, studioTipps); r.ok ? setResult(r.text) : setErr(r.text); setLoading(false); };
  const reset = function() { setAna(""); setLt(""); setResult(null); setErr(null); setShowLt(false); };
  if (result) return (<div className="max-w-3xl mx-auto p-4"><div className="flex items-center justify-between mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Trainer-Briefing</div><button onClick={reset} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">Neues Briefing</button></div><Briefing text={result} /></div>);
  return (<div className="max-w-3xl mx-auto p-4 space-y-4">
    <div><div className="flex items-center justify-between mb-2"><label className="text-sm font-bold text-gray-700">Anamnese einfügen</label><span className="text-xs text-gray-400">Copy &amp; Paste</span></div><textarea value={ana} onChange={function(e) { setAna(e.target.value); }} placeholder="Anamnese-Daten hier einfügen..." rows="10" className="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none resize-none bg-white" /></div>
    {!showLt ? <button onClick={function() { setShowLt(true); }} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">+ Letzten Termin hinzufügen</button> : <div><label className="text-sm font-bold text-gray-700 mb-2 block">Letzter Termin (optional)</label><textarea value={lt} onChange={function(e) { setLt(e.target.value); }} placeholder="Notizen vom letzten Termin..." rows="4" className="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 focus:outline-none resize-none bg-white" /></div>}
    {err && <div className="p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">{err}</div>}
    <button onClick={go} disabled={!ana.trim() || loading} className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 disabled:bg-gray-300 text-white font-bold rounded-lg text-sm transition-colors">{loading ? "Briefing wird generiert..." : "Briefing generieren"}</button>
  </div>);
}

function ErfolgeView({ trainer, produkte, erfolge, setErfolge }) {
  const [name, setName] = useState("");
  const [tart, setTart] = useState("");
  const [sel, setSel] = useState([]);
  const [saved, setSaved] = useState(false);
  const [showHistory, setShowHistory] = useState(false);
  const aktive = produkte.filter(function(p) { return p.aktiv; });
  const grouped = KATEGORIEN.map(function(k) { return { k: k, items: aktive.filter(function(p) { return p.kategorie === k; }) }; }).filter(function(g) { return g.items.length > 0; });
  const toggle = function(id) { setSel(function(p) { return p.includes(id) ? p.filter(function(x) { return x !== id; }) : p.concat([id]); }); };

  const save = async function() {
    if (!name.trim() || !tart) return;
    const vk = sel.map(function(id) { const p = produkte.find(function(x) { return x.id === id; }); return { id: id, name: p ? p.name : id, preis: p ? Number(p.preis) : 0 }; });
    const newE = { id: "e" + Date.now(), mitglied: name.trim(), terminart: tart, verkauft: vk, trainer: trainer.name, studio: trainer.studio, datum: new Date().toISOString() };
    await sb.from("erfolge").insert([newE]);
    setErfolge(function(prev) { return prev.concat([newE]); });
    setSaved(true); setTimeout(function() { setName(""); setTart(""); setSel([]); setSaved(false); }, 1500);
  };

  const myErfolge = erfolge.filter(function(x) { return x.studio === trainer.studio && x.trainer === trainer.name; });
  const delErfolg = async function(id) {
    await sb.from("erfolge").delete().eq("id", id);
    setErfolge(function(prev) { return prev.filter(function(x) { return x.id !== id; }); });
  };

  return (<div className="max-w-3xl mx-auto p-4">
    <div className="flex items-center justify-between mb-4">
      <div className="text-xs font-bold text-gray-400 uppercase tracking-wider">Erfolge erfassen</div>
      <button onClick={function() { setShowHistory(!showHistory); }} className="text-xs text-emerald-600 hover:text-emerald-700 font-medium">{showHistory ? "\u2190 Zurück" : "Historie anzeigen"}</button>
    </div>
    {showHistory ? (
      <div className="space-y-2">
        {myErfolge.length === 0 && <div className="text-center py-8 text-gray-400 text-sm">Noch keine Erfolge.</div>}
        {myErfolge.sort(function(a,b) { return new Date(b.datum) - new Date(a.datum); }).map(function(e) { return (
          <div key={e.id} className="bg-white border border-gray-200 rounded-lg p-3">
            <div className="flex items-center justify-between mb-1">
              <div className="text-sm font-medium text-gray-800">{e.mitglied} · <span className="text-gray-500">{(TERMINARTEN.find(function(t) { return t.id === e.terminart; }) || {}).label || e.terminart}</span></div>
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-400">{new Date(e.datum).toLocaleDateString("de-DE")}</span>
                <button onClick={function() { delErfolg(e.id); }} className="text-xs text-red-400 hover:text-red-600">&#10005;</button>
              </div>
            </div>
            {e.verkauft && e.verkauft.length > 0 && <div className="text-xs text-gray-500">{e.verkauft.map(function(v) { return v.name || v; }).join(", ")}</div>}
          </div>
        ); })}
      </div>
    ) : (
      <div>
        {saved && <div className="mb-4 p-3 bg-emerald-50 border border-emerald-200 rounded-lg text-sm text-emerald-700 font-medium">&#10003; Gespeichert</div>}
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <div><label className="text-xs text-gray-500 uppercase tracking-wider">Mitglied</label><input value={name} onChange={function(e) { setName(e.target.value); }} placeholder="Name" className="w-full mt-1 px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none" /></div>
            <div><label className="text-xs text-gray-500 uppercase tracking-wider">Terminart</label><select value={tart} onChange={function(e) { setTart(e.target.value); }} className="w-full mt-1 px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:border-emerald-500 focus:outline-none bg-white"><option value="">Bitte wählen</option>{TERMINARTEN.map(function(t) { return <option key={t.id} value={t.id}>{t.label}</option>; })}</select></div>
          </div>
          <div><label className="text-xs text-gray-500 uppercase tracking-wider mb-3 block">Verkauft / Gebucht</label>
            {grouped.map(function(g) { return (<div key={g.k} className="mb-3"><div className="text-xs font-bold text-gray-400 mb-1.5">{g.k}</div><div className="grid grid-cols-2 gap-2">{g.items.map(function(p) { return (
              <button key={p.id} onClick={function() { toggle(p.id); }} className={"text-left px-3 py-2 rounded-lg text-xs font-medium transition-all border " + (sel.includes(p.id) ? "bg-emerald-50 border-emerald-300 text-emerald-800" : "bg-white border-gray-200 text-gray-600 hover:border-gray-300")}>
                <span className="mr-2">{sel.includes(p.id) ? "\u2713" : "\u25CB"}</span>{p.name}
              </button>); })}</div></div>); })}
          </div>

function DashboardView({ trainer, produkte, erfolge }) {
  const isL = trainer.rolle === "leitung";
  const [von, setVon] = useState("");
  const [bis, setBis] = useState("");
  const [kat, setKat] = useState("Alle");
  const studioData = erfolge.filter(function(x) { return x.studio === trainer.studio; });
  const myData = erfolge.filter(function(x) { return x.studio === trainer.studio && x.trainer === trainer.name; });
  const baseData = isL ? studioData : myData;
  const data = baseData.filter(function(e) {
    var d = new Date(e.datum);
    if (von && d < new Date(von)) return false;
    if (bis) { var b = new Date(bis); b.setHours(23,59,59); if (d > b) return false; }
    return true;
  });
  var getKat = function(vid) { var p = produkte.find(function(x) { return x.id === vid; }); return p ? p.kategorie : "Sonstige"; };
  var filterV = function(vList) { if (kat === "Alle") return vList || []; return (vList || []).filter(function(v) { return getKat(v.id || v) === kat; }); };
  var pc = {};
  data.forEach(function(e) { filterV(e.verkauft).forEach(function(v) { var id = v.id || v; var nm = v.name || v; pc[id] = pc[id] || { name: nm, count: 0, umsatz: 0 }; pc[id].count++; pc[id].umsatz += (Number(v.preis) || 0); }); });
  var totalV = 0; var totalU = 0; Object.values(pc).forEach(function(x) { totalV += x.count; totalU += x.umsatz; });
  var sp = Object.entries(pc).map(function(entry) { return { id: entry[0], name: entry[1].name, count: entry[1].count, umsatz: entry[1].umsatz }; }).sort(function(a, b) { return b.count - a.count; });
  var mx = 1; sp.forEach(function(s) { if (s.count > mx) mx = s.count; });
  var tc = {};
  if (isL) data.forEach(function(e) { var fv = filterV(e.verkauft); tc[e.trainer] = tc[e.trainer] || { c: 0, v: 0, u: 0 }; tc[e.trainer].c++; fv.forEach(function(v) { tc[e.trainer].v++; tc[e.trainer].u += (Number(v.preis) || 0); }); });
  var ac = {};
  data.forEach(function(e) { var t = TERMINARTEN.find(function(t) { return t.id === e.terminart; }); var l = t ? t.label : e.terminart; ac[l] = (ac[l] || 0) + 1; });
  var sv = {};
  if (isL) {
    erfolge.filter(function(e) { var d = new Date(e.datum); if (von && d < new Date(von)) return false; if (bis) { var b = new Date(bis); b.setHours(23,59,59); if (d > b) return false; } return true;
    }).forEach(function(e) { sv[e.studio] = sv[e.studio] || { termine: 0, verkaufe: 0, umsatz: 0 }; sv[e.studio].termine++; filterV(e.verkauft).forEach(function(v) { sv[e.studio].verkaufe++; sv[e.studio].umsatz += (Number(v.preis) || 0); }); });
  }
  var katFilter = ["Alle"].concat(KATEGORIEN);
  return (<div className="max-w-4xl mx-auto p-4">
    <div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Dashboard · {isL ? trainer.studio : trainer.name}</div>
    <div className="flex items-center gap-3 mb-3 flex-wrap">
      <div className="flex items-center gap-2"><label className="text-xs text-gray-500">Von</label><input type="date" value={von} onChange={function(e) { setVon(e.target.value); }} className="px-2 py-1.5 border border-gray-300 rounded-lg text-xs focus:border-emerald-500 focus:outline-none" /></div>
      <div className="flex items-center gap-2"><label className="text-xs text-gray-500">Bis</label><input type="date" value={bis} onChange={function(e) { setBis(e.target.value); }} className="px-2 py-1.5 border border-gray-300 rounded-lg text-xs focus:border-emerald-500 focus:outline-none" /></div>
      {(von || bis) && <button onClick={function() { setVon(""); setBis(""); }} className="text-xs text-red-400 hover:text-red-600">&#10005; Reset</button>}
    </div>
    <div className="flex gap-1 mb-4 flex-wrap">
      {katFilter.map(function(k) { return <button key={k} onClick={function() { setKat(k); }} className={"px-3 py-1 rounded-full text-xs font-medium transition-colors " + (kat === k ? "bg-emerald-600 text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200")}>{k}</button>; })}
    </div>
    {!data.length ? <div className="text-center py-12 text-gray-400 text-sm">Keine Erfolge im gewählten Zeitraum.</div> : (<div>
      <div className="grid grid-cols-4 gap-3 mb-4">
        <div className="bg-white border border-gray-200 rounded-lg p-4 text-center"><div className="text-2xl font-black text-gray-900">{data.length}</div><div className="text-xs text-gray-500 mt-1">Termine</div></div>
        <div className="bg-white border border-gray-200 rounded-lg p-4 text-center"><div className="text-2xl font-black text-emerald-600">{totalV}</div><div className="text-xs text-gray-500 mt-1">{kat === "Alle" ? "Verkäufe" : kat}</div></div>
        <div className="bg-white border border-gray-200 rounded-lg p-4 text-center"><div className="text-2xl font-black text-gray-900">{data.length ? (totalU / data.length).toFixed(0) : "0"}\u20AC</div><div className="text-xs text-gray-500 mt-1">Ø Umsatz/Termin</div></div>
        <div className="bg-white border border-gray-200 rounded-lg p-4 text-center"><div className="text-2xl font-black text-emerald-600">{totalU.toFixed(0)}\u20AC</div><div className="text-xs text-gray-500 mt-1">Gesamtumsatz</div></div>

      {sp.length > 0 && <div className="bg-white border border-gray-200 rounded-lg p-4 mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Produkt-Ranking {kat !== "Alle" ? "· " + kat : ""}</div><div className="space-y-2">{sp.map(function(p) { return (<div key={p.id} className="flex items-center gap-3">
        <div className="w-44 text-xs text-gray-600 truncate flex-shrink-0">{p.name}</div>
        <div className="flex-1 h-5 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-emerald-500 rounded-full" style={{ width: Math.max((p.count / mx) * 100, 0) + "%", minWidth: p.count > 0 ? "8px" : "0" }}></div></div>
        <div className="text-xs font-bold text-gray-700 w-6 text-right">{p.count}x</div>
      </div>); })}</div></div>}
      {isL && Object.keys(tc).length > 0 && (<div className="bg-white border border-gray-200 rounded-lg p-4 mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Trainer-Performance {kat !== "Alle" ? "· " + kat : ""}</div><div className="space-y-2">{Object.entries(tc).sort(function(a,b) { return b[1].u - a[1].u; }).map(function(entry) { var n = entry[0]; var d = entry[1]; return (<div key={n} className="flex items-center justify-between text-sm border-b border-gray-100 pb-2 last:border-0"><span className="text-gray-700 font-medium">{n}</span><div className="flex gap-4 text-xs"><span className="text-gray-500">{d.c} Termine</span><span className="text-gray-700 font-bold">{d.v} Verkäufe</span><span className="text-emerald-600 font-bold">{d.u.toFixed(0)}\u20AC</span><span className="text-gray-400">Ø {d.c ? (d.u / d.c).toFixed(0) : 0}\u20AC/Termin</span></div></div>); })}</div></div>)}
      <div className="bg-white border border-gray-200 rounded-lg p-4 mb-4"><div className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Terminarten</div><div className="flex gap-6">{Object.entries(ac).map(function(entry) { return (<div key={entry[0]} className="text-center"><div className="text-lg font-black text-gray-900">{entry[1]}</div><div className="text-xs text-gray-500">{entry[0]}</div></div>); })}</div></div>
      {isL && Object.keys(sv).length > 1 && (<div className="bg-white border border-amber-200 rounded-lg p-4">
        <div className="text-xs font-bold text-amber-600 uppercase tracking-wider mb-3">Studio-Vergleich {kat !== "Alle" ? "· " + kat : "(alle Standorte)"}</div>
        <div className="space-y-2">{Object.entries(sv).sort(function(a,b) { return b[1].umsatz - a[1].umsatz; }).map(function(entry) { var s = entry[0]; var d = entry[1]; return (
          <div key={s} className={"flex items-center justify-between text-sm border-b border-gray-100 pb-2 last:border-0 " + (s === trainer.studio ? "font-bold" : "")}>
            <span className="text-gray-700">{s} {s === trainer.studio ? "(dein Studio)" : ""}</span>
            <div className="flex gap-4 text-xs">
              <span className="text-gray-500">{d.termine} Termine</span>
              <span className="text-gray-700 font-bold">{d.verkaufe} Verkäufe</span>
              <span className="text-emerald-600 font-bold">{d.umsatz.toFixed(0)}\u20AC</span>
              <span className="text-gray-400">Ø {d.termine ? (d.umsatz / d.termine).toFixed(0) : 0}\u20AC/T</span>
            </div>
          </div>); })}</div>
      </div>)}
    </div>)}
  </div>);
}

function App() {
  const [view, setView] = useState("login");
  const [trainer, setTrainer] = useState(null);
  const [users, setUsers] = useState([]);
  const [produkte, setProdukte] = useState([]);
  const [erfolge, setErfolge] = useState([]);
  const [studioTipps, setStudioTipps] = useState("");
  const [ready, setReady] = useState(false);

  useEffect(function() {
    Promise.all([
      sb.from("users").select("*"),
      sb.from("produkte").select("*"),
      sb.from("erfolge").select("*")
    ]).then(function(results) {
      if (results[0].data) setUsers(results[0].data);
      if (results[1].data) setProdukte(results[1].data);
      if (results[2].data) setErfolge(results[2].data);
      setReady(true);
    });
  }, []);

  useEffect(function() {
    if (!trainer) return;
    sb.from("studio_tipps").select("tipps").eq("studio", trainer.studio).single().then(function(res) {
      if (res.data) setStudioTipps(res.data.tipps || "");
    });
  }, [trainer]);

  if (!ready) return <div className="min-h-screen bg-gray-900 flex items-center justify-center"><div className="text-gray-500 text-sm">Lade...</div></div>;
  if (view === "login" || !trainer) return <Login users={users} onLogin={function(t) { setTrainer(t); setView("briefing"); }} />;
  return (<div className="min-h-screen bg-gray-50">
    <Nav view={view} setView={setView} trainer={trainer} onLogout={function() { setTrainer(null); setView("login"); }} />
    <div className="py-4">
      {view === "briefing" && <BriefingView studioTipps={studioTipps} />}
      {view === "erfolge" && <ErfolgeView trainer={trainer} produkte={produkte} erfolge={erfolge} setErfolge={setErfolge} />}
      {view === "dashboard" && <DashboardView trainer={trainer} produkte={produkte} erfolge={erfolge} />}
      {view === "team" && trainer.rolle === "leitung" && <TeamView users={users} setUsers={setUsers} />}
      {view === "produkte" && trainer.rolle === "leitung" && <ProdukteView produkte={produkte} setProdukte={setProdukte} />}
      {view === "tipps" && trainer.rolle === "leitung" && <StudioTippsView trainer={trainer} />}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
